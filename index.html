<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PongBall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; background: #000; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    // ─── CONSTANTS ───
    const PADDLE_W = 10;
    const OF_H_RATIO = 0.08;
    const GK_H_RATIO = 0.04;
    const BALL_SIZE = 8;
    const OF_SPEED_RATIO = 0.50;
    const GK_SPEED_RATIO = 0.40;
    const BALL_START_SPEED = 0.20;
    const BALL_MAX_SPEED = 0.55;
    const BALL_ACCEL = 1.03;
    const MAX_BOUNCE_ANGLE = Math.PI / 3;
    const HOLD_TIME_LIMIT = 2.0;        // seconds before auto-release

    const GK_SKILL_LEFT = 0.75;
    const GK_SKILL_RIGHT = 0.65;

    // ─── STATE ───
    let scoreL = 0, scoreR = 0;
    let ball, gkL, gkR, ofL, ofR;

    // Ball state: 'on_gk', 'held_player', 'held_ai', 'live'
    let ballState = 'on_gk';
    let holdPaddle = null;
    let holdOffsetY = 0;
    let holdTimer = 0;                   // counts up — auto-releases at HOLD_TIME_LIMIT
    let serveFromLeft = true;

    let goalPause = 0;

    // Track paddle velocities for spin
    let ofLPrevY = 0;
    let ofLVelY = 0;
    let ofRPrevY = 0;
    let ofRVelY = 0;

    const keys = {};
    const justPressed = {};
    const justReleased = {};
    let spaceHeldTime = 0;           // how long Space has been held
    let spaceDown = false;

    window.addEventListener('keydown', e => {
      if (!keys[e.code]) justPressed[e.code] = true;
      keys[e.code] = true;
      if (e.code === 'Space' && !spaceDown) {
        spaceDown = true;
        spaceHeldTime = 0;
      }
      e.preventDefault();
    });
    window.addEventListener('keyup', e => {
      keys[e.code] = false;
      justReleased[e.code] = true;
      if (e.code === 'Space') {
        spaceDown = false;
      }
    });

    function consumePress(code) {
      if (justPressed[code]) { justPressed[code] = false; return true; }
      return false;
    }
    function consumeRelease(code) {
      if (justReleased[code]) { justReleased[code] = false; return true; }
      return false;
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    // ─── INIT ───
    function initPositions() {
      const gkH = H * GK_H_RATIO;
      const ofH = H * OF_H_RATIO;

      gkL = { x: 15, y: H / 2 - gkH / 2, w: PADDLE_W, h: gkH };
      gkR = { x: W - 15 - PADDLE_W, y: H / 2 - gkH / 2, w: PADDLE_W, h: gkH };
      ofL = { x: W * 0.30, y: H / 2 - ofH / 2, w: PADDLE_W, h: ofH };
      ofR = { x: W * 0.70 - PADDLE_W, y: H / 2 - ofH / 2, w: PADDLE_W, h: ofH };

      ball = { x: 0, y: 0, vx: 0, vy: 0, size: BALL_SIZE };
    }

    function resetAfterGoal(servingLeft) {
      serveFromLeft = servingLeft;
      ballState = 'on_gk';
      holdPaddle = null;
      holdTimer = 0;
      ball.vx = 0;
      ball.vy = 0;
      goalPause = 0.6;
    }

    // ─── SERVE FROM GK ───
    // chargeTime: how long Space was held (0 = quick tap, longer = lob)
    function serveFromGK(chargeTime) {
      const gk = serveFromLeft ? gkL : gkR;
      const dir = serveFromLeft ? 1 : -1;

      // Quick tap = fast flat pass. Long hold = slower lob (higher arc)
      const charge = clamp(chargeTime, 0, 0.6);  // cap at 0.6s
      const lobFactor = charge / 0.6;             // 0 = flat, 1 = full lob

      // Speed: tap is fast, lob is slower horizontally
      const speed = W * BALL_START_SPEED * (1.2 - lobFactor * 0.4);
      // Angle: lob adds a random upward/downward arc
      const baseAngle = (Math.random() - 0.5) * 0.3;
      const lobAngle = baseAngle + (Math.random() > 0.5 ? 1 : -1) * lobFactor * 0.6;

      ball.x = serveFromLeft ? gk.x + gk.w + ball.size / 2 + 2 : gk.x - ball.size / 2 - 2;
      ball.vx = Math.cos(lobAngle) * speed * dir;
      ball.vy = Math.sin(lobAngle) * speed;
      ballState = 'live';
    }

    let aiServeTimer = 0;
    function aiServeDelay() {
      aiServeTimer = 0.5 + Math.random() * 1.0;
    }

    // ─── SHOOT FROM OUTFIELD (player or AI) ───
    // chargeTime: how long Space was held (for player). AI passes 0.
    function shootFromPaddle(paddle, isLeft, chargeTime) {
      const dir = isLeft ? 1 : -1;
      const charge = clamp(chargeTime || 0, 0, 0.6);
      const lobFactor = charge / 0.6;

      // Tap = fast direct shot. Hold = slower lob with more arc
      const speed = W * BALL_START_SPEED * (1.5 - lobFactor * 0.5);

      const velY = (paddle === ofL) ? ofLVelY : ofRVelY;
      const spinInfluence = clamp(velY / (H * 0.5), -1, 1);
      const shootAngle = spinInfluence * MAX_BOUNCE_ANGLE * 0.8;

      // Lob adds extra vertical component
      const lobVY = lobFactor * H * 0.15 * (Math.random() > 0.5 ? 1 : -1);

      ball.vx = Math.cos(shootAngle) * speed * dir;
      ball.vy = Math.sin(shootAngle) * speed + velY * 0.25 + lobVY;

      ballState = 'live';
      holdPaddle = null;
      holdTimer = 0;
    }

    // ─── GOALKEEPER AI ───
    function gkAI(gk, skill, dt) {
      // Don't AI the left GK when player is controlling it (ball on GK)
      if (ballState === 'on_gk' && serveFromLeft && gk === gkL) return;

      const maxSpeed = H * 0.45 * skill;
      const center = gk.y + gk.h / 2;

      const ballComingLeft = ball.vx < 0 && gk.x < W / 2;
      const ballComingRight = ball.vx > 0 && gk.x > W / 2;
      const active = ballComingLeft || ballComingRight || ballState !== 'live';

      let target = active ? ball.y : H / 2;

      const lag = active ? (1.0 - skill * 0.7) : 0.95;
      const effective = center + (target - center) * (1 - lag);
      const diff = effective - center;
      const move = Math.sign(diff) * Math.min(Math.abs(diff), maxSpeed * dt);
      gk.y = clamp(gk.y + move, 0, H - gk.h);
    }

    // ─── OUTFIELD AI (right side) ───
    let aiShootTimer = 0;

    function ofAI(of, dt) {
      const speed = H * OF_SPEED_RATIO * 0.72;
      const cy = of.y + of.h / 2;

      // If AI is holding the ball, aim then shoot
      if (ballState === 'held_ai' && holdPaddle === of) {
        // Move toward a good shooting position
        const targetY = H / 2 + (Math.random() - 0.5) * H * 0.3;
        const diffY = targetY - cy;
        of.y += Math.sign(diffY) * Math.min(Math.abs(diffY), speed * dt);
        of.y = clamp(of.y, 0, H - of.h);

        aiShootTimer -= dt;
        if (aiShootTimer <= 0) {
          shootFromPaddle(of, false);
        }
        return;
      }

      let targetY = ball.y;
      if (ball.vx > 0) {
        const timeToReach = Math.max(0, (of.x - ball.x) / Math.max(ball.vx, 1));
        targetY = ball.y + ball.vy * timeToReach * 0.6;
      }

      const diffY = targetY - cy;
      of.y += Math.sign(diffY) * Math.min(Math.abs(diffY), speed * dt);
      of.y = clamp(of.y, 0, H - of.h);

      let idealX;
      if (ball.vx > 0) {
        idealX = clamp(ball.x + 80, W / 2 + 20, gkR.x - of.w - 40);
      } else {
        idealX = W * 0.68;
      }
      const diffX = idealX - of.x;
      of.x += Math.sign(diffX) * Math.min(Math.abs(diffX), speed * 0.5 * dt);
      of.x = clamp(of.x, W / 2 + 10, gkR.x - of.w - 10);
    }

    // ─── PADDLE COLLISION ───
    function hitPaddle(p, isLeft) {
      if (ball.x + ball.size / 2 > p.x &&
          ball.x - ball.size / 2 < p.x + p.w &&
          ball.y + ball.size / 2 > p.y &&
          ball.y - ball.size / 2 < p.y + p.h) {

        if (isLeft) {
          ball.x = p.x + p.w + ball.size / 2 + 1;
        } else {
          ball.x = p.x - ball.size / 2 - 1;
        }

        const hitPos = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
        const angle = clamp(hitPos, -1, 1) * MAX_BOUNCE_ANGLE;
        const currentSpeed = Math.hypot(ball.vx, ball.vy);
        const newSpeed = Math.min(currentSpeed * BALL_ACCEL, W * BALL_MAX_SPEED);

        ball.vx = Math.cos(angle) * newSpeed * (isLeft ? 1 : -1);
        ball.vy = Math.sin(angle) * newSpeed;

        // Add paddle spin
        const velY = (p === ofL) ? ofLVelY : (p === ofR) ? ofRVelY : 0;
        ball.vy += velY * 0.35;

        return true;
      }
      return false;
    }

    // ─── PHYSICS ───
    function physicsStep(dt) {
      const speed = Math.hypot(ball.vx, ball.vy);
      const maxStep = ball.size * 0.5;
      const totalDist = speed * dt;
      const steps = Math.max(1, Math.ceil(totalDist / maxStep));
      const subDt = dt / steps;

      for (let s = 0; s < steps; s++) {
        ball.x += ball.vx * subDt;
        ball.y += ball.vy * subDt;

        // Wall bounce
        if (ball.y - ball.size / 2 < 0) {
          ball.y = ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.98;
        }
        if (ball.y + ball.size / 2 > H) {
          ball.y = H - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.98;
        }

        // Player outfield catches the ball
        if (hitPaddle(ofL, true)) {
          ballState = 'held_player';
          holdPaddle = ofL;
          holdOffsetY = clamp(ball.y - (ofL.y + ofL.h / 2), -ofL.h / 2, ofL.h / 2);
          holdTimer = 0;
          ball.vx = 0;
          ball.vy = 0;
          return;
        }

        // AI outfield catches the ball
        if (hitPaddle(ofR, false)) {
          ballState = 'held_ai';
          holdPaddle = ofR;
          holdOffsetY = clamp(ball.y - (ofR.y + ofR.h / 2), -ofR.h / 2, ofR.h / 2);
          holdTimer = 0;
          aiShootTimer = 0.3 + Math.random() * 0.8;  // AI holds 0.3–1.1s then shoots
          ball.vx = 0;
          ball.vy = 0;
          return;
        }

        // GKs and goals — just bounce off GKs
        hitPaddle(gkL, true);
        hitPaddle(gkR, false);

        // Goals
        if (ball.x + ball.size / 2 < 0) {
          scoreR++;
          resetAfterGoal(true);
          return;
        }
        if (ball.x - ball.size / 2 > W) {
          scoreL++;
          resetAfterGoal(false);
          return;
        }
      }
    }

    // ─── HOLD POSITION: ball on front of paddle ───
    function stickBallToFront(paddle, isLeft) {
      if (isLeft) {
        ball.x = paddle.x + paddle.w + ball.size / 2 + 2;
      } else {
        ball.x = paddle.x - ball.size / 2 - 2;
      }
      ball.y = paddle.y + paddle.h / 2 + holdOffsetY;
      ball.y = clamp(ball.y, ball.size / 2, H - ball.size / 2);
    }

    // ─── UPDATE ───
    let lastTime = performance.now();
    initPositions();
    resetAfterGoal(true);

    function update(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      // Recalc sizes
      gkL.h = H * GK_H_RATIO;
      gkR.h = H * GK_H_RATIO;
      ofL.h = H * OF_H_RATIO;
      ofR.h = H * OF_H_RATIO;
      gkL.x = 15;
      gkR.x = W - 15 - PADDLE_W;

      const pSpeed = H * OF_SPEED_RATIO;
      const gkSpeed = H * GK_SPEED_RATIO;

      // ─── Player controls ───
      // When ball is on left GK: arrows move the GK up/down ONLY
      // The instant Space is pressed, control switches to outfield
      const playerControlsGK = (ballState === 'on_gk' && serveFromLeft && goalPause <= 0);

      if (playerControlsGK) {
        if (keys['ArrowUp'])   gkL.y -= gkSpeed * dt;
        if (keys['ArrowDown']) gkL.y += gkSpeed * dt;
        gkL.y = clamp(gkL.y, 0, H - gkL.h);
      } else {
        if (keys['ArrowUp'])    ofL.y -= pSpeed * dt;
        if (keys['ArrowDown'])  ofL.y += pSpeed * dt;
        if (keys['ArrowLeft'])  ofL.x -= pSpeed * dt;
        if (keys['ArrowRight']) ofL.x += pSpeed * dt;
        ofL.x = clamp(ofL.x, gkL.x + gkL.w + 10, W / 2 - ofL.w - 10);
        ofL.y = clamp(ofL.y, 0, H - ofL.h);
      }

      // Track paddle velocities
      ofLVelY = (ofL.y - ofLPrevY) / Math.max(dt, 0.001);
      ofLPrevY = ofL.y;
      ofRVelY = (ofR.y - ofRPrevY) / Math.max(dt, 0.001);
      ofRPrevY = ofR.y;

      // AI (skip left GK AI when player controls it)
      if (!playerControlsGK) gkAI(gkL, GK_SKILL_LEFT, dt);
      gkAI(gkR, GK_SKILL_RIGHT, dt);
      ofAI(ofR, dt);

      // ─── Ball state machine ───

      if (goalPause > 0) {
        goalPause -= dt;
        return;
      }

      // Ball on GK
      if (ballState === 'on_gk') {
        const gk = serveFromLeft ? gkL : gkR;
        // Stick ball to front of GK
        if (serveFromLeft) {
          ball.x = gk.x + gk.w + ball.size / 2 + 2;
        } else {
          ball.x = gk.x - ball.size / 2 - 2;
        }
        ball.y = gk.y + gk.h / 2;

        // Player serves on Space RELEASE — hold longer to lob
        if (serveFromLeft) {
          if (spaceDown) spaceHeldTime += dt;
          if (consumeRelease('Space')) {
            serveFromGK(spaceHeldTime);
            spaceHeldTime = 0;
            return;
          }
        }

        // AI serves after delay
        if (!serveFromLeft) {
          if (aiServeTimer <= 0) aiServeDelay();
          aiServeTimer -= dt;
          if (aiServeTimer <= 0) serveFromGK();
        }
        return;
      }

      // Ball held by player outfield
      if (ballState === 'held_player' && holdPaddle) {
        stickBallToFront(holdPaddle, true);
        holdTimer += dt;
        if (spaceDown) spaceHeldTime += dt;

        // Shoot on Space RELEASE or auto-release at time limit
        if (consumeRelease('Space')) {
          shootFromPaddle(holdPaddle, true, spaceHeldTime);
          spaceHeldTime = 0;
        } else if (holdTimer >= HOLD_TIME_LIMIT) {
          shootFromPaddle(holdPaddle, true, 0);  // auto-release = quick shot
        }
        return;
      }

      // Ball held by AI outfield
      if (ballState === 'held_ai' && holdPaddle) {
        stickBallToFront(holdPaddle, false);
        holdTimer += dt;

        // AI shoots on its timer or auto-release at limit
        if (holdTimer >= HOLD_TIME_LIMIT) {
          shootFromPaddle(holdPaddle, false);
        }
        // (aiShootTimer handled in ofAI)
        return;
      }

      // Ball is live
      physicsStep(dt);
    }

    // ─── DRAW FIELD ───
    function drawField() {
      ctx.strokeStyle = '#1a3d1a';
      ctx.lineWidth = 2;

      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.beginPath();
      ctx.arc(W / 2, H / 2, H * 0.12, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = '#1a3d1a';
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 3, 0, Math.PI * 2);
      ctx.fill();

      const penW = W * 0.10;
      const penH = H * 0.40;
      ctx.strokeRect(0, H / 2 - penH / 2, penW, penH);
      ctx.strokeRect(W - penW, H / 2 - penH / 2, penW, penH);

      const gaW = penW * 0.4;
      const gaH = penH * 0.5;
      ctx.strokeRect(0, H / 2 - gaH / 2, gaW, gaH);
      ctx.strokeRect(W - gaW, H / 2 - gaH / 2, gaW, gaH);

      ctx.strokeRect(1, 1, W - 2, H - 2);
    }

    // ─── RENDER ───
    function render() {
      ctx.clearRect(0, 0, W, H);

      drawField();

      // Paddles
      ctx.fillStyle = '#fff';
      ctx.fillRect(gkL.x, gkL.y, gkL.w, gkL.h);
      ctx.fillRect(gkR.x, gkR.y, gkR.w, gkR.h);
      ctx.fillRect(ofL.x, ofL.y, ofL.w, ofL.h);
      ctx.fillRect(ofR.x, ofR.y, ofR.w, ofR.h);

      // Ball
      if (goalPause <= 0) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(
          ball.x - ball.size / 2,
          ball.y - ball.size / 2,
          ball.size, ball.size
        );
      }

      // Hold timer bar (shows when player is holding)
      if (ballState === 'held_player' && holdPaddle) {
        const barW = 40;
        const barH = 3;
        const bx = holdPaddle.x + holdPaddle.w + 8;
        const by = holdPaddle.y - 8;
        const pct = 1 - (holdTimer / HOLD_TIME_LIMIT);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = pct > 0.3 ? '#fff' : '#f44';
        ctx.fillRect(bx, by, barW * pct, barH);
      }

      // Charge indicator (when holding Space)
      if (spaceDown && (ballState === 'on_gk' && serveFromLeft || ballState === 'held_player')) {
        const charge = clamp(spaceHeldTime / 0.6, 0, 1);
        const barW = 30;
        const barH = 3;
        // Show near the ball
        const bx = ball.x + ball.size;
        const by = ball.y - 10;
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(bx, by, barW, barH);
        // Green for tap, yellow for lob
        const r = Math.round(255 * charge);
        const g = Math.round(255 * (1 - charge * 0.3));
        ctx.fillStyle = `rgb(${r},${g},100)`;
        ctx.fillRect(bx, by, barW * charge, barH);
      }

      // Prompts
      if (ballState === 'on_gk' && serveFromLeft && goalPause <= 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(spaceDown ? 'release to lob...' : 'tap SPACE = pass  |  hold = lob', W / 2, 22);
      }
      if (ballState === 'held_player') {
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(spaceDown ? 'release to lob...' : 'tap SPACE = shoot  |  hold = lob', W / 2, 22);
      }

      // Score
      ctx.fillStyle = '#fff';
      ctx.font = '32px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(scoreL, W / 2 - 60, 50);
      ctx.fillText(scoreR, W / 2 + 60, 50);

      // Controls hint
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Arrows = move  |  Space = serve / shoot', W / 2, H - 10);
    }

    // ─── LOOP ───
    function loop(now) {
      update(now);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
