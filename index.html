      ctx.fillStyle = TEAM_LEFT.primary;
      ctx.font = 'bold 48px monospace';
      ctx.fillText('ITALY', cx, H * 0.48);

      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 18px monospace';
      ctx.fillText('ITALIA \'90', cx, H * 0.58);

      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '12px monospace';
      ctx.fillText('SPACE = play again  ·  ESC = menu', cx, H * 0.72);
      ctx.restore();
    }

    function renderWCEliminated() {
      const cx = W / 2;
      ctx.save();

      ctx.fillStyle = '#c00';
      ctx.shadowColor = '#c00';
      ctx.shadowBlur = 15;
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ELIMINATED', cx, H * 0.38);

      ctx.shadowBlur = 0;
      ctx.fillStyle = '#888';
      ctx.font = '14px monospace';
      const phaseName = wcState.phase === 'eliminated' ? '' : '';
      ctx.fillText('Italy\'s World Cup dream is over.', cx, H * 0.48);

      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '12px monospace';
      ctx.fillText('SPACE = try again  ·  ESC = menu', cx, H * 0.62);
      ctx.restore();
    }

    // ─── CUTSCENE RENDER ───
    function renderCutscene(now) {
      const t = now / 1000 - cutsceneStartTime;

      // Auto-end cutscene
      if (t >= CUTSCENE_DURATION) {
        cutsceneActive = false;
        lastTime = now;
        return;
      }

      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, W, H);

      // ═══════════════════════════════════════
      // PHASE 0: LOGO ANIMATION (0 → LOGO_END)
      // ═══════════════════════════════════════
      if (t < CUTSCENE_LOGO_END + 0.5) {
        const logoAlpha = t < CUTSCENE_LOGO_END
          ? Math.min(t * 2, 1)
          : Math.max(0, 1 - (t - CUTSCENE_LOGO_END) / 0.5);

        ctx.save();
        ctx.globalAlpha = logoAlpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // "PONGBALL" — letters appear with neon flicker
        const letters = 'PONGBALL';
        const fontSize = Math.max(48, W * 0.07);
        ctx.font = `bold ${fontSize}px monospace`;
        const totalW = ctx.measureText(letters).width;
        const startX = W / 2 - totalW / 2;

        for (let i = 0; i < letters.length; i++) {
          const letterDelay = i * 0.12;  // stagger each letter
          const letterT = Math.max(0, t - letterDelay);

          if (letterT <= 0) continue;

          // Neon flicker on appearance (rapid on/off for first 0.3s)
          let flicker = 1;
          if (letterT < 0.3) {
            flicker = Math.sin(letterT * 40) > -0.2 ? 1 : 0.1;
          }

          const charW = ctx.measureText(letters[i]).width;
          const cx = startX + ctx.measureText(letters.substring(0, i)).width + charW / 2;
          const cy = H * 0.42;

          // Glow
          ctx.save();
          ctx.globalAlpha = logoAlpha * flicker;
          ctx.shadowColor = '#88ddff';
          ctx.shadowBlur = 30 * flicker;
          ctx.fillStyle = '#fff';
          ctx.fillText(letters[i], cx, cy);
          // Second glow pass
          ctx.shadowColor = '#fff';
          ctx.shadowBlur = 15 * flicker;
          ctx.fillText(letters[i], cx, cy);
          ctx.restore();
        }

        // "ITALIA '90" appears after all letters
        const subDelay = letters.length * 0.12 + 0.3;
        if (t > subDelay) {
          const subT = t - subDelay;
          const subAlpha = Math.min(subT * 3, 1) * logoAlpha;
          ctx.save();
          ctx.globalAlpha = subAlpha;
          ctx.font = `bold ${Math.max(14, W * 0.018)}px monospace`;
          ctx.shadowColor = '#fff';
          ctx.shadowBlur = 8;
          ctx.fillStyle = '#ccc';
          ctx.fillText("ITALIA '90", W / 2, H * 0.42 + fontSize * 0.7);

          // Italian flag stripe
          const flagW = W * 0.06;
          const flagH = Math.max(2, fontSize * 0.05);
          const fx = W / 2 - flagW / 2;
          const fy = H * 0.42 + fontSize * 0.7 + fontSize * 0.25;
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#009246'; ctx.fillRect(fx, fy, flagW / 3, flagH);
          ctx.fillStyle = '#fff';    ctx.fillRect(fx + flagW / 3, fy, flagW / 3, flagH);
          ctx.fillStyle = '#CE2B37'; ctx.fillRect(fx + flagW * 2 / 3, fy, flagW / 3, flagH);
          ctx.restore();
        }

        // Decorative line under logo
        if (t > 0.5) {
          const lineT = Math.min((t - 0.5) / 0.8, 1);
          const lineW = W * 0.25 * lineT;
          ctx.save();
          ctx.globalAlpha = logoAlpha * 0.4;
          ctx.strokeStyle = '#88ddff';
          ctx.shadowColor = '#88ddff';
          ctx.shadowBlur = 6;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(W / 2 - lineW, H * 0.42 - fontSize * 0.55);
          ctx.lineTo(W / 2 + lineW, H * 0.42 - fontSize * 0.55);
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }

      // ═══════════════════════════════════════
      // PHASE 1+2: TABLE VIEW → ZOOM INTO GAMEPLAY
      // ═══════════════════════════════════════
      if (t < CUTSCENE_TABLE_START) {
        // Skip hint and return — only logo is showing
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#fff';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE to skip', W / 2, H - 15);
        ctx.restore();
        return;
      }

      // Table fade in
      const tableReveal = Math.min((t - CUTSCENE_TABLE_START) / 0.8, 1);

      // Zoom progress (starts at ZOOM_START, ends at ZOOM_END)
      const zoomRaw = t < CUTSCENE_ZOOM_START ? 0
        : Math.min((t - CUTSCENE_ZOOM_START) / (CUTSCENE_ZOOM_END - CUTSCENE_ZOOM_START), 1);
      const eased = zoomRaw < 0.5
        ? 4 * zoomRaw * zoomRaw * zoomRaw
        : 1 - Math.pow(-2 * zoomRaw + 2, 3) / 2;

      // ── Interpolated perspective parameters ──
      // Start: wide view showing full table (smaller surface, more table body)
      // End: normal 3D gameplay view
      const startScale = 0.52;     // surface takes up less screen
      const endScale = 1.0;
      const viewScale = startScale + eased * (endScale - startScale);

      // Surface Y position — starts higher (showing table body below)
      const startSurfaceY = 0.35;  // surface top at 35% of screen
      const endSurfaceY = 0.0;     // normal (surface fills from top)
      const surfaceOffsetY = startSurfaceY + eased * (endSurfaceY - startSurfaceY);

      // Table body visibility — starts visible, fades as we zoom in
      const tableBodyAlpha = Math.max(0, 1 - eased * 1.5);

      // Extra perspective tilt at start (more angled view)
      const startTilt = 0.08;
      const endTilt = 0.0;
      const extraTilt = startTilt + eased * (endTilt - startTilt);

      // ── Draw table body (visible in early phase) ──
      if (tableBodyAlpha > 0.01) {
        ctx.save();
        ctx.globalAlpha = tableBodyAlpha * tableReveal;

        // Table body dimensions relative to the surface
        const surfW = W * viewScale * 0.92;
        const surfL = (W - surfW) / 2;
        const surfR = surfL + surfW;
        const surfTop = H * (surfaceOffsetY + 0.10);
        const surfBot = H * (surfaceOffsetY + 0.10 + viewScale * 0.66);

        const bodyTop = surfBot;
        const bodyH = H * 0.22 * (1 - eased * 0.5);
        const bodyL = surfL - 10;
        const bodyR = surfR + 10;

        // Main body rectangle
        ctx.fillStyle = '#111';
        ctx.fillRect(bodyL, bodyTop, bodyR - bodyL, bodyH);

        // Table legs (two arches)
        ctx.fillStyle = '#0a0a0a';
        const legW = (bodyR - bodyL) * 0.22;
        const legH = bodyH * 0.6;
        // Left leg
        ctx.beginPath();
        ctx.moveTo(bodyL + legW * 0.3, bodyTop + bodyH);
        ctx.lineTo(bodyL + legW * 0.3, bodyTop + bodyH - legH);
        ctx.quadraticCurveTo(bodyL + legW * 1.2, bodyTop + bodyH - legH - 8, bodyL + legW * 2, bodyTop + bodyH - legH);
        ctx.lineTo(bodyL + legW * 2, bodyTop + bodyH);
        ctx.closePath();
        ctx.fill();
        // Right leg
        ctx.beginPath();
        ctx.moveTo(bodyR - legW * 0.3, bodyTop + bodyH);
        ctx.lineTo(bodyR - legW * 0.3, bodyTop + bodyH - legH);
        ctx.quadraticCurveTo(bodyR - legW * 1.2, bodyTop + bodyH - legH - 8, bodyR - legW * 2, bodyTop + bodyH - legH);
        ctx.lineTo(bodyR - legW * 2, bodyTop + bodyH);
        ctx.closePath();
        ctx.fill();

        // ── PONGBALL branding (reference style) ──
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Main "PONGBALL" text
        const brandSize = Math.max(20, surfW * 0.06);
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${brandSize}px monospace`;
        ctx.fillText('PONGBALL', W / 2, bodyTop + bodyH * 0.28);

        // "ITALIA '90"
        const subSize = Math.max(10, surfW * 0.022);
        ctx.font = `bold ${subSize}px monospace`;
        ctx.fillStyle = '#ccc';
        ctx.fillText("ITALIA '90", W / 2, bodyTop + bodyH * 0.48);

        // Italian flag stripe
        const flagW = surfW * 0.08;
        const flagH = Math.max(2, brandSize * 0.08);
        const fx = W / 2 - flagW / 2;
        const fy = bodyTop + bodyH * 0.58;
        ctx.fillStyle = '#009246'; ctx.fillRect(fx, fy, flagW / 3, flagH);
        ctx.fillStyle = '#fff';    ctx.fillRect(fx + flagW / 3, fy, flagW / 3, flagH);
        ctx.fillStyle = '#CE2B37'; ctx.fillRect(fx + flagW * 2 / 3, fy, flagW / 3, flagH);

        // Art deco corner stripes
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(2, brandSize * 0.08);
        // Left
        ctx.beginPath();
        ctx.moveTo(bodyL + 12, bodyTop + 6);
        ctx.lineTo(bodyL + 12, bodyTop + bodyH * 0.7);
        ctx.lineTo(bodyL + 40, bodyTop + bodyH * 0.7);
        ctx.stroke();
        // Inner left
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = Math.max(1, brandSize * 0.04);
        ctx.beginPath();
        ctx.moveTo(bodyL + 22, bodyTop + 6);
        ctx.lineTo(bodyL + 22, bodyTop + bodyH * 0.6);
        ctx.lineTo(bodyL + 44, bodyTop + bodyH * 0.6);
        ctx.stroke();
        // Right
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(2, brandSize * 0.08);
        ctx.beginPath();
        ctx.moveTo(bodyR - 12, bodyTop + 6);
        ctx.lineTo(bodyR - 12, bodyTop + bodyH * 0.7);
        ctx.lineTo(bodyR - 40, bodyTop + bodyH * 0.7);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = Math.max(1, brandSize * 0.04);
        ctx.beginPath();
        ctx.moveTo(bodyR - 22, bodyTop + 6);
        ctx.lineTo(bodyR - 22, bodyTop + bodyH * 0.6);
        ctx.lineTo(bodyR - 44, bodyTop + bodyH * 0.6);
        ctx.stroke();

        // ── Glass edge highlight (top of table body) ──
        ctx.strokeStyle = `rgba(255,255,255,${0.15 * tableBodyAlpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bodyL, bodyTop);
        ctx.lineTo(bodyR, bodyTop);
        ctx.stroke();

        ctx.restore();
      }

      // ── Draw the playing surface (scaled + offset) ──
      ctx.save();
      ctx.globalAlpha = tableReveal;

      // Apply zoom transform centered on the surface
      const cx = W / 2;
      const cy = H * 0.5 + H * surfaceOffsetY * 0.5;
      ctx.translate(cx * (1 - viewScale), cy * (1 - viewScale) + H * surfaceOffsetY * viewScale * 0.4);
      ctx.scale(viewScale, viewScale);

      // Render the 3D field (reuse render3D internals)
      // We need a custom project function that adds extra tilt
      const savedProject = window._cutsceneTilt;
      window._cutsceneTilt = extraTilt;

      // Draw the surface, border, field lines, goals, nets, paddles
      // Using the actual render3D but within our transform
      const tl = project3D(0, 0, 0);
      const tr = project3D(W, 0, 0);
      const bl = project3D(0, H, 0);
      const br = project3D(W, H, 0);

      // Surface fill
      ctx.fillStyle = '#0c0c0c';
      ctx.beginPath();
      ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
      ctx.closePath();
      ctx.fill();

      // Neon border (team colored halves)
      ctx.save();
      const ml = project3D(0, H / 2, 0);
      const mt = project3D(W / 2, 0, 0);
      const mb = project3D(W / 2, H, 0);
      const mr = project3D(W, H / 2, 0);

      // Left half border (Italy blue)
      ctx.strokeStyle = activeLeftData.primary;
      ctx.shadowColor = activeLeftData.primary;
      ctx.shadowBlur = 15;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(mt.x, mt.y); ctx.lineTo(tl.x, tl.y);
      ctx.lineTo(bl.x, bl.y); ctx.lineTo(mb.x, mb.y);
      ctx.stroke();

      // Right half border (Germany white)
      ctx.strokeStyle = activeRightData.primary;
      ctx.shadowColor = activeRightData.primary;
      ctx.beginPath();
      ctx.moveTo(mt.x, mt.y); ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y); ctx.lineTo(mb.x, mb.y);
      ctx.stroke();
      ctx.restore();

      // Center line + circle
      ctx.save();
      ctx.strokeStyle = 'rgba(100,180,220,0.2)';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 6]);
      const ct = project3D(W / 2, 0, 0);
      const cb = project3D(W / 2, H, 0);
      ctx.beginPath();
      ctx.moveTo(ct.x, ct.y); ctx.lineTo(cb.x, cb.y);
      ctx.stroke();
      ctx.setLineDash([]);
      const cs = project3D(W / 2, H / 2, 0);
      const cRx = (mr.x - ml.x) * 0.08;
      const cRy = cRx * 0.7;
      ctx.beginPath();
      ctx.ellipse(cs.x, cs.y, cRx, cRy, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Paddles (projected as 3D blocks)
      allPaddles.forEach(p => {
        const team = p.isLeft ? leftTeam : rightTeam;
        const identity = team ? getZoneIdentity(p, team.data) : { zone: 'fwd', player: { num: '?', name: '???' } };
        const isKeeper = identity.zone === 'box';
        const teamColor = team ? team.data.primary : '#fff';
        const neonColor = isKeeper ? '#00ff88' : teamColor;
        const pcx = p.x + p.w / 2, pcy = p.y + p.h / 2;
        const hw = p.w * 1.8, hh = p.h * 0.85, blockH = 14;
        const b0 = project3D(pcx - hw, pcy - hh, 0);
        const b2 = project3D(pcx + hw, pcy + hh, 0);
        const t0 = project3D(pcx - hw, pcy - hh, blockH);
        const t1 = project3D(pcx + hw, pcy - hh, blockH);
        const t2 = project3D(pcx + hw, pcy + hh, blockH);
        const t3 = project3D(pcx - hw, pcy + hh, blockH);
        ctx.save();
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y);
        ctx.lineTo(t2.x, t2.y); ctx.lineTo(t3.x, t3.y);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });

      ctx.restore();

      // ── Team names overlay ──
      if (t >= CUTSCENE_TEXT_START && t < CUTSCENE_TEXT_END) {
        const textT = (t - CUTSCENE_TEXT_START) / (CUTSCENE_TEXT_END - CUTSCENE_TEXT_START);
        let alpha;
        if (textT < 0.2) alpha = textT / 0.2;
        else if (textT > 0.7) alpha = (1 - textT) / 0.3;
        else alpha = 1;
        alpha = Math.max(0, Math.min(1, alpha));

        const fontSize = Math.max(32, W * 0.045);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.shadowBlur = 25;
        ctx.shadowColor = activeLeftData.primary;
        ctx.fillStyle = activeLeftData.primary;
        ctx.fillText(activeLeftData.name.toUpperCase(), W * 0.35, H * 0.48);
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = alpha * 0.6;
        ctx.font = `bold ${fontSize * 0.5}px monospace`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#fff';
        ctx.fillStyle = '#fff';
        ctx.fillText('vs', W * 0.5, H * 0.48);
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.shadowBlur = 25;
        ctx.shadowColor = activeRightData.primary;
        ctx.fillStyle = activeRightData.primary;
        ctx.fillText(activeRightData.name.toUpperCase(), W * 0.65, H * 0.48);
        ctx.restore();
      }

      // Skip hint
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE to skip', W / 2, H - 15);
      ctx.restore();
    }

    // ═══════════════════════════════
    //  3D PERSPECTIVE RENDER
    // ═══════════════════════════════

    // Project a point from game-space (0..W, 0..H) onto the 3D trapezoid
    // The table is viewed from the front-right at ~30° down
    function project3D(gx, gy, gz) {
      // Normalize to 0..1
      const u = gx / W;
      const v = gy / H;

      // Table quad corners in screen space (trapezoid — far edge narrower)
      // Viewed from front-right, the left side is further away
      const margin = 0.04;
      const tableW = 1 - margin * 2;

      // Perspective squeeze: far edge (top) is narrower
      const squeeze = 0.18;  // how much the far edge narrows
      const tiltY = 0.12;    // vertical offset — far edge is higher

      // Far edge (top of field, v=0)
      const farL  = margin + squeeze;
      const farR  = 1 - margin - squeeze;
      const farY  = 0.10 + tiltY;

      // Near edge (bottom of field, v=1)
      const nearL = margin;
      const nearR = 1 - margin;
      const nearY = 0.88;

      // Bilinear interpolation across the quad
      const left  = farL  + (nearL - farL)  * v;
      const right = farR  + (nearR - farR)  * v;
      const yPos  = farY  + (nearY - farY)  * v;

      const sx = (left + (right - left) * u) * W;
      const sy = yPos * H;

      // Scale factor (objects at far edge are smaller)
      const scale = 0.55 + 0.45 * v;  // 0.55 at far, 1.0 at near

      // Z-axis (height above table — lobs)
      const zOffset = gz * scale * 0.8;

      return { x: sx, y: sy - zOffset, scale };
    }

    function render3D() {
      // ─── Background: dark room ───
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      // ─── Draw table body (black box below the playing surface) ───
      const bodyTop = H * 0.88;
      const bodyH = H * 0.18;

      // Table front face
      const tblL = W * 0.04;
      const tblR = W * 0.96;
      ctx.fillStyle = '#111';
      ctx.fillRect(tblL, bodyTop, tblR - tblL, bodyH);

      // Table leg cutout (arch in center)
      const legW = W * 0.30;
      const legH = bodyH * 0.65;
      const legX = (W - legW) / 2;
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.moveTo(legX, bodyTop + bodyH);
      ctx.lineTo(legX, bodyTop + bodyH - legH);
      ctx.quadraticCurveTo(W / 2, bodyTop + bodyH - legH - 10, legX + legW, bodyTop + bodyH - legH);
      ctx.lineTo(legX + legW, bodyTop + bodyH);
      ctx.closePath();
      ctx.fill();

      // ─── PONGBALL branding on table front (centered) ───
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(24, W * 0.035)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PONGBALL', W / 2, bodyTop + bodyH * 0.32);

      // Italia '90 with flag stripe
      ctx.font = `bold ${Math.max(11, W * 0.013)}px monospace`;
      ctx.fillStyle = '#ccc';
      ctx.fillText("ITALIA '90", W / 2, bodyTop + bodyH * 0.52);

      // Italian flag stripe (centered)
      const flagW = W * 0.05;
      const flagH = 3;
      const fx = W / 2 - flagW / 2;
      const fy = bodyTop + bodyH * 0.63;
      ctx.fillStyle = '#009246'; ctx.fillRect(fx, fy, flagW / 3, flagH);
      ctx.fillStyle = '#fff';    ctx.fillRect(fx + flagW / 3, fy, flagW / 3, flagH);
      ctx.fillStyle = '#CE2B37'; ctx.fillRect(fx + flagW * 2 / 3, fy, flagW / 3, flagH);
      ctx.restore();

      // ─── Art deco stripes on table sides ───
      ctx.save();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      // Left side stripe
      ctx.beginPath();
      ctx.moveTo(tblL + 8, bodyTop + 4);
      ctx.lineTo(tblL + 8, bodyTop + bodyH - 4);
      ctx.lineTo(tblL + 30, bodyTop + bodyH - 4);
      ctx.stroke();
      // Right side stripe
      ctx.beginPath();
      ctx.moveTo(tblR - 8, bodyTop + 4);
      ctx.lineTo(tblR - 8, bodyTop + bodyH - 4);
      ctx.lineTo(tblR - 30, bodyTop + bodyH - 4);
      ctx.stroke();
      ctx.restore();

      // ─── Draw the playing surface (perspective quad) ───
      // Surface is a filled trapezoid
      const tl = project3D(0, 0, 0);
      const tr = project3D(W, 0, 0);
      const bl = project3D(0, H, 0);
      const br = project3D(W, H, 0);

      ctx.save();
      ctx.fillStyle = '#0c0c0c';
      ctx.beginPath();
      ctx.moveTo(tl.x, tl.y);
      ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y);
      ctx.lineTo(bl.x, bl.y);
      ctx.closePath();
      ctx.fill();

      // ─── LED border strips (the signature neon glow) ───
      ctx.lineWidth = 4;

      // Left half border — team left color
      ctx.save();
      ctx.shadowColor = activeLeftData.primary;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = activeLeftData.primary;
      ctx.beginPath();
      const ml = project3D(0, H / 2, 0);
      const mt = project3D(W / 2, 0, 0);
      ctx.moveTo(ml.x, ml.y);
      ctx.lineTo(tl.x, tl.y);
      ctx.lineTo(mt.x, mt.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ml.x, ml.y);
      ctx.lineTo(bl.x, bl.y);
      const mb = project3D(W / 2, H, 0);
      ctx.lineTo(mb.x, mb.y);
      ctx.stroke();
      ctx.restore();

      // Right half border — team right color
      ctx.save();
      ctx.shadowColor = activeRightData.primary;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = activeRightData.primary;
      ctx.beginPath();
      const mr = project3D(W, H / 2, 0);
      ctx.moveTo(mr.x, mr.y);
      ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(mt.x, mt.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mr.x, mr.y);
      ctx.lineTo(br.x, br.y);
      ctx.lineTo(mb.x, mb.y);
      ctx.stroke();
      ctx.restore();

      // ─── Field lines (projected) ───
      ctx.save();
      ctx.shadowColor = 'rgba(100,200,255,0.6)';
      ctx.shadowBlur = 6;
      ctx.strokeStyle = 'rgba(100,200,255,0.30)';
      ctx.lineWidth = 1.2;

      // Center line (dashed)
      ctx.setLineDash([6, 6]);
      const ct = project3D(W / 2, 0, 0);
      const cb = project3D(W / 2, H, 0);
      ctx.beginPath(); ctx.moveTo(ct.x, ct.y); ctx.lineTo(cb.x, cb.y); ctx.stroke();
      ctx.setLineDash([]);

      // Center circle (approximate with projected points)
      const ccR = H * 0.12;
      const ccSteps = 32;
      ctx.beginPath();
      for (let i = 0; i <= ccSteps; i++) {
        const a = (i / ccSteps) * Math.PI * 2;
        const px = W / 2 + Math.cos(a) * ccR * (W / H);
        const py = H / 2 + Math.sin(a) * ccR;
        const p = project3D(px, py, 0);
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();

      // Center spot
      const cs = project3D(W / 2, H / 2, 0);
      ctx.fillStyle = 'rgba(100,200,255,0.5)';
      ctx.beginPath(); ctx.arc(cs.x, cs.y, 2 * cs.scale, 0, Math.PI * 2); ctx.fill();

      // Penalty areas
      const penW = W * 0.14;
      const penH = H * 0.56;
      const penTop = (H - penH) / 2;
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);

      // Left penalty area
      drawProjectedRect(glL, penTop, penW, penH);
      // Right penalty area
      drawProjectedRect(glR - penW, penTop, penW, penH);

      // Goal areas
      const gaW = penW * 0.42;
      const gaH = H * 0.32;
      const gaTop = (H - gaH) / 2;
      drawProjectedRect(glL, gaTop, gaW, gaH);
      drawProjectedRect(glR - gaW, gaTop, gaW, gaH);

      // Goal mouths (bright white)
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;

      const gt = goalTop(), gb = goalBottom();
      let p1 = project3D(glL, gt, 0);
      let p2 = project3D(glL, gb, 0);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

      p1 = project3D(glR, gt, 0);
      p2 = project3D(glR, gb, 0);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

      ctx.restore();

      // ─── Goal nets (projected) ───
      drawNets3D();

      // ─── Paddles (3D blocks, perspective-aligned) ───
      allPaddles.forEach(p => {
        const team = p.isLeft ? leftTeam : rightTeam;
        const identity = team ? getZoneIdentity(p, team.data) : { zone: 'fwd', player: { num: '?', name: '???' } };
        const isKeeper = identity.zone === 'box';
        const teamColor = team ? team.data.primary : '#fff';
        const neonColor = isKeeper ? '#00ff88' : teamColor;

        // Paddle game-space corners (enlarged for 3D visibility)
        const cx = p.x + p.w / 2;
        const cy = p.y + p.h / 2;
        let hw = p.w * 1.8;   // half-width — fatter
        let hh = p.h * 0.85; // half-height
        let blockH = 14;     // block height (z-axis)
        let pz = 0;           // paddle z-offset (for jumping)

        // Rubber squish animation on ball hit
        const bounceKey = p.isLeft ? 'left' : 'right';
        const bounce = paddleBounce[bounceKey];
        if (bounce) {
          const t = bounce.timer / 0.3;  // 1→0
          const squish = Math.sin(t * Math.PI * 3) * t * bounce.intensity;
          hw *= (1 + squish * 0.3);   // stretch width on hit
          hh *= (1 - squish * 0.15);  // compress height
          blockH *= (1 - squish * 0.2);
        }

        // Celebration jump animation
        if (goalCelebration && goalCelebration.paddle === p) {
          const ct = goalCelebration.timer;
          const jumpPhase = (CELEBRATION_TIME - ct) * 6;  // fast bouncing
          pz = Math.abs(Math.sin(jumpPhase)) * 40 * Math.min(ct / CELEBRATION_TIME, 1);
        }

        // Project all 8 corners of the 3D block (pz = jump offset)
        const b0 = project3D(cx - hw, cy - hh, pz);           // bottom-face top-left
        const b1 = project3D(cx + hw, cy - hh, pz);           // bottom-face top-right
        const b2 = project3D(cx + hw, cy + hh, pz);           // bottom-face bottom-right
        const b3 = project3D(cx - hw, cy + hh, pz);           // bottom-face bottom-left
        const t0 = project3D(cx - hw, cy - hh, pz + blockH);  // top-face top-left
        const t1 = project3D(cx + hw, cy - hh, pz + blockH);  // top-face top-right
        const t2 = project3D(cx + hw, cy + hh, pz + blockH);  // top-face bottom-right
        const t3 = project3D(cx - hw, cy + hh, pz + blockH);  // top-face bottom-left

        ctx.save();

        // Front face (bottom edge — the side facing the viewer)
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = p.isPlayer ? 16 : 8;
        ctx.fillStyle = neonColor;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(b2.x, b2.y); ctx.lineTo(b3.x, b3.y);
        ctx.lineTo(t3.x, t3.y); ctx.lineTo(t2.x, t2.y);
        ctx.closePath();
        ctx.fill();

        // Side faces (left and right edges)
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = neonColor;
        // Right side
        ctx.beginPath();
        ctx.moveTo(b1.x, b1.y); ctx.lineTo(b2.x, b2.y);
        ctx.lineTo(t2.x, t2.y); ctx.lineTo(t1.x, t1.y);
        ctx.closePath();
        ctx.fill();
        // Left side
        ctx.beginPath();
        ctx.moveTo(b0.x, b0.y); ctx.lineTo(b3.x, b3.y);
        ctx.lineTo(t3.x, t3.y); ctx.lineTo(t0.x, t0.y);
        ctx.closePath();
        ctx.fill();

        // Top face (the main visible surface)
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = p.isPlayer ? 22 : 12;
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y);
        ctx.lineTo(t2.x, t2.y); ctx.lineTo(t3.x, t3.y);
        ctx.closePath();
        ctx.fill();

        // Bright white top highlight
        ctx.shadowBlur = 0;
        ctx.fillStyle = neonColor;
        ctx.globalAlpha = 0.25;
        ctx.beginPath();
        ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y);
        ctx.lineTo(t2.x, t2.y); ctx.lineTo(t3.x, t3.y);
        ctx.closePath();
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.restore();
      });

      // ─── Ball (3D neon football, projected) ───
      if (goalPause <= 0 && ball) {
        const bz = ball.z;
        const ballLift = ball.size * 0.7;  // ball sits above table surface
        const bp = project3D(ball.x, ball.y, bz + ballLift);
        const r = (ball.size / 2) * bp.scale * 2.5 * (1 + bz / 300);

        // Ground shadow (grows dramatically with height)
        const gp = project3D(ball.x, ball.y, 0);
        const airFactor = Math.min(bz / 150, 1);  // 0→1 as ball rises
        const shadowAlpha = bz > 2 ? Math.max(0.08, 0.25 - bz / 600) : 0.15;
        const shadowSpread = 1.4 + airFactor * 2.0;  // shadow grows wider when high
        ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(gp.x, gp.y, r * shadowSpread, r * (0.4 + airFactor * 0.3), 0, 0, Math.PI * 2);
        ctx.fill();

        // Landing impact ring (expanding circle on bounce)
        if (landingImpact > 0) {
          const lp = project3D(landingX, landingY, 0);
          const ringR = (1 - landingImpact) * 60 * lp.scale;
          ctx.save();
          ctx.strokeStyle = `rgba(255,255,255,${landingImpact * 0.4})`;
          ctx.lineWidth = 2 * landingImpact;
          ctx.shadowColor = '#fff';
          ctx.shadowBlur = 8 * landingImpact;
          ctx.beginPath();
          ctx.ellipse(lp.x, lp.y, ringR, ringR * 0.35, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        // No ball trail in 3D mode

        ctx.save();

        // ── Main ball body — white sphere with 3D gradient ──
        const grad = ctx.createRadialGradient(
          bp.x - r * 0.25, bp.y - r * 0.3, r * 0.05,
          bp.x + r * 0.1, bp.y + r * 0.1, r
        );
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.4, '#f0f0f0');
        grad.addColorStop(0.7, '#cccccc');
        grad.addColorStop(1, '#888888');

        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 6 * bp.scale;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
        ctx.fill();

        // ── Football panel pattern ──
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(40,40,40,0.4)';
        ctx.lineWidth = Math.max(0.5, 1.0 * bp.scale);

        // Center pentagon (dark patch)
        const pentR = r * 0.32;
        ctx.fillStyle = 'rgba(30,30,30,0.4)';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i * 2 * Math.PI / 5) - Math.PI / 2;
          const px = bp.x + Math.cos(a) * pentR;
          const py = bp.y + Math.sin(a) * pentR * 0.85;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Seam lines from pentagon to edge
        for (let i = 0; i < 5; i++) {
          const a = (i * 2 * Math.PI / 5) - Math.PI / 2;
          const ix = bp.x + Math.cos(a) * pentR;
          const iy = bp.y + Math.sin(a) * pentR * 0.85;
          const ox = bp.x + Math.cos(a) * r * 0.8;
          const oy = bp.y + Math.sin(a) * r * 0.8 * 0.85;
          ctx.beginPath();
          ctx.moveTo(ix, iy);
          ctx.lineTo(ox, oy);
          ctx.stroke();
        }

        // ── Subtle edge glow ──
        ctx.shadowColor = 'rgba(200,220,255,0.3)';
        ctx.shadowBlur = 6 * bp.scale;
        ctx.strokeStyle = 'rgba(200,220,255,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
        ctx.stroke();

        // ── Specular highlight (top-left shine) ──
        const specGrad = ctx.createRadialGradient(
          bp.x - r * 0.3, bp.y - r * 0.35, 0,
          bp.x - r * 0.3, bp.y - r * 0.35, r * 0.55
        );
        specGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
        specGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.shadowBlur = 0;
        ctx.fillStyle = specGrad;
        ctx.beginPath();
        ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      // ─── Glass top edge (subtle reflection) ───
      ctx.save();
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tl.x - 3, tl.y - 3);
      ctx.lineTo(tr.x + 3, tr.y - 3);
      ctx.lineTo(br.x + 3, br.y + 3);
      ctx.lineTo(bl.x - 3, bl.y + 3);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      // ─── Scoreboard (above table, LED style) ───
      ctx.save();
      const scoreY = tl.y - 12;
      const teamNameY = scoreY - 22;

      // Get current player identities
      const leftId = leftTeam ? getZoneIdentity(leftTeam.paddle, leftTeam.data) : null;
      const rightId = rightTeam ? getZoneIdentity(rightTeam.paddle, rightTeam.data) : null;

      // Left team name + player — aligned to left court edge
      ctx.font = 'bold 13px monospace';
      ctx.shadowBlur = 8;
      ctx.shadowColor = activeLeftData.primary;
      ctx.fillStyle = activeLeftData.primary;
      ctx.textAlign = 'left';
      const leftLabel = leftId ? `${activeLeftData.short}  #${leftId.player.num} ${leftId.player.name.toUpperCase()}` : activeLeftData.short;
      ctx.fillText(leftLabel, tl.x, teamNameY);

      // Right team name + player — aligned to right court edge
      ctx.shadowColor = activeRightData.primary;
      ctx.fillStyle = activeRightData.primary;
      ctx.textAlign = 'right';
      const rightLabel = rightId ? `${rightId.player.name.toUpperCase()} #${rightId.player.num}  ${activeRightData.short}` : activeRightData.short;
      ctx.fillText(rightLabel, tr.x, teamNameY);

      // Score — centered, on its own line below team names
      ctx.textAlign = 'center';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px monospace';
      ctx.fillText(`${scoreL} - ${scoreR}`, W / 2, scoreY + 2);

      // Match timer — football minutes
      const displayMin3 = inInjuryTime ? `90+${Math.ceil(injuryTime - matchTimer)}'` : `${Math.floor(MATCH_TIME - matchTimer)}'`;
      ctx.font = 'bold 13px monospace';
      ctx.shadowBlur = 6;
      const isLate3 = inInjuryTime || matchTimer < 10;
      ctx.fillStyle = isLate3 ? '#f44' : '#aaa';
      ctx.shadowColor = isLate3 ? '#f44' : '#666';
      ctx.fillText(displayMin3, W / 2, scoreY + 22);
      ctx.restore();

      // ─── HUD (charge bar, projected near ball) ───
      if (spaceDown && (ballState === 'live' || ballState === 'held_player') && ball) {
        const hp = project3D(ball.x + ball.size + 4, ball.y - 10 - ball.z, 0);
        const maxCharge = 1.5;
        const charge = clamp(spaceHeldTime / maxCharge, 0, 1);
        const barW = 25 * hp.scale;
        const barH = 2 * hp.scale;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(hp.x, hp.y, barW, barH);
        ctx.save();
        ctx.shadowColor = charge < 0.6 ? '#0f0' : '#ff0';
        ctx.shadowBlur = 3;
        const cr = Math.round(255 * charge);
        const cg = Math.round(255 * (1 - charge * 0.4));
        ctx.fillStyle = `rgb(${cr},${cg},80)`;
        ctx.fillRect(hp.x, hp.y, barW * charge, barH);
        ctx.restore();
      }

      // ─── Foul indicator ───
      if (foulState) {
        const fp = project3D(foulState.x, foulState.y, 0);
        const alpha = Math.min(foulState.timer, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center';
        ctx.font = 'bold 20px monospace';
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff0';
        ctx.fillText(foulState.isPenalty ? 'PENALTY!' : 'FOUL!', fp.x, fp.y - 30 * fp.scale);
        // Yellow card flash
        const cardW = 12 * fp.scale, cardH = 16 * fp.scale;
        ctx.fillStyle = '#ff0';
        ctx.shadowBlur = 10;
        ctx.fillRect(fp.x - cardW / 2, fp.y - 55 * fp.scale, cardW, cardH);
        ctx.restore();
      }

      // ─── Goal celebration overlay ───
      if (goalCelebration) {
        const gc = goalCelebration;
        const progress = 1 - gc.timer / CELEBRATION_TIME;  // 0→1
        const fadeIn = Math.min(progress * 4, 1);           // quick fade in
        const fadeOut = Math.max(0, 1 - (progress - 0.7) / 0.3);  // fade out last 30%
        const alpha = Math.min(fadeIn, fadeOut);

        // Screen flash on goal (first moments)
        if (progress < 0.08) {
          ctx.save();
          ctx.globalAlpha = (1 - progress / 0.08) * 0.25;
          ctx.fillStyle = gc.team.primary;
          ctx.fillRect(0, 0, W, H);
          ctx.restore();
        }

        // "GOAL!" text
        ctx.save();
        const centerP = project3D(W / 2, H * 0.35, 0);
        const goalSize = 42 + Math.sin(progress * Math.PI * 4) * 4;

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `bold ${goalSize}px monospace`;
        ctx.shadowColor = gc.team.primary;
        ctx.shadowBlur = 30;
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = alpha;
        ctx.fillText('GOL!', centerP.x, centerP.y);
        // Second glow pass for intensity
        ctx.shadowBlur = 50;
        ctx.fillStyle = gc.team.primary;
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillText('GOL!', centerP.x, centerP.y);

        // Scorer name below
        const nameP = project3D(W / 2, H * 0.50, 0);
        const nameDelay = Math.max(0, (progress - 0.15) * 3);
        const nameAlpha = Math.min(nameDelay, 1) * fadeOut;
        ctx.font = 'bold 22px monospace';
        ctx.shadowColor = gc.team.primary;
        ctx.shadowBlur = 15;
        ctx.fillStyle = gc.team.primary;
        ctx.globalAlpha = nameAlpha;
        ctx.fillText(`#${gc.num} ${gc.scorer}`, nameP.x, nameP.y);

        ctx.restore();
      }

      // Game over overlay
      if (matchOver) drawGameOver();

      // ESC hint
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = menu', W / 2, H - 8);
    }

    // Helper: draw a projected rectangle outline
    function drawProjectedRect(x, y, w, h) {
      const p1 = project3D(x, y, 0);
      const p2 = project3D(x + w, y, 0);
      const p3 = project3D(x + w, y + h, 0);
      const p4 = project3D(x, y + h, 0);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.lineTo(p4.x, p4.y);
      ctx.closePath();
      ctx.stroke();
    }

    // ═══════════════════════════════════════════
    //  COFFEE TABLE MODE — Top-down arcade table
    // ═══════════════════════════════════════════

    // Helper: get coffee table layout dimensions
    function ctLayout() {
      const frameW = Math.max(30, Math.min(W, H) * 0.045);
      const padX = Math.max(8, W * 0.012);
      const padY = Math.max(8, H * 0.015);
      const tL = padX, tT = padY;
      const tW = W - padX * 2, tH = H - padY * 2;
      const sL = tL + frameW, sT = tT + frameW;
      const sW = tW - frameW * 2, sH = tH - frameW * 2;
      return { frameW, tL, tT, tW, tH, sL, sT, sW, sH };
    }

    function renderCoffeeTable() {
      const { frameW, tL, tT, tW, tH, sL, sT, sW, sH } = ctLayout();
      const tR = tL + tW, tB = tT + tH;
      const sR = sL + sW, sB = sT + sH;

      // ─── Room background (dark) ───
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, W, H);

      // ─── Table body (frame) ───
      ctx.fillStyle = '#0e0e0e';
      ctx.fillRect(tL, tT, tW, tH);

      // Slightly lighter inner bevel
      ctx.fillStyle = '#131313';
      ctx.fillRect(tL + 3, tT + 3, tW - 6, tH - 6);

      // ─── Art deco corner stripes ───
      const strW = Math.max(3, frameW * 0.09);
      const strLen = frameW * 0.7;
      ctx.save();
      // Outer corners (bright white L-shapes)
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = strW;
      ctx.lineCap = 'square';
      const co = 8; // corner offset from table edge
      // Top-left
      ctx.beginPath();
      ctx.moveTo(tL + co, tT + co + strLen);
      ctx.lineTo(tL + co, tT + co);
      ctx.lineTo(tL + co + strLen, tT + co);
      ctx.stroke();
      // Top-right
      ctx.beginPath();
      ctx.moveTo(tR - co, tT + co + strLen);
      ctx.lineTo(tR - co, tT + co);
      ctx.lineTo(tR - co - strLen, tT + co);
      ctx.stroke();
      // Bottom-left
      ctx.beginPath();
      ctx.moveTo(tL + co, tB - co - strLen);
      ctx.lineTo(tL + co, tB - co);
      ctx.lineTo(tL + co + strLen, tB - co);
      ctx.stroke();
      // Bottom-right
      ctx.beginPath();
      ctx.moveTo(tR - co, tB - co - strLen);
      ctx.lineTo(tR - co, tB - co);
      ctx.lineTo(tR - co - strLen, tB - co);
      ctx.stroke();

      // Inner parallel stripes (thinner, dimmer)
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = Math.max(1, strW * 0.5);
      const ci = co + strW + 4;
      const strLen2 = strLen * 0.8;
      // Top-left
      ctx.beginPath();
      ctx.moveTo(tL + ci, tT + ci + strLen2);
      ctx.lineTo(tL + ci, tT + ci);
      ctx.lineTo(tL + ci + strLen2, tT + ci);
      ctx.stroke();
      // Top-right
      ctx.beginPath();
      ctx.moveTo(tR - ci, tT + ci + strLen2);
      ctx.lineTo(tR - ci, tT + ci);
      ctx.lineTo(tR - ci - strLen2, tT + ci);
      ctx.stroke();
      // Bottom-left
      ctx.beginPath();
      ctx.moveTo(tL + ci, tB - ci - strLen2);
      ctx.lineTo(tL + ci, tB - ci);
      ctx.lineTo(tL + ci + strLen2, tB - ci);
      ctx.stroke();
      // Bottom-right
      ctx.beginPath();
      ctx.moveTo(tR - ci, tB - ci - strLen2);
      ctx.lineTo(tR - ci, tB - ci);
      ctx.lineTo(tR - ci - strLen2, tB - ci);
      ctx.stroke();
      ctx.restore();

      // ─── Branding: PONGBALL on bottom frame ───
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const brandY = (sB + tB) / 2;
      const brandSize = Math.max(13, frameW * 0.5);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${brandSize}px monospace`;
      ctx.fillText('PONGBALL', W / 2, brandY - frameW * 0.12);

      // "ITALIA '90"
      const subSize = Math.max(7, frameW * 0.24);
      ctx.font = `bold ${subSize}px monospace`;
      ctx.fillStyle = '#aaa';
      ctx.fillText("ITALIA '90", W / 2, brandY + frameW * 0.22);

      // Italian flag stripe
      const fW = frameW * 1.5;
      const fH = Math.max(2, frameW * 0.06);
      const fx = W / 2 - fW / 2;
      const fy = brandY + frameW * 0.38;
      ctx.fillStyle = '#009246'; ctx.fillRect(fx, fy, fW / 3, fH);
      ctx.fillStyle = '#fff';    ctx.fillRect(fx + fW / 3, fy, fW / 3, fH);
      ctx.fillStyle = '#CE2B37'; ctx.fillRect(fx + fW * 2 / 3, fy, fW / 3, fH);
      ctx.restore();

      // ─── Scoreboard on top frame ───
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const topY = (tT + sT) / 2;
      const scoreSize = Math.max(18, frameW * 0.58);
      const codeSize = Math.max(10, frameW * 0.32);
      const codeOff = Math.max(55, scoreSize * 3);

      // Score (centered)
      ctx.font = `bold ${scoreSize}px monospace`;
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#fff';
      ctx.fillText(`${scoreL} - ${scoreR}`, W / 2, topY);

      // Left team code
      ctx.font = `bold ${codeSize}px monospace`;
      ctx.textAlign = 'right';
      ctx.shadowColor = activeLeftData.primary;
      ctx.shadowBlur = 8;
      ctx.fillStyle = activeLeftData.primary;
      ctx.fillText(activeLeftData.short, W / 2 - codeOff, topY);

      // Right team code
      ctx.textAlign = 'left';
      ctx.shadowColor = activeRightData.primary;
      ctx.fillStyle = activeRightData.primary;
      ctx.fillText(activeRightData.short, W / 2 + codeOff, topY);

      // Clock (right side of top frame)
      const displayMinTop = inInjuryTime
        ? `90+${Math.ceil(injuryTime - matchTimer)}'`
        : `${Math.floor(MATCH_TIME - matchTimer)}'`;
      const isLateTop = inInjuryTime || matchTimer < 10;
      ctx.textAlign = 'right';
      ctx.font = `bold ${Math.max(10, frameW * 0.3)}px monospace`;
      ctx.fillStyle = isLateTop ? '#f44' : '#888';
      ctx.shadowColor = isLateTop ? '#f44' : '#444';
      ctx.shadowBlur = 4;
      ctx.fillText(displayMinTop, sR - 5, topY);
      ctx.restore();

      // ─── LED border strips (neon glow around surface edge) ───
      const ledOff = 1;
      ctx.save();
      ctx.lineWidth = Math.max(3, frameW * 0.08);
      const midX = (sL + sR) / 2;

      // Left half — team left color
      ctx.strokeStyle = activeLeftData.primary;
      ctx.shadowColor = activeLeftData.primary;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(midX, sT - ledOff);
      ctx.lineTo(sL - ledOff, sT - ledOff);
      ctx.lineTo(sL - ledOff, sB + ledOff);
      ctx.lineTo(midX, sB + ledOff);
      ctx.stroke();
      // Double glow pass
      ctx.shadowBlur = 8;
      ctx.stroke();

      // Right half — team right color
      ctx.strokeStyle = activeRightData.primary;
      ctx.shadowColor = activeRightData.primary;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(midX, sT - ledOff);
      ctx.lineTo(sR + ledOff, sT - ledOff);
      ctx.lineTo(sR + ledOff, sB + ledOff);
      ctx.lineTo(midX, sB + ledOff);
      ctx.stroke();
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.restore();

      // ─── Playing surface (game content, clipped & scaled) ───
      ctx.save();
      ctx.beginPath();
      ctx.rect(sL, sT, sW, sH);
      ctx.clip();
      ctx.translate(sL, sT);
      ctx.scale(sW / W, sH / H);

      // Render the standard 2D game elements
      drawField();
      drawNets();
      allPaddles.forEach(drawPaddle);
      drawBall();
      drawHUD();

      // Foul indicator (in game coordinates)
      if (foulState) {
        const alpha = Math.min(foulState.timer, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center';
        ctx.font = 'bold 24px monospace';
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff0';
        ctx.fillText(foulState.isPenalty ? 'PENALTY!' : 'FOUL!', foulState.x, foulState.y - 30);
        const cardW = 14, cardH = 18;
        ctx.fillRect(foulState.x - cardW / 2, foulState.y - 55, cardW, cardH);
        ctx.restore();
      }

      // Goal celebration (in game coordinates)
      if (goalCelebration) {
        const gc = goalCelebration;
        const progress = 1 - gc.timer / CELEBRATION_TIME;
        const fadeIn = Math.min(progress * 4, 1);
        const fadeOut = Math.max(0, 1 - (progress - 0.7) / 0.3);
        const alpha = Math.min(fadeIn, fadeOut);

        if (progress < 0.08) {
          ctx.save();
          ctx.globalAlpha = (1 - progress / 0.08) * 0.25;
          ctx.fillStyle = gc.team.primary;
          ctx.fillRect(0, 0, W, H);
          ctx.restore();
        }

        ctx.save();
        const goalSize = 48 + Math.sin(progress * Math.PI * 4) * 5;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `bold ${goalSize}px monospace`;
        ctx.shadowColor = gc.team.primary;
        ctx.shadowBlur = 30;
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = alpha;
        ctx.fillText('GOL!', W / 2, H * 0.38);
        ctx.shadowBlur = 50;
        ctx.fillStyle = gc.team.primary;
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillText('GOL!', W / 2, H * 0.38);

        // Scorer
        const nameDelay = Math.max(0, (progress - 0.15) * 3);
        const nameAlpha = Math.min(nameDelay, 1) * fadeOut;
        ctx.font = 'bold 22px monospace';
        ctx.shadowColor = gc.team.primary;
        ctx.shadowBlur = 15;
        ctx.fillStyle = gc.team.primary;
        ctx.globalAlpha = nameAlpha;
        ctx.fillText(`#${gc.num} ${gc.scorer}`, W / 2, H * 0.50);
        ctx.restore();
      }

      ctx.restore(); // end surface clip

      // ─── Glass reflection (subtle) ───
      ctx.save();
      const glassGrad = ctx.createLinearGradient(sL, sT, sL + sW * 0.6, sT + sH * 0.4);
      glassGrad.addColorStop(0, 'rgba(255,255,255,0.025)');
      glassGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = glassGrad;
      ctx.fillRect(sL, sT, sW, sH);
      ctx.restore();

      // ─── Player identities on side frames ───
      const leftId = leftTeam ? getZoneIdentity(leftTeam.paddle, leftTeam.data) : null;
      const rightId = rightTeam ? getZoneIdentity(rightTeam.paddle, rightTeam.data) : null;

      // Left frame — player's current identity
      if (leftId) {
        ctx.save();
        const lx = (tL + sL) / 2;
        ctx.translate(lx, sT + sH / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `bold ${Math.max(8, frameW * 0.24)}px monospace`;
        ctx.shadowColor = activeLeftData.primary;
        ctx.shadowBlur = 6;
        ctx.fillStyle = activeLeftData.primary;
        ctx.fillText(`#${leftId.player.num} ${leftId.player.name.toUpperCase()}`, 0, 0);
        ctx.restore();
      }

      // Right frame — AI's current identity
      if (rightId) {
        ctx.save();
        const rx = (sR + tR) / 2;
        ctx.translate(rx, sT + sH / 2);
        ctx.rotate(Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `bold ${Math.max(8, frameW * 0.24)}px monospace`;
        ctx.shadowColor = activeRightData.primary;
        ctx.shadowBlur = 6;
        ctx.fillStyle = activeRightData.primary;
        ctx.fillText(`#${rightId.player.num} ${rightId.player.name.toUpperCase()}`, 0, 0);
        ctx.restore();
      }

      // Game over overlay (full screen, on top)
      if (matchOver) drawGameOver();

      // ESC hint
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = menu', W / 2, H - 4);
    }

    // ─── COFFEE TABLE CUTSCENE ───
    // Starts from angled 3D view of the table, flattens to top-down
    function renderCTCutscene(now) {
      const t = now / 1000 - ctCutsceneStart;

      if (t >= CT_CUTSCENE_DUR) {
        ctCutsceneActive = false;
        lastTime = now;
        return;
      }

      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, W, H);

      // ── Phase timing ──
      // 0–1.5s: PONGBALL logo flicker
      // 1.0–3.0s: 3D table view fades in
      // 2.5–4.0s: perspective flattens to top-down
      // 3.5–4.5s: team names flash

      const LOGO_END = 1.8;
      const TABLE_START = 1.0;
      const FLATTEN_START = 2.5;
      const FLATTEN_END = 4.0;
      const TEXT_START = 3.5;
      const TEXT_END = 4.4;

      // ── Logo phase ──
      if (t < LOGO_END + 0.5) {
        const logoAlpha = t < LOGO_END
          ? Math.min(t * 2, 1)
          : Math.max(0, 1 - (t - LOGO_END) / 0.5);

        ctx.save();
        ctx.globalAlpha = logoAlpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const letters = 'PONGBALL';
        const fontSize = Math.max(48, W * 0.07);
        ctx.font = `bold ${fontSize}px monospace`;
        const totalW = ctx.measureText(letters).width;
        const startX = W / 2 - totalW / 2;

        for (let i = 0; i < letters.length; i++) {
          const letterDelay = i * 0.1;
          const letterT = Math.max(0, t - letterDelay);
          if (letterT <= 0) continue;

          let flicker = 1;
          if (letterT < 0.25) flicker = Math.sin(letterT * 45) > -0.2 ? 1 : 0.1;

          const charW = ctx.measureText(letters[i]).width;
          const cx = startX + ctx.measureText(letters.substring(0, i)).width + charW / 2;
          const cy = H * 0.42;

          ctx.save();
          ctx.globalAlpha = logoAlpha * flicker;
          ctx.shadowColor = '#88ddff';
          ctx.shadowBlur = 30 * flicker;
          ctx.fillStyle = '#fff';
          ctx.fillText(letters[i], cx, cy);
          ctx.shadowColor = '#fff';
          ctx.shadowBlur = 15 * flicker;
          ctx.fillText(letters[i], cx, cy);
          ctx.restore();
        }

        // "ITALIA '90"
        const subDelay = letters.length * 0.1 + 0.2;
        if (t > subDelay) {
          const subAlpha = Math.min((t - subDelay) * 3, 1) * logoAlpha;
          ctx.save();
          ctx.globalAlpha = subAlpha;
          ctx.font = `bold ${Math.max(14, W * 0.018)}px monospace`;
          ctx.shadowColor = '#fff';
          ctx.shadowBlur = 8;
          ctx.fillStyle = '#ccc';
          ctx.fillText("ITALIA '90", W / 2, H * 0.42 + fontSize * 0.7);

          const flagW = W * 0.06;
          const flagH = Math.max(2, fontSize * 0.05);
          const fx = W / 2 - flagW / 2;
          const fy = H * 0.42 + fontSize * 0.7 + fontSize * 0.25;
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#009246'; ctx.fillRect(fx, fy, flagW / 3, flagH);
          ctx.fillStyle = '#fff';    ctx.fillRect(fx + flagW / 3, fy, flagW / 3, flagH);
          ctx.fillStyle = '#CE2B37'; ctx.fillRect(fx + flagW * 2 / 3, fy, flagW / 3, flagH);
          ctx.restore();
        }

        ctx.restore();
      }

      // ── Table view (3D → flat transition) ──
      if (t < TABLE_START) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#fff';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE to skip', W / 2, H - 15);
        ctx.restore();
        return;
      }

      const tableReveal = Math.min((t - TABLE_START) / 0.8, 1);

      // Flatten progress (0 = 3D angled, 1 = flat top-down)
      const flatRaw = t < FLATTEN_START ? 0
        : Math.min((t - FLATTEN_START) / (FLATTEN_END - FLATTEN_START), 1);
      const flatEased = flatRaw < 0.5
        ? 4 * flatRaw * flatRaw * flatRaw
        : 1 - Math.pow(-2 * flatRaw + 2, 3) / 2;

      const { frameW, tL, tT, tW, tH, sL, sT, sW, sH } = ctLayout();
      const tR = tL + tW, tB = tT + tH;

      // ── 3D perspective parameters (lerp from angled to flat) ──
      // When flat=0: show angled 3D view. When flat=1: flat top-down coffee table
      const viewScale = 0.55 + flatEased * 0.45;
      const perspY = 0.30 * (1 - flatEased);   // how far down the table appears
      const tiltAmt = 0.12 * (1 - flatEased);  // perspective tilt amount

      // Table body (visible in 3D phase)
      const bodyAlpha = Math.max(0, 1 - flatEased * 1.8) * tableReveal;

      if (bodyAlpha > 0.01 && flatEased < 0.8) {
        ctx.save();
        ctx.globalAlpha = bodyAlpha;

        // 3D table surface area
        const surfW3 = W * viewScale * 0.92;
        const surfL3 = (W - surfW3) / 2;
        const surfR3 = surfL3 + surfW3;
        const surfT3 = H * (perspY + 0.10);
        const surfB3 = H * (perspY + 0.10 + viewScale * 0.60);

        const bTop = surfB3;
        const bH = H * 0.20 * (1 - flatEased);
        const bL = surfL3 - 8;
        const bR = surfR3 + 8;

        // Body fill
        ctx.fillStyle = '#0e0e0e';
        ctx.fillRect(bL, bTop, bR - bL, bH);

        // Legs
        ctx.fillStyle = '#050505';
        const legW3 = (bR - bL) * 0.22;
        const legH3 = bH * 0.6;
        ctx.beginPath();
        ctx.moveTo(bL + legW3 * 0.3, bTop + bH);
        ctx.lineTo(bL + legW3 * 0.3, bTop + bH - legH3);
        ctx.quadraticCurveTo(bL + legW3 * 1.2, bTop + bH - legH3 - 6, bL + legW3 * 2, bTop + bH - legH3);
        ctx.lineTo(bL + legW3 * 2, bTop + bH);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(bR - legW3 * 0.3, bTop + bH);
        ctx.lineTo(bR - legW3 * 0.3, bTop + bH - legH3);
        ctx.quadraticCurveTo(bR - legW3 * 1.2, bTop + bH - legH3 - 6, bR - legW3 * 2, bTop + bH - legH3);
        ctx.lineTo(bR - legW3 * 2, bTop + bH);
        ctx.closePath();
        ctx.fill();

        // Branding
        const brs = Math.max(18, surfW3 * 0.05);
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${brs}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PONGBALL', W / 2, bTop + bH * 0.30);
        ctx.font = `bold ${brs * 0.4}px monospace`;
        ctx.fillStyle = '#ccc';
        ctx.fillText("ITALIA '90", W / 2, bTop + bH * 0.50);

        // Flag
        const fw3 = surfW3 * 0.07;
        const fh3 = Math.max(2, brs * 0.07);
        const fx3 = W / 2 - fw3 / 2;
        const fy3 = bTop + bH * 0.62;
        ctx.fillStyle = '#009246'; ctx.fillRect(fx3, fy3, fw3 / 3, fh3);
        ctx.fillStyle = '#fff';    ctx.fillRect(fx3 + fw3 / 3, fy3, fw3 / 3, fh3);
        ctx.fillStyle = '#CE2B37'; ctx.fillRect(fx3 + fw3 * 2 / 3, fy3, fw3 / 3, fh3);

        // Art deco stripes on body
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(2, brs * 0.07);
        ctx.beginPath();
        ctx.moveTo(bL + 10, bTop + 4);
        ctx.lineTo(bL + 10, bTop + bH * 0.7);
        ctx.lineTo(bL + 32, bTop + bH * 0.7);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bR - 10, bTop + 4);
        ctx.lineTo(bR - 10, bTop + bH * 0.7);
        ctx.lineTo(bR - 32, bTop + bH * 0.7);
        ctx.stroke();

        ctx.restore();
      }

      // ── Surface (interpolated between 3D trapezoid and flat rect) ──
      ctx.save();
      ctx.globalAlpha = tableReveal;

      // 3D angled surface corners (when flat=0)
      const squeeze3d = 0.15 * (1 - flatEased);
      const yShift3d = perspY * (1 - flatEased);
      const margin3d = 0.04;

      // 3D corners (trapezoid)
      const farL3 = W * (margin3d + squeeze3d);
      const farR3 = W * (1 - margin3d - squeeze3d);
      const farY3 = H * (0.12 + yShift3d);
      const nearL3 = W * margin3d;
      const nearR3 = W * (1 - margin3d);
      const nearY3 = H * (0.85 + yShift3d * 0.2);

      // Flat target corners (coffee table surface rect)
      // Lerp between 3D and flat
      const c_tl_x = farL3 + (sL - farL3) * flatEased;
      const c_tl_y = farY3 + (sT - farY3) * flatEased;
      const c_tr_x = farR3 + (sL + sW - farR3) * flatEased;
      const c_tr_y = farY3 + (sT - farY3) * flatEased;
      const c_bl_x = nearL3 + (sL - nearL3) * flatEased;
      const c_bl_y = nearY3 + (sT + sH - nearY3) * flatEased;
      const c_br_x = nearR3 + (sL + sW - nearR3) * flatEased;
      const c_br_y = nearY3 + (sT + sH - nearY3) * flatEased;

      // Surface fill
      ctx.fillStyle = '#080808';
      ctx.beginPath();
      ctx.moveTo(c_tl_x, c_tl_y);
      ctx.lineTo(c_tr_x, c_tr_y);
      ctx.lineTo(c_br_x, c_br_y);
      ctx.lineTo(c_bl_x, c_bl_y);
      ctx.closePath();
      ctx.fill();

      // LED border
      ctx.lineWidth = Math.max(3, 4 * viewScale);
      const midSx = (c_tl_x + c_tr_x) / 2;
      const midSy_t = (c_tl_y + c_tr_y) / 2;
      const midBx = (c_bl_x + c_br_x) / 2;
      const midBy_b = (c_bl_y + c_br_y) / 2;

      ctx.save();
      ctx.shadowColor = activeLeftData.primary;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = activeLeftData.primary;
      ctx.beginPath();
      ctx.moveTo(midSx, midSy_t);
      ctx.lineTo(c_tl_x, c_tl_y);
      ctx.lineTo(c_bl_x, c_bl_y);
      ctx.lineTo(midBx, midBy_b);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.shadowColor = activeRightData.primary;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = activeRightData.primary;
      ctx.beginPath();
      ctx.moveTo(midSx, midSy_t);
      ctx.lineTo(c_tr_x, c_tr_y);
      ctx.lineTo(c_br_x, c_br_y);
      ctx.lineTo(midBx, midBy_b);
      ctx.stroke();
      ctx.restore();

      // Simple field lines on the surface
      ctx.strokeStyle = 'rgba(100,180,220,0.2)';
      ctx.lineWidth = 1;
      // Center line
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(midSx, midSy_t);
      ctx.lineTo(midBx, midBy_b);
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles (simplified dots)
      allPaddles.forEach(p => {
        const u = (p.x + p.w / 2) / W;
        const v = (p.y + p.h / 2) / H;
        // Bilinear interpolation on the quad
        const px = c_tl_x * (1-u) * (1-v) + c_tr_x * u * (1-v) + c_bl_x * (1-u) * v + c_br_x * u * v;
        const py = c_tl_y * (1-u) * (1-v) + c_tr_y * u * (1-v) + c_bl_y * (1-u) * v + c_br_y * u * v;
        const team = p.isLeft ? leftTeam : rightTeam;
        const teamColor = team ? team.data.primary : '#fff';
        ctx.save();
        ctx.shadowColor = teamColor;
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#fff';
        ctx.fillRect(px - 3, py - 6, 6, 12);
        ctx.restore();
      });

      ctx.restore();

      // ── Table frame (fading in as we approach flat) ──
      if (flatEased > 0.3) {
        const frameAlpha = Math.min((flatEased - 0.3) / 0.4, 1) * tableReveal;
        ctx.save();
        ctx.globalAlpha = frameAlpha;

        // Draw simplified frame
        ctx.fillStyle = '#0e0e0e';
        // Top
        ctx.fillRect(tL, tT, tW, sT - tT);
        // Bottom
        ctx.fillRect(tL, sT + sH, tW, tB - sT - sH);
        // Left
        ctx.fillRect(tL, sT, sL - tL, sH);
        // Right
        ctx.fillRect(sL + sW, sT, tR - sL - sW, sH);

        // LED strips (on the frame)
        ctx.lineWidth = 3;
        const midFx = (sL + sL + sW) / 2;
        ctx.strokeStyle = activeLeftData.primary;
        ctx.shadowColor = activeLeftData.primary;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(midFx, sT - 1);
        ctx.lineTo(sL - 1, sT - 1);
        ctx.lineTo(sL - 1, sT + sH + 1);
        ctx.lineTo(midFx, sT + sH + 1);
        ctx.stroke();
        ctx.strokeStyle = activeRightData.primary;
        ctx.shadowColor = activeRightData.primary;
        ctx.beginPath();
        ctx.moveTo(midFx, sT - 1);
        ctx.lineTo(sL + sW + 1, sT - 1);
        ctx.lineTo(sL + sW + 1, sT + sH + 1);
        ctx.lineTo(midFx, sT + sH + 1);
        ctx.stroke();

        ctx.restore();
      }

      // ── Team names flash ──
      if (t >= TEXT_START && t < TEXT_END) {
        const textT = (t - TEXT_START) / (TEXT_END - TEXT_START);
        let alpha;
        if (textT < 0.2) alpha = textT / 0.2;
        else if (textT > 0.7) alpha = (1 - textT) / 0.3;
        else alpha = 1;
        alpha = Math.max(0, Math.min(1, alpha));

        const fontSize = Math.max(24, W * 0.032);
        ctx.textBaseline = 'middle';

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.shadowBlur = 25;
        ctx.shadowColor = activeLeftData.primary;
        ctx.fillStyle = activeLeftData.primary;
        ctx.textAlign = 'right';
        ctx.fillText(activeLeftData.name.toUpperCase(), W * 0.47, H * 0.48);
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = alpha * 0.6;
        ctx.font = `bold ${fontSize * 0.45}px monospace`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#fff';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText('vs', W * 0.50, H * 0.48);
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.shadowBlur = 25;
        ctx.shadowColor = activeRightData.primary;
        ctx.fillStyle = activeRightData.primary;
        ctx.textAlign = 'left';
        ctx.fillText(activeRightData.name.toUpperCase(), W * 0.53, H * 0.48);
        ctx.restore();
      }

      // Skip hint
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE to skip', W / 2, H - 15);
      ctx.restore();
    }

    // ─── MAIN LOOP ───
    function loop(now) {
      if (gameMode === 'menu') {
        renderMenu();
      } else if (gameMode === 'worldcup') {
        renderWorldCup();
      } else if (cutsceneActive) {
        renderCutscene(now);
      } else if (ctCutsceneActive) {
        renderCTCutscene(now);
      } else if (gameMode === 'coffeetable') {
        update(now);
        renderCoffeeTable();
      } else if (gameMode === 'match3d') {
        update(now);
        render3D();
      } else if (gameMode === 'wc_match') {
        update(now);
        render();
      } else {
        update(now);
        render();
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
