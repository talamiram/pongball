<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PongBall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; background: #000; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W, H;
    let leftTeam = null, rightTeam = null;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      if (leftTeam) repositionAll();
    }
    resize();
    window.addEventListener('resize', resize);

    // ═══════════════════════════════════════════
    //  GAME MODE: 'menu' | 'match' | 'physics'
    // ═══════════════════════════════════════════
    let gameMode = 'menu';
    let menuSelection = 0;  // 0 = match, 1 = physics, 2 = worldcup

    // ─── TEAMS: ITALIA 90 SEMIFINAL ───
    // Stats: speed (movement multiplier), reaction (ball tracking), size (paddle height multiplier)
    const TEAM_LEFT = {
      name: 'Argentina', short: 'ARG',
      primary: '#75AADB', secondary: '#fff',
      kit: { head: '#75AADB', jersey: '#1a2a4a', shorts: '#75AADB', boots: '#000' },
      gk:  { num: 12, name: 'Goycochea', stats: { speed: 0.7, reaction: 0.75, size: 1.0 } },
      def: [
        { num: 14, name: 'Giusti',          stats: { speed: 0.65, reaction: 0.70, size: 1.0 } },
        { num: 18, name: 'Serrizuela',      stats: { speed: 0.60, reaction: 0.65, size: 1.05 } },
        { num: 19, name: 'Ruggeri',         stats: { speed: 0.60, reaction: 0.75, size: 1.1 } },
        { num: 16, name: 'Olarticoechea',   stats: { speed: 0.70, reaction: 0.70, size: 0.95 } }
      ],
      mid: [
        { num: 20, name: 'Simón',           stats: { speed: 0.65, reaction: 0.65, size: 1.0 } },
        { num: 4,  name: 'Basualdo',        stats: { speed: 0.70, reaction: 0.70, size: 1.0 } },
        { num: 7,  name: 'Burruchaga',      stats: { speed: 0.80, reaction: 0.80, size: 0.95 } },
        { num: 6,  name: 'Calderón',        stats: { speed: 0.65, reaction: 0.65, size: 1.0 } }
      ],
      fwd: [
        { num: 10, name: 'Maradona', captain: true, stats: { speed: 0.95, reaction: 0.95, size: 1.0 } },
        { num: 8,  name: 'Caniggia',        stats: { speed: 1.0, reaction: 0.80, size: 0.9 } }
      ]
    };

    const TEAM_RIGHT = {
      name: 'Italy', short: 'ITA',
      primary: '#003DA5', secondary: '#fff',
      kit: { head: '#fff', jersey: '#003DA5', shorts: '#fff', boots: '#003DA5' },
      gk:  { num: 1,  name: 'Zenga',        stats: { speed: 0.7, reaction: 0.70, size: 1.0 } },
      def: [
        { num: 2,  name: 'Bergomi',         stats: { speed: 0.65, reaction: 0.75, size: 1.05 } },
        { num: 6,  name: 'Baresi', captain: true, stats: { speed: 0.60, reaction: 0.95, size: 1.2 } },
        { num: 5,  name: 'Ferri',           stats: { speed: 0.70, reaction: 0.70, size: 1.0 } },
        { num: 3,  name: 'Maldini',         stats: { speed: 0.90, reaction: 0.85, size: 1.0 } }
      ],
      mid: [
        { num: 7,  name: 'Donadoni',        stats: { speed: 0.75, reaction: 0.75, size: 0.95 } },
        { num: 8,  name: 'De Napoli',       stats: { speed: 0.70, reaction: 0.70, size: 1.0 } },
        { num: 16, name: 'Berti',           stats: { speed: 0.75, reaction: 0.70, size: 1.0 } },
        { num: 11, name: 'Giannini',        stats: { speed: 0.80, reaction: 0.80, size: 0.95 } }
      ],
      fwd: [
        { num: 19, name: 'Schillaci',       stats: { speed: 0.85, reaction: 0.85, size: 1.0 } },
        { num: 15, name: 'Baggio',          stats: { speed: 0.90, reaction: 0.90, size: 1.0 } }
      ]
    };

    // ─── CONSTANTS ───
    const PADDLE_W_GK = 12;
    const PADDLE_W_OF = 12;
    const GK_H_RATIO = 0.07;
    const OUTFIELD_H_RATIO = 0.07;
    const BALL_SIZE = 7;

    const BALL_SPEED = 0.30;
    const BALL_MAX_SPEED = 0.60;
    const BALL_ACCEL = 1.03;
    const MAX_BOUNCE_ANGLE = Math.PI / 3;
    const HOLD_TIME_LIMIT = 2.0;

    const GRAVITY = 500;                // was 900 — lower so lobs travel further
    const LOB_POWER = 1.2;              // was 0.9 — stronger lobs reach the far wall
    const AIR_THRESHOLD = 10;

    const GOAL_HEIGHT_RATIO = 0.30;
    const POST_THICK = 6;
    const GOAL_DEPTH = 18;

    const GK_SKILL_LEFT = 0.72;
    const GK_SKILL_RIGHT = 0.68;
    const OF_SPEED_RATIO = 0.45;
    const GK_SPEED_RATIO = 0.40;

    const FORM_X = {
      gkL: 0.06, defL: 0.14, midL: 0.30, fwdL: 0.43,
      gkR: 0.94, defR: 0.86, midR: 0.70, fwdR: 0.57
    };

    // ─── STATE ───
    let scoreL = 0, scoreR = 0;
    // Perspective transform functions (set by drawField in match mode)
    let _toScreen = (gx, gy) => ({ x: gx, y: gy });
    let _perspScale = (gy) => 1;
    let ball;
    let allPaddles = [];

    let ballState = 'on_gk';
    let holdPaddle = null;
    let holdOffsetY = 0;
    let holdTimer = 0;
    let serveFromLeft = true;
    let goalPause = 0;

    let playerVelY = 0;
    let playerPrevY = 0;

    const keys = {};
    const justReleased = {};
    let spaceHeldTime = 0;
    let spaceDown = false;

    // Debug stats for physics mode
    let lastShotChargeTime = 0;
    let lastShotMaxZ = 0;
    let currentMaxZ = 0;

    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' && !spaceDown) {
        spaceDown = true;
        spaceHeldTime = 0;
      }
      // Menu input
      if (gameMode === 'menu') {
        if (e.code === 'ArrowUp') {
          menuSelection = (menuSelection + 2) % 3;
        }
        if (e.code === 'ArrowDown') {
          menuSelection = (menuSelection + 1) % 3;
        }
        if (e.code === 'Enter' || e.code === 'Space') {
          startGame(['match', 'physics', 'worldcup'][menuSelection]);
        }
        if (e.code === 'Digit1') startGame('match');
        if (e.code === 'Digit2') startGame('physics');
        if (e.code === 'Digit3') startGame('worldcup');
      }
      // ESC back to menu
      if (e.code === 'Escape' && gameMode !== 'menu') {
        gameMode = 'menu';
      }
      e.preventDefault();
    });
    window.addEventListener('keyup', e => {
      keys[e.code] = false;
      justReleased[e.code] = true;
      if (e.code === 'Space') spaceDown = false;
    });

    function consumeRelease(code) {
      if (justReleased[code]) { justReleased[code] = false; return true; }
      return false;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ─── GOAL GEOMETRY ───
    function goalTop()    { return H / 2 - H * GOAL_HEIGHT_RATIO / 2; }
    function goalBottom() { return H / 2 + H * GOAL_HEIGHT_RATIO / 2; }

    // ─── BUILD TEAM ───
    function makePaddle(info, role, isLeft, homeXRatio, homeYRatio, teamData) {
      const w = role === 'gk' ? PADDLE_W_GK : PADDLE_W_OF;
      const hRatio = role === 'gk' ? GK_H_RATIO : OUTFIELD_H_RATIO;
      const h = H * hRatio;
      const homeX = W * homeXRatio - w / 2;
      const homeY = H * homeYRatio - h / 2;

      return {
        num: info.num, name: info.name, captain: info.captain || false,
        role, isLeft, isGK: role === 'gk',
        isPlayer: info._isPlayer || false,
        isMainFwd: info._isMainFwd || false,
        x: homeX, y: homeY, w, h,
        homeX, homeY, homeXRatio, homeYRatio,
        hRatio,
        color: teamData.primary,
        teamName: teamData.short
      };
    }

    // ─── ZONE IDENTITY: resolve which player the paddle "is" based on position ───
    function getZoneIdentity(paddle, teamData) {
      const xRatio = (paddle.x + paddle.w / 2) / W;
      const yRatio = (paddle.y + paddle.h / 2) / H;
      const isLeft = paddle.isLeft;

      // X zones (left team; right team is mirrored)
      const x = isLeft ? xRatio : (1 - xRatio);
      let zone, zoneList;
      if (x < 0.22) {
        zone = 'def'; zoneList = teamData.def;
      } else if (x < 0.38) {
        zone = 'mid'; zoneList = teamData.mid;
      } else {
        zone = 'fwd'; zoneList = teamData.fwd;
      }

      // Y position picks specific player within the zone
      let idx = 0;
      if (zoneList.length === 4) {
        const bands = [0.265, 0.50, 0.735];
        if (yRatio < bands[0]) idx = 0;
        else if (yRatio < bands[1]) idx = 1;
        else if (yRatio < bands[2]) idx = 2;
        else idx = 3;
      } else if (zoneList.length === 2) {
        idx = yRatio < 0.5 ? 0 : 1;
      }

      const player = zoneList[idx];
      return { zone, player, stats: player.stats };
    }

    function buildTeam(td, isLeft, physicsMode) {
      const side = isLeft ? 'L' : 'R';
      const gk = makePaddle(td.gk, 'gk', isLeft, FORM_X['gk' + side], 0.5, td);
      const players = [];

      // Physics mode right team: GK only
      if (physicsMode && !isLeft) {
        return { gk, players: [], mainFwd: null, data: td, isLeft };
      }

      // Both modes: one main forward per team
      const mainInfo = { ...td.fwd[0], _isMainFwd: true };
      if (isLeft) mainInfo._isPlayer = true;
      players.push(makePaddle(mainInfo, 'fwd', isLeft, FORM_X['fwd' + side], 0.5, td));

      const mainFwd = players.find(p => p.isMainFwd);
      return { gk, players, mainFwd, data: td, isLeft };
    }

    function repositionAll() {
      [leftTeam, rightTeam].forEach(team => {
        if (!team) return;
        const gk = team.gk;
        gk.h = H * gk.hRatio;
        gk.w = PADDLE_W_GK;
        gk.homeX = W * gk.homeXRatio - gk.w / 2;
        gk.homeY = H * gk.homeYRatio - gk.h / 2;
        gk.x = gk.homeX;

        team.players.forEach(p => {
          p.h = H * p.hRatio;
          p.w = PADDLE_W_OF;
          p.homeX = W * p.homeXRatio - p.w / 2;
          p.homeY = H * p.homeYRatio - p.h / 2;
        });
      });
      rebuildPaddleList();
    }

    function rebuildPaddleList() {
      allPaddles = [];
      [leftTeam, rightTeam].forEach(t => {
        if (!t) return;
        allPaddles.push(t.gk);
        t.players.forEach(p => allPaddles.push(p));
      });
    }

    // ─── INIT ───
    function startGame(mode) {
      gameMode = mode;
      if (mode === 'worldcup') return;  // World Cup has its own screen flow
      const isPhysics = mode === 'physics';
      leftTeam = buildTeam(TEAM_LEFT, true, isPhysics);
      rightTeam = buildTeam(TEAM_RIGHT, false, isPhysics);
      rebuildPaddleList();
      ball = { x: 0, y: 0, vx: 0, vy: 0, z: 0, vz: 0, size: BALL_SIZE };
      scoreL = 0; scoreR = 0;
      lastShotChargeTime = 0; lastShotMaxZ = 0; currentMaxZ = 0;
      resetAfterGoal(true);
      lastTime = performance.now();
    }

    function resetAfterGoal(servingLeft) {
      serveFromLeft = servingLeft;
      ballState = 'on_gk';
      holdPaddle = null;
      holdTimer = 0;
      if (ball) { ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0; }
      goalPause = 0.8;
      aiServeTimer = 0;
      currentMaxZ = 0;

      [leftTeam, rightTeam].forEach(team => {
        if (!team) return;
        team.players.forEach(p => { p.x = p.homeX; p.y = p.homeY; });
      });
    }

    // ─── SERVE FROM GK ───
    // Shot power curve: medium charge = "shot" (speed boost + lob), long charge = pure high lob
    // Sweet spot ~0.15-0.4s for aimed shots (top corners), >0.5s = lob over everyone
    function shotSpeedMult(charge) {
      if (charge < 0.05) return 1.0;       // tap = flat pass, normal speed
      if (charge < 0.15) return 1.1 + (charge - 0.05) * 4;  // ramp up
      if (charge < 0.40) return 1.5;       // SWEET SPOT — "shot" power
      return 1.5 - (charge - 0.40) * 1.5;  // taper off — pure lob, less forward speed
    }

    function serveFromGK(chargeTime) {
      const team = serveFromLeft ? leftTeam : rightTeam;
      const gk = team.gk;
      const dir = serveFromLeft ? 1 : -1;
      const charge = chargeTime || 0;

      const speedMult = shotSpeedMult(charge);
      const speed = W * BALL_SPEED * speedMult;

      // Arrow keys aim the serve (read at release)
      let aimY = 0;
      if (serveFromLeft) {
        if (keys['ArrowUp'])   aimY = -0.7;
        if (keys['ArrowDown']) aimY =  0.7;
      } else {
        aimY = (Math.random() - 0.5) * 0.3;
      }

      ball.x = serveFromLeft ? gk.x + gk.w + ball.size / 2 + 2
                             : gk.x - ball.size / 2 - 2;
      ball.vx = Math.cos(aimY) * speed * dir;
      ball.vy = Math.sin(aimY) * speed;
      ball.z = 0;
      ball.vz = charge * H * LOB_POWER;

      lastShotChargeTime = charge;
      currentMaxZ = 0;
      ballState = 'live';
    }

    let aiServeTimer = 0;

    // ─── SHOOT FROM PADDLE ───
    function shootFromPaddle(paddle, isLeft, chargeTime) {
      const dir = isLeft ? 1 : -1;
      const charge = chargeTime || 0;

      const speed = W * BALL_SPEED * 1.15;

      // Arrow keys aim the shot (read at release)
      let aimY = 0;
      if (paddle.isPlayer) {
        if (keys['ArrowUp'])   aimY = -0.6;
        if (keys['ArrowDown']) aimY =  0.6;
      }
      const angle = aimY;

      ball.vx = Math.cos(angle) * speed * dir;
      ball.vy = Math.sin(angle) * speed;
      ball.z = 0;

      // Down = cancel lob (hard low drive), Up = boost lob
      let lobMult = 1.0;
      if (paddle.isPlayer) {
        if (keys['ArrowDown']) lobMult = 0.0;  // hard flat shot
        if (keys['ArrowUp'])   lobMult = 1.4;  // extra high lob
      }
      ball.vz = charge * H * LOB_POWER * lobMult;

      lastShotChargeTime = charge;
      currentMaxZ = 0;
      ballState = 'live';
      holdPaddle = null;
      holdTimer = 0;
    }

    // ─── VOLLEY — first-time shot, no catch ───
    // Space is held when ball contacts paddle = immediate directed shot
    function volleyShot(paddle, isLeft) {
      const dir = isLeft ? 1 : -1;
      const speed = W * BALL_SPEED * 1.3;  // harder than a normal shot

      // Direction from arrow keys at moment of contact
      let aimY = 0;
      if (keys['ArrowUp'])   aimY = -0.6;
      if (keys['ArrowDown']) aimY =  0.6;
      const angle = aimY;

      ball.vx = Math.cos(angle) * speed * dir;
      ball.vy = Math.sin(angle) * speed;

      // Lob from charge, but Down = hard flat volley
      ball.z = 0;
      let lobMult = 1.0;
      if (keys['ArrowDown']) lobMult = 0.0;
      if (keys['ArrowUp'])   lobMult = 1.4;
      ball.vz = spaceHeldTime * H * LOB_POWER * lobMult;

      lastShotChargeTime = spaceHeldTime;
      currentMaxZ = 0;
      spaceHeldTime = 0;
      ballState = 'live';
      holdPaddle = null;
    }

    // ─── GK AI ───
    function gkAI(team, skill, dt) {
      const gk = team.gk;
      if (ballState === 'on_gk' && serveFromLeft && team.isLeft) return;

      const maxSpeed = H * GK_SPEED_RATIO * skill;
      const cy = gk.y + gk.h / 2;
      const onThisSide = team.isLeft ? (ball.vx < 0) : (ball.vx > 0);
      const active = onThisSide || ballState !== 'live';
      const target = active ? ball.y : H / 2;
      const lag = active ? (1.0 - skill * 0.7) : 0.95;
      const effective = cy + (target - cy) * (1 - lag);
      const diff = effective - cy;
      const move = Math.sign(diff) * Math.min(Math.abs(diff), maxSpeed * dt);
      gk.y = clamp(gk.y + move, 0, H - gk.h);
    }

    // ─── OUTFIELD AI (right team's single paddle) ───
    let aiShootTimer = 0;

    function outfieldAI(paddle, dt) {
      if (paddle.isPlayer) return;

      // Get zone-based stats from current position
      const identity = getZoneIdentity(paddle, rightTeam.data);
      const stats = identity.stats;
      const speed = H * OF_SPEED_RATIO * 0.7 * (0.6 + stats.speed * 0.8);
      const cy = paddle.y + paddle.h / 2;

      // Normal movement: track ball with reaction-based lag
      const reactionMult = 0.5 + stats.reaction * 0.5;
      let targetY = H / 2;
      if (ballState === 'live') {
        targetY = ball.y;
      }

      const diff = (targetY - cy) * reactionMult;
      paddle.y += Math.sign(diff) * Math.min(Math.abs(diff), speed * dt);
      paddle.y = clamp(paddle.y, 0, H - paddle.h);

      // X-movement: push forward when ball is on opponent side, retreat when defending
      const ballOnThisSide = ball.x > W / 2;
      const idealX = ballOnThisSide
        ? paddle.homeX - 30
        : paddle.homeX + 40;
      const xSpeed = speed * 0.3;
      paddle.x += Math.sign(idealX - paddle.x) * Math.min(Math.abs(idealX - paddle.x), xSpeed * dt);
      paddle.x = clamp(paddle.x, W * 0.52, rightTeam.gk.x - paddle.w - 10);
    }

    // ─── PADDLE COLLISION ───
    function hitPaddle(p) {
      if (ball.x + ball.size / 2 > p.x &&
          ball.x - ball.size / 2 < p.x + p.w &&
          ball.y + ball.size / 2 > p.y &&
          ball.y - ball.size / 2 < p.y + p.h) {

        if (p.isLeft || ball.x < p.x + p.w / 2) {
          ball.x = p.x + p.w + ball.size / 2 + 1;
        } else {
          ball.x = p.x - ball.size / 2 - 1;
        }

        const hitPos = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
        const angle = clamp(hitPos, -1, 1) * MAX_BOUNCE_ANGLE;
        const currentSpeed = Math.hypot(ball.vx, ball.vy);
        const newSpeed = Math.min(currentSpeed * BALL_ACCEL, W * BALL_MAX_SPEED);
        const deflectDir = p.isLeft ? 1 : -1;

        ball.vx = Math.cos(angle) * newSpeed * deflectDir;
        ball.vy = Math.sin(angle) * newSpeed;
        if (p.isPlayer) ball.vy += playerVelY * 0.3;

        return true;
      }
      return false;
    }

    // ─── GOAL POST COLLISION ───
    function checkGoalPosts() {
      const gt = goalTop();
      const gb = goalBottom();

      if (ball.x - ball.size / 2 < GOAL_DEPTH) {
        if (ball.y - ball.size / 2 < gt && ball.y + ball.size / 2 > gt - POST_THICK) {
          ball.y = gt - POST_THICK - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.y + ball.size / 2 > gb && ball.y - ball.size / 2 < gb + POST_THICK) {
          ball.y = gb + POST_THICK + ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.x - ball.size / 2 < 2 && (ball.y < gt || ball.y > gb)) {
          ball.x = ball.size / 2 + 2;
          ball.vx = Math.abs(ball.vx) * 0.85;
          return 'wall';
        }
      }

      if (ball.x + ball.size / 2 > W - GOAL_DEPTH) {
        if (ball.y - ball.size / 2 < gt && ball.y + ball.size / 2 > gt - POST_THICK) {
          ball.y = gt - POST_THICK - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.y + ball.size / 2 > gb && ball.y - ball.size / 2 < gb + POST_THICK) {
          ball.y = gb + POST_THICK + ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.x + ball.size / 2 > W - 2 && (ball.y < gt || ball.y > gb)) {
          ball.x = W - ball.size / 2 - 2;
          ball.vx = -Math.abs(ball.vx) * 0.85;
          return 'wall';
        }
      }
      return null;
    }

    // ─── PHYSICS ───
    function physicsStep(dt) {
      const speed = Math.hypot(ball.vx, ball.vy);
      const maxStep = ball.size * 0.5;
      const totalDist = speed * dt;
      const steps = Math.max(1, Math.ceil(totalDist / maxStep));
      const subDt = dt / steps;

      for (let s = 0; s < steps; s++) {
        ball.x += ball.vx * subDt;
        ball.y += ball.vy * subDt;

        if (ball.z > 0 || ball.vz > 0) {
          ball.z += ball.vz * subDt;
          ball.vz -= GRAVITY * subDt;
          if (ball.z <= 0) { ball.z = 0; ball.vz = 0; }
          if (ball.z > currentMaxZ) currentMaxZ = ball.z;
        }

        if (ball.y - ball.size / 2 < 0) {
          ball.y = ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.97;
        }
        if (ball.y + ball.size / 2 > H) {
          ball.y = H - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.97;
        }

        const airborne = ball.z > AIR_THRESHOLD;
        if (!airborne) checkGoalPosts();

        if (!airborne) {
          // All paddles deflect like Pong — no catching for outfield
          // GK can catch (probability-based), outfield = pure bounce
          for (const p of allPaddles) {
            if (hitPaddle(p)) {
              // GK catch: sometimes the GK traps the ball
              if (p.isGK) {
                const catchChance = p.isLeft ? 0.6 : 0.5;  // player GK catches more often
                if (Math.random() < catchChance) {
                  const isLeft = p.isLeft;
                  serveFromLeft = isLeft;
                  ballState = 'on_gk';
                  ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0;
                  goalPause = 0.3;
                  lastShotMaxZ = currentMaxZ;
                  currentMaxZ = 0;
                  return;
                }
                // GK didn't catch — ball already deflected by hitPaddle
              }

              // If Space held during deflection: shot/lob with direction
              if (spaceDown && p.isPlayer) {
                const charge = spaceHeldTime;
                const speedMult = shotSpeedMult(charge);

                // Direction: arrows steer the shot
                let aimY = 0;
                if (keys['ArrowUp'])   aimY = -0.7;
                if (keys['ArrowDown']) aimY = 0.7;

                // Apply shot power + direction
                const curSpeed = Math.hypot(ball.vx, ball.vy);
                const boostedSpeed = curSpeed * speedMult;
                const dir = ball.vx > 0 ? 1 : -1;
                ball.vx = Math.cos(aimY) * boostedSpeed * dir;
                ball.vy = Math.sin(aimY) * boostedSpeed;

                // Lob height from charge
                ball.vz = charge * H * LOB_POWER;
                spaceHeldTime = 0;
              }

              // AI forward: small random lob occasionally
              if (!p.isGK && !p.isPlayer && !p.isLeft) {
                if (Math.random() < 0.2) {
                  ball.vz = (0.05 + Math.random() * 0.15) * H * LOB_POWER;
                }
              }

              break;  // only process first paddle hit per step
            }
          }
        }

        const gt = goalTop();
        const gb = goalBottom();

        // Goals — lobs CAN score (airborne or not)
        if (ball.x + ball.size / 2 < 0 && ball.y > gt && ball.y < gb) {
          scoreR++;
          resetAfterGoal(true);
          return;
        }
        if (ball.x - ball.size / 2 > W && ball.y > gt && ball.y < gb) {
          scoreL++;
          lastShotMaxZ = currentMaxZ;
          resetAfterGoal(false);
          return;
        }

        // Wall bounce outside goal mouth (and airborne over goal)
        if (ball.y <= gt || ball.y >= gb || airborne) {
          if (ball.x - ball.size / 2 < 2) {
            ball.x = ball.size / 2 + 2;
            ball.vx = Math.abs(ball.vx) * 0.7;
          }
          if (ball.x + ball.size / 2 > W - 2) {
            ball.x = W - ball.size / 2 - 2;
            ball.vx = -Math.abs(ball.vx) * 0.7;
          }
        }
      }
    }

    // ─── STICK BALL ───
    function stickBallToFront(paddle, isLeft) {
      if (isLeft) {
        ball.x = paddle.x + paddle.w + ball.size / 2 + 2;
      } else {
        ball.x = paddle.x - ball.size / 2 - 2;
      }
      ball.y = paddle.y + paddle.h / 2 + holdOffsetY;
      ball.y = clamp(ball.y, ball.size / 2, H - ball.size / 2);
    }

    // ─── UPDATE ───
    let lastTime = performance.now();

    function update(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      if (!leftTeam || !ball) return;

      // Player speed varies by zone identity
      const playerIdentity = leftTeam.mainFwd ? getZoneIdentity(leftTeam.mainFwd, leftTeam.data) : null;
      const pSpeedMult = playerIdentity ? (0.6 + playerIdentity.stats.speed * 0.8) : 1.0;
      const pSpeed = H * OF_SPEED_RATIO * pSpeedMult;
      const gkSpeed = H * GK_SPEED_RATIO;

      const playerControlsGK = (ballState === 'on_gk' && serveFromLeft && goalPause <= 0);
      const playerPaddle = leftTeam.mainFwd;
      const gk = leftTeam.gk;

      // When Space is held: arrows AIM the shot, don't move the paddle
      if (spaceDown && ballState === 'on_gk') {
        // Arrows are read at shot time — paddle stays still
      } else if (playerControlsGK) {
        if (keys['ArrowUp'])   gk.y -= gkSpeed * dt;
        if (keys['ArrowDown']) gk.y += gkSpeed * dt;
        gk.y = clamp(gk.y, 0, H - gk.h);
      } else if (playerPaddle) {
        if (keys['ArrowUp'])    playerPaddle.y -= pSpeed * dt;
        if (keys['ArrowDown'])  playerPaddle.y += pSpeed * dt;
        if (keys['ArrowLeft'])  playerPaddle.x -= pSpeed * dt;
        if (keys['ArrowRight']) playerPaddle.x += pSpeed * dt;
        playerPaddle.x = clamp(playerPaddle.x, gk.x + gk.w + 10, W * 0.48);
        playerPaddle.y = clamp(playerPaddle.y, 0, H - playerPaddle.h);
      }

      if (playerPaddle) {
        playerVelY = (playerPaddle.y - playerPrevY) / Math.max(dt, 0.001);
        playerPrevY = playerPaddle.y;
      }

      if (!playerControlsGK) gkAI(leftTeam, GK_SKILL_LEFT, dt);
      gkAI(rightTeam, GK_SKILL_RIGHT, dt);
      rightTeam.players.forEach(p => outfieldAI(p, dt));

      if (goalPause > 0) { goalPause -= dt; return; }

      if (ballState === 'on_gk') {
        const servingTeam = serveFromLeft ? leftTeam : rightTeam;
        const sgk = servingTeam.gk;
        ball.x = serveFromLeft ? sgk.x + sgk.w + ball.size / 2 + 2
                               : sgk.x - ball.size / 2 - 2;
        ball.y = sgk.y + sgk.h / 2;

        if (serveFromLeft) {
          if (spaceDown) spaceHeldTime += dt;
          if (consumeRelease('Space')) {
            serveFromGK(spaceHeldTime);
            spaceHeldTime = 0;
            return;
          }
        } else {
          // In physics mode, always serve from left (no AI serve)
          if (gameMode === 'physics') {
            // Ball on right GK means player scored — just reset to left
            resetAfterGoal(true);
            return;
          }
          if (aiServeTimer <= 0) aiServeTimer = 0.6 + Math.random() * 0.8;
          aiServeTimer -= dt;
          if (aiServeTimer <= 0) serveFromGK(Math.random() * 0.15);
        }
        return;
      }

      // Track space held time for lob control during live play
      if (spaceDown && ballState === 'live') {
        spaceHeldTime += dt;
      }

      physicsStep(dt);
    }

    // ═══════════════════════════════
    //  RENDERING
    // ═══════════════════════════════

    // ─── DRAW FIELD ───
    function drawField() {
      if (gameMode === 'physics') {
        // Physics lab: dark green, minimal markings
        ctx.fillStyle = '#0a1f0a';
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = '#1a4d1a';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([8, 8]);
        ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(W / 2, H / 2, H * 0.10, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeRect(1, 1, W - 2, H - 2);

        // Physics lab goals (simple)
        const gt = goalTop(), gb = goalBottom();
        ctx.fillStyle = '#fff';
        [0, 1].forEach(side => {
          const isLeft = side === 0;
          ctx.fillRect(isLeft ? 0 : W - 3, gt, 3, gb - gt);
        });
        return;
      }

      // ========== MATCH MODE: Perspective field (Atari table style) ==========

      // Dark background
      ctx.fillStyle = '#122214';
      ctx.fillRect(0, 0, W, H);

      // Perspective field corners (wider at bottom = closer to viewer)
      const pTopY = H * 0.14;    // far edge y
      const pBotY = H * 0.80;    // near edge y
      const pTopL = W * 0.22;    // far-left x
      const pTopR = W * 0.78;    // far-right x
      const pBotL = W * 0.04;    // near-left x
      const pBotR = W * 0.96;    // near-right x
      const baseH = H * 0.12;    // 3D base depth below field

      // Helper: interpolate field edges at a given t (0=top, 1=bottom)
      function fieldEdge(t) {
        const y = pTopY + t * (pBotY - pTopY);
        const l = pTopL + t * (pBotL - pTopL);
        const r = pTopR + t * (pBotR - pTopR);
        return { y, l, r };
      }

      // Map game coords to screen perspective
      function toScreen(gx, gy) {
        const ty = gy / H;
        const e = fieldEdge(ty);
        return { x: e.l + (gx / W) * (e.r - e.l), y: e.y };
      }

      // Scale factor at a given game-y
      function perspScaleAt(gy) {
        const ty = gy / H;
        const e = fieldEdge(ty);
        return (e.r - e.l) / W;
      }

      // Store for other draw functions
      _toScreen = toScreen;
      _perspScale = perspScaleAt;

      // --- 3D base (front face below field) ---
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(pBotL, pBotY);
      ctx.lineTo(pBotR, pBotY);
      ctx.lineTo(pBotR + baseH * 0.15, pBotY + baseH);
      ctx.lineTo(pBotL + baseH * 0.15, pBotY + baseH);
      ctx.closePath();
      ctx.fill();

      // Right side face
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.moveTo(pTopR, pTopY);
      ctx.lineTo(pBotR, pBotY);
      ctx.lineTo(pBotR + baseH * 0.15, pBotY + baseH);
      ctx.lineTo(pTopR + baseH * 0.08, pTopY + baseH * 0.6);
      ctx.closePath();
      ctx.fill();

      // --- White field border ---
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(pTopL, pTopY); ctx.lineTo(pTopR, pTopY);
      ctx.lineTo(pBotR, pBotY); ctx.lineTo(pBotL, pBotY);
      ctx.closePath();
      ctx.fill();

      // --- Green grass (slightly inset from white border) ---
      const inset = 0.012;
      const gTopL = pTopL + (pTopR - pTopL) * inset;
      const gTopR = pTopR - (pTopR - pTopL) * inset;
      const gBotL = pBotL + (pBotR - pBotL) * inset;
      const gBotR = pBotR - (pBotR - pBotL) * inset;
      const gTopY = pTopY + (pBotY - pTopY) * inset;
      const gBotY = pBotY - (pBotY - pTopY) * inset;

      ctx.fillStyle = '#699a55';
      ctx.beginPath();
      ctx.moveTo(gTopL, gTopY); ctx.lineTo(gTopR, gTopY);
      ctx.lineTo(gBotR, gBotY); ctx.lineTo(gBotL, gBotY);
      ctx.closePath();
      ctx.fill();

      // --- Alternating grass stripes (perspective trapezoids) ---
      const stripeCount = 16;
      for (let i = 0; i < stripeCount; i += 2) {
        const t1 = i / stripeCount;
        const t2 = (i + 1) / stripeCount;
        const sTopL1 = gTopL + (gTopR - gTopL) * t1;
        const sTopL2 = gTopL + (gTopR - gTopL) * t2;
        const sBotL1 = gBotL + (gBotR - gBotL) * t1;
        const sBotL2 = gBotL + (gBotR - gBotL) * t2;
        ctx.fillStyle = '#357f35';
        ctx.beginPath();
        ctx.moveTo(sTopL1, gTopY); ctx.lineTo(sTopL2, gTopY);
        ctx.lineTo(sBotL2, gBotY); ctx.lineTo(sBotL1, gBotY);
        ctx.closePath();
        ctx.fill();
      }

      // --- White field markings in perspective ---
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Center line (vertical in game = perspective line on screen)
      const clTop = toScreen(W / 2, 0);
      const clBot = toScreen(W / 2, H);
      ctx.beginPath();
      ctx.moveTo(clTop.x, clTop.y); ctx.lineTo(clBot.x, clBot.y);
      ctx.stroke();

      // Center circle (perspective ellipse — sample points around circle)
      const ccR = H * 0.13;
      ctx.beginPath();
      for (let a = 0; a <= Math.PI * 2; a += 0.1) {
        const gx = W / 2 + Math.cos(a) * ccR * (W / H);
        const gy = H / 2 + Math.sin(a) * ccR;
        const sp = toScreen(gx, gy);
        if (a === 0) ctx.moveTo(sp.x, sp.y);
        else ctx.lineTo(sp.x, sp.y);
      }
      ctx.closePath();
      ctx.stroke();

      // Center spot
      const cs = toScreen(W / 2, H / 2);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cs.x, cs.y, 3, 0, Math.PI * 2); ctx.fill();

      // Penalty areas (perspective rectangles)
      function perspRect(gx, gy, gw, gh) {
        const tl = toScreen(gx, gy);
        const tr = toScreen(gx + gw, gy);
        const br = toScreen(gx + gw, gy + gh);
        const bl = toScreen(gx, gy + gh);
        ctx.beginPath();
        ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
        ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
        ctx.closePath();
        ctx.stroke();
      }

      const penW = W * 0.14;
      const penH = H * 0.56;
      const penTop = (H - penH) / 2;
      perspRect(0, penTop, penW, penH);
      perspRect(W - penW, penTop, penW, penH);

      // Goal areas
      const gaW = penW * 0.42;
      const gaH = H * 0.32;
      const gaTop = (H - gaH) / 2;
      perspRect(0, gaTop, gaW, gaH);
      perspRect(W - gaW, gaTop, gaW, gaH);

      // Penalty arcs
      ctx.beginPath();
      for (let a = -0.85; a <= 0.85; a += 0.1) {
        const gx = penW * 0.75 + Math.cos(a) * ccR * 0.55 * (W / H);
        const gy = H / 2 + Math.sin(a) * ccR * 0.55;
        const sp = toScreen(gx, gy);
        if (a <= -0.85) ctx.moveTo(sp.x, sp.y);
        else ctx.lineTo(sp.x, sp.y);
      }
      ctx.stroke();
      ctx.beginPath();
      for (let a = Math.PI - 0.85; a <= Math.PI + 0.85; a += 0.1) {
        const gx = W - penW * 0.75 + Math.cos(a) * ccR * 0.55 * (W / H);
        const gy = H / 2 + Math.sin(a) * ccR * 0.55;
        const sp = toScreen(gx, gy);
        if (a <= Math.PI - 0.85) ctx.moveTo(sp.x, sp.y);
        else ctx.lineTo(sp.x, sp.y);
      }
      ctx.stroke();

      // ========== Goals (3D wireframe in perspective) ==========
      const gt = goalTop();
      const gb = goalBottom();
      const goalNetW = W * 0.06;   // how far back the net extends in game-x
      const goalH3d = 50;          // visual height of goal above surface

      [0, 1].forEach(side => {
        const isLeft = side === 0;
        const postGX = isLeft ? 0 : W;          // game-x of goal line
        const backGX = isLeft ? -goalNetW : W + goalNetW;

        // 4 base corners (on field surface)
        const ftl = toScreen(postGX, gt);
        const fbl = toScreen(postGX, gb);
        const btl = toScreen(backGX, gt);
        const bbl = toScreen(backGX, gb);

        // 4 top corners (raised by goalH3d)
        const ftlT = { x: ftl.x, y: ftl.y - goalH3d };
        const fblT = { x: fbl.x, y: fbl.y - goalH3d * 1.1 };
        const btlT = { x: btl.x, y: btl.y - goalH3d * 0.7 };
        const bblT = { x: bbl.x, y: bbl.y - goalH3d * 0.8 };

        // Net mesh
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 0.7;
        ctx.lineCap = 'butt';

        // Side net lines (vertical strips connecting front post to back)
        const netLines = 6;
        for (let i = 0; i <= netLines; i++) {
          const t = i / netLines;
          // Top bar
          const tx = ftlT.x + (btlT.x - ftlT.x) * t;
          const ty = ftlT.y + (btlT.y - ftlT.y) * t;
          // Bottom bar
          const bx = ftl.x + (btl.x - ftl.x) * t;
          const by = ftl.y + (btl.y - ftl.y) * t;
          ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(bx, by); ctx.stroke();

          // Same for bottom post side
          const tx2 = fblT.x + (bblT.x - fblT.x) * t;
          const ty2 = fblT.y + (bblT.y - fblT.y) * t;
          const bx2 = fbl.x + (bbl.x - fbl.x) * t;
          const by2 = fbl.y + (bbl.y - fbl.y) * t;
          ctx.beginPath(); ctx.moveTo(tx2, ty2); ctx.lineTo(bx2, by2); ctx.stroke();
        }

        // Back net (vertical lines across back)
        const backLines = 8;
        for (let i = 0; i <= backLines; i++) {
          const t = i / backLines;
          const topX = btlT.x + (bblT.x - btlT.x) * t;
          const topY = btlT.y + (bblT.y - btlT.y) * t;
          const botX = btl.x + (bbl.x - btl.x) * t;
          const botY = btl.y + (bbl.y - btl.y) * t;
          ctx.beginPath(); ctx.moveTo(topX, topY); ctx.lineTo(botX, botY); ctx.stroke();
        }

        // Horizontal net lines on back
        for (let i = 0; i <= 4; i++) {
          const t = i / 4;
          ctx.beginPath();
          ctx.moveTo(btlT.x + (btl.x - btlT.x) * t, btlT.y + (btl.y - btlT.y) * t);
          ctx.lineTo(bblT.x + (bbl.x - bblT.x) * t, bblT.y + (bbl.y - bblT.y) * t);
          ctx.stroke();
        }

        // Top net (roof)
        for (let i = 0; i <= backLines; i++) {
          const t = i / backLines;
          const fX = ftlT.x + (fblT.x - ftlT.x) * t;
          const fY = ftlT.y + (fblT.y - ftlT.y) * t;
          const bX = btlT.x + (bblT.x - btlT.x) * t;
          const bY = btlT.y + (bblT.y - btlT.y) * t;
          ctx.beginPath(); ctx.moveTo(fX, fY); ctx.lineTo(bX, bY); ctx.stroke();
        }

        // Goal frame (thick white posts + crossbar)
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3.5;
        ctx.lineCap = 'round';
        // Front posts
        ctx.beginPath(); ctx.moveTo(ftl.x, ftl.y); ctx.lineTo(ftlT.x, ftlT.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(fbl.x, fbl.y); ctx.lineTo(fblT.x, fblT.y); ctx.stroke();
        // Crossbar
        ctx.beginPath(); ctx.moveTo(ftlT.x, ftlT.y); ctx.lineTo(fblT.x, fblT.y); ctx.stroke();
        // Back posts
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(btl.x, btl.y); ctx.lineTo(btlT.x, btlT.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bbl.x, bbl.y); ctx.lineTo(bblT.x, bblT.y); ctx.stroke();
        // Back crossbar
        ctx.beginPath(); ctx.moveTo(btlT.x, btlT.y); ctx.lineTo(bblT.x, bblT.y); ctx.stroke();
        // Depth bars connecting front to back
        ctx.beginPath(); ctx.moveTo(ftlT.x, ftlT.y); ctx.lineTo(btlT.x, btlT.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(fblT.x, fblT.y); ctx.lineTo(bblT.x, bblT.y); ctx.stroke();
      });
    }

    function drawPaddle(p) {
      const isMatch = gameMode !== 'physics';
      const team = p.isLeft ? leftTeam : rightTeam;

      // Zone-based identity
      let displayNum, displayName;
      if (p.isGK) {
        displayNum = p.num;
        displayName = p.name;
      } else if (team) {
        const identity = getZoneIdentity(p, team.data);
        displayNum = identity.player.num;
        displayName = identity.player.name;
      } else {
        displayNum = p.num;
        displayName = p.name;
      }

      if (!isMatch) {
        // Physics lab: simple white rectangle
        ctx.fillStyle = '#fff';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`#${displayNum} ${displayName.toUpperCase()}`, p.x + p.w / 2, p.y + p.h + 14);
        return;
      }

      // ===== Match mode: 3D block paddle in perspective =====
      const kit = (team && team.data.kit) ? team.data.kit : null;
      const teamColor = kit ? kit.jersey : '#fff';
      const blockH = 20;  // visual height of 3D block above surface

      // Paddle game-space corners
      const gx1 = p.x, gx2 = p.x + p.w;
      const gy1 = p.y, gy2 = p.y + p.h;

      // Map to screen perspective
      const tl = _toScreen(gx1, gy1);
      const tr = _toScreen(gx2, gy1);
      const br = _toScreen(gx2, gy2);
      const bl = _toScreen(gx1, gy2);

      // Top face (raised by blockH)
      const scale = _perspScale(gy1);
      const bh = blockH * scale;
      const tlT = { x: tl.x, y: tl.y - bh };
      const trT = { x: tr.x, y: tr.y - bh };
      const brT = { x: br.x, y: br.y - bh * (_perspScale(gy2) / scale) };
      const blT = { x: bl.x, y: bl.y - bh * (_perspScale(gy2) / scale) };

      // Front face (bottom edge, visible because we look from below)
      ctx.fillStyle = darkenColor(teamColor, 0.6);
      ctx.beginPath();
      ctx.moveTo(bl.x, bl.y); ctx.lineTo(br.x, br.y);
      ctx.lineTo(brT.x, brT.y); ctx.lineTo(blT.x, blT.y);
      ctx.closePath();
      ctx.fill();

      // Right side face
      ctx.fillStyle = darkenColor(teamColor, 0.75);
      ctx.beginPath();
      ctx.moveTo(tr.x, tr.y); ctx.lineTo(br.x, br.y);
      ctx.lineTo(brT.x, brT.y); ctx.lineTo(trT.x, trT.y);
      ctx.closePath();
      ctx.fill();

      // Top face (team color)
      ctx.fillStyle = teamColor;
      ctx.beginPath();
      ctx.moveTo(tlT.x, tlT.y); ctx.lineTo(trT.x, trT.y);
      ctx.lineTo(brT.x, brT.y); ctx.lineTo(blT.x, blT.y);
      ctx.closePath();
      ctx.fill();

      // Outline
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tlT.x, tlT.y); ctx.lineTo(trT.x, trT.y);
      ctx.lineTo(brT.x, brT.y); ctx.lineTo(blT.x, blT.y);
      ctx.closePath();
      ctx.stroke();

      // Label below block: #NUM NAME
      const fontSize = Math.max(7, Math.round(9 * scale));
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = `bold ${fontSize}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const labelY = Math.max(bl.y, br.y) + 4;
      ctx.fillText(`#${displayNum} ${displayName.toUpperCase()}`, (bl.x + br.x) / 2, labelY);
    }

    function darkenColor(hex, factor) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgb(${Math.round(r * factor)},${Math.round(g * factor)},${Math.round(b * factor)})`;
    }

    function drawBall() {
      if (goalPause > 0) return;
      const zPx = ball.z;
      const isMatch = gameMode !== 'physics';

      if (!isMatch) {
        // Physics lab: simple outline circle
        const zScale = 1 + zPx / 300;
        const drawSize = ball.size * zScale;
        if (zPx > 2) {
          const shadowAlpha = Math.max(0.04, 0.2 - zPx / 500);
          const shadowSpread = 1 + zPx / 50;
          ctx.fillStyle = `rgba(255,255,255,${shadowAlpha})`;
          const sw = ball.size * shadowSpread;
          const sh = ball.size * shadowSpread * 0.4;
          ctx.beginPath();
          ctx.ellipse(ball.x, ball.y + zPx * 0.12, sw / 2, sh / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y - zPx, drawSize / 2, 0, Math.PI * 2);
        ctx.stroke();
        return;
      }

      // Match mode: perspective ball
      const sp = _toScreen(ball.x, ball.y);
      const scale = _perspScale(ball.y);
      const drawR = ball.size * scale * (1 + zPx / 300);

      // Ground shadow
      if (zPx > 2) {
        const shadowAlpha = Math.max(0.05, 0.25 - zPx / 400);
        ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(sp.x, sp.y, drawR * 1.2, drawR * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ball (filled white with outline for retro look)
      const bx = sp.x;
      const by = sp.y - zPx * scale;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(bx, by, drawR * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(bx, by, drawR * 0.6, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawHUD() {
      const isMatch = gameMode !== 'physics';
      const fg = '#fff';
      const fgAlpha = 'rgba(255,255,255,';

      // Charge indicator (lob power) — shows during serve or when Space held in play
      if (spaceDown && ((ballState === 'on_gk' && serveFromLeft) || ballState === 'live')) {
        const maxCharge = 1.5;
        const charge = clamp(spaceHeldTime / maxCharge, 0, 1);
        const barW = 30; const barH = 3;
        const bx = ball.x + ball.size + 4;
        const by = ball.y - 10 - ball.z;
        ctx.fillStyle = fgAlpha + '0.12)';
        ctx.fillRect(bx, by, barW, barH);
        const r = Math.round(255 * charge);
        const g = Math.round(255 * (1 - charge * 0.4));
        ctx.fillStyle = `rgb(${r},${g},80)`;
        ctx.fillRect(bx, by, barW * charge, barH);
      }
    }

    function drawScoreboard() {
      const isMatch = gameMode !== 'physics';
      ctx.font = 'bold 13px monospace';
      ctx.fillStyle = isMatch ? TEAM_LEFT.primary : TEAM_LEFT.primary;
      ctx.textAlign = 'right';
      ctx.fillText(TEAM_LEFT.short, W / 2 - 45, 48);
      ctx.fillStyle = isMatch ? TEAM_RIGHT.primary : TEAM_RIGHT.primary;
      ctx.textAlign = 'left';
      ctx.fillText(TEAM_RIGHT.short, W / 2 + 45, 48);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`${scoreL} - ${scoreR}`, W / 2, 50);
    }

    function drawPlayerLabel() {
      // Labels already drawn in drawPaddle — nothing extra needed here
    }

    // ─── PHYSICS MODE DEBUG HUD ───
    function drawPhysicsHUD() {
      const x = 14;
      let y = 90;
      const lh = 16;

      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(4, 72, 220, 160);

      ctx.fillStyle = '#4f8';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('PHYSICS LAB', x, y); y += lh + 4;

      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '10px monospace';

      const spd = Math.hypot(ball.vx, ball.vy);
      ctx.fillText(`ball speed:  ${(spd / W * 100).toFixed(1)}% W`, x, y); y += lh;
      ctx.fillText(`ball height: ${ball.z.toFixed(0)} px`, x, y); y += lh;
      ctx.fillText(`ball vz:     ${ball.vz.toFixed(0)} px/s`, x, y); y += lh;
      ctx.fillText(`peak height: ${currentMaxZ.toFixed(0)} px`, x, y); y += lh;

      ctx.fillStyle = '#ff8';
      ctx.fillText(`last charge: ${(lastShotChargeTime * 1000).toFixed(0)} ms`, x, y); y += lh;
      ctx.fillText(`last peak:   ${lastShotMaxZ.toFixed(0)} px`, x, y); y += lh;

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      y += 6;
      ctx.fillText(`airborne: ${ball.z > AIR_THRESHOLD ? 'YES' : 'no'}`, x, y); y += lh;

      // Bottom hint
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = back to menu', W / 2, H - 8);
    }

    // ═══════════════════════════════
    //  MENU SCREEN
    // ═══════════════════════════════
    function renderMenu() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;

      // Title
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(36, W * 0.04)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('PONGBALL', cx, cy - 60);

      // Menu items
      const items = ['MATCH', 'PHYSICS LAB', 'WORLD CUP'];

      items.forEach((label, i) => {
        const iy = cy + 20 + i * 50;
        const selected = menuSelection === i;

        ctx.fillStyle = selected ? '#fff' : 'rgba(255,255,255,0.3)';
        ctx.font = `bold 16px monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(`${selected ? '> ' : '  '}${label}`, cx, iy);
      });
    }

    // ═══════════════════════════════
    //  RENDER (match or physics)
    // ═══════════════════════════════
    // ─── ITALIA '90 LOGO (drawn programmatically) ───
    function drawLogo() {
      const x = 12, y = 10;
      const s = 0.55;  // scale

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);

      // Stylized deconstructed football — Italia '90 official logo
      // The ball is made of separated black pentagon/wedge shapes with green and red accents

      const cx = 40, cy = 38;  // ball center

      // Top-left wedge (green accent behind, black on top)
      ctx.fillStyle = '#009246';
      ctx.beginPath();
      ctx.moveTo(cx - 18, cy - 28); ctx.lineTo(cx - 8, cy - 18);
      ctx.lineTo(cx - 16, cy - 8); ctx.lineTo(cx - 26, cy - 16);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#3a3a3a';
      ctx.beginPath();
      ctx.moveTo(cx - 12, cy - 30); ctx.lineTo(cx - 2, cy - 22);
      ctx.lineTo(cx - 8, cy - 12); ctx.lineTo(cx - 20, cy - 18);
      ctx.closePath(); ctx.fill();

      // Top-right wedge (red accent behind, black on top)
      ctx.fillStyle = '#CE2B37';
      ctx.beginPath();
      ctx.moveTo(cx + 20, cy - 24); ctx.lineTo(cx + 28, cy - 14);
      ctx.lineTo(cx + 18, cy - 8); ctx.lineTo(cx + 12, cy - 18);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#3a3a3a';
      ctx.beginPath();
      ctx.moveTo(cx + 6, cy - 28); ctx.lineTo(cx + 16, cy - 26);
      ctx.lineTo(cx + 22, cy - 16); ctx.lineTo(cx + 10, cy - 14);
      ctx.closePath(); ctx.fill();

      // Bottom-left wedge (green accent, black)
      ctx.fillStyle = '#009246';
      ctx.beginPath();
      ctx.moveTo(cx - 26, cy + 2); ctx.lineTo(cx - 16, cy - 4);
      ctx.lineTo(cx - 6, cy + 6); ctx.lineTo(cx - 14, cy + 16);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#3a3a3a';
      ctx.beginPath();
      ctx.moveTo(cx - 20, cy - 2); ctx.lineTo(cx - 10, cy - 6);
      ctx.lineTo(cx - 2, cy + 4); ctx.lineTo(cx - 10, cy + 12);
      ctx.closePath(); ctx.fill();

      // Center pentagon (green accent behind, black)
      ctx.fillStyle = '#009246';
      ctx.beginPath();
      ctx.moveTo(cx - 2, cy + 2); ctx.lineTo(cx + 10, cy - 4);
      ctx.lineTo(cx + 16, cy + 6); ctx.lineTo(cx + 10, cy + 16);
      ctx.lineTo(cx, cy + 14);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#3a3a3a';
      ctx.beginPath();
      ctx.moveTo(cx + 2, cy); ctx.lineTo(cx + 12, cy - 6);
      ctx.lineTo(cx + 20, cy + 4); ctx.lineTo(cx + 14, cy + 14);
      ctx.lineTo(cx + 4, cy + 12);
      ctx.closePath(); ctx.fill();

      // Small red accent bottom-right
      ctx.fillStyle = '#CE2B37';
      ctx.beginPath();
      ctx.moveTo(cx + 22, cy + 6); ctx.lineTo(cx + 26, cy + 2);
      ctx.lineTo(cx + 24, cy + 10); ctx.lineTo(cx + 20, cy + 10);
      ctx.closePath(); ctx.fill();

      // Motion lines under ball
      ctx.strokeStyle = '#3a3a3a';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(cx - 6, cy + 22); ctx.quadraticCurveTo(cx, cy + 20, cx + 6, cy + 22); ctx.stroke();
      ctx.strokeStyle = '#CE2B37';
      ctx.beginPath(); ctx.moveTo(cx - 8, cy + 27); ctx.quadraticCurveTo(cx, cy + 24, cx + 8, cy + 27); ctx.stroke();

      // "ITALIA'90" text in angular style
      ctx.fillStyle = '#3a3a3a';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.letterSpacing = '2px';
      ctx.fillText("ITALIA'90", cx, cy + 46);

      ctx.restore();
    }

    function render() {
      drawField();
      allPaddles.forEach(drawPaddle);
      drawBall();
      drawHUD();
      drawScoreboard();
      drawPlayerLabel();

      if (gameMode === 'physics') {
        drawPhysicsHUD();
      } else {
        // Italia '90 logo top-left
        drawLogo();
      }
    }

    // ─── WORLD CUP SCREEN ───
    function renderWorldCup() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;

      // Title
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(28, W * 0.03)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('WORLD CUP', cx, H * 0.15);

      // Coming soon placeholder
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('COMING SOON', cx, H * 0.25);

      // ESC hint
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '11px monospace';
      ctx.fillText('ESC = back to menu', cx, H * 0.92);
    }

    // ─── MAIN LOOP ───
    function loop(now) {
      if (gameMode === 'menu') {
        renderMenu();
      } else if (gameMode === 'worldcup') {
        renderWorldCup();
      } else {
        update(now);
        render();
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
