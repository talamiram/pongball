<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PongBall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; background: #000; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // --- SIZING: fill the window ---
    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- GAME CONSTANTS ---
    const PADDLE_W = 10;
    const OF_H_RATIO = 0.08;          // outfield paddle: 8% of screen height
    const GK_H_RATIO = 0.04;          // goalkeeper: HALF of outfield
    const BALL_SIZE = 8;
    const OF_SPEED_RATIO = 0.50;
    const BALL_START_SPEED = 0.18;
    const BALL_MAX_SPEED = 0.50;
    const BALL_ACCEL = 1.025;
    const MAX_BOUNCE_ANGLE = Math.PI / 3.5;

    // Goalkeeper AI skill (0 to 1)
    const GK_SKILL_LEFT = 0.75;
    const GK_SKILL_RIGHT = 0.65;

    // --- STATE ---
    let scoreL = 0, scoreR = 0;
    let ball, gkL, gkR, ofL, ofR;
    let serving = true;
    let serveTimer = 0;
    let serveDir = 1;

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    function initPositions() {
      const gkH = H * GK_H_RATIO;
      const ofH = H * OF_H_RATIO;

      gkL = { x: 15, y: H / 2 - gkH / 2, w: PADDLE_W, h: gkH };
      gkR = { x: W - 15 - PADDLE_W, y: H / 2 - gkH / 2, w: PADDLE_W, h: gkH };
      ofL = { x: W * 0.30, y: H / 2 - ofH / 2, w: PADDLE_W, h: ofH };
      ofR = { x: W * 0.70 - PADDLE_W, y: H / 2 - ofH / 2, w: PADDLE_W, h: ofH };

      ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, size: BALL_SIZE };
    }

    function resetBall(dir) {
      ball.x = W / 2;
      ball.y = H / 2;
      ball.vx = 0;
      ball.vy = 0;
      serving = true;
      serveTimer = 1.0;
      serveDir = dir;
    }

    function serveBall() {
      const speed = W * BALL_START_SPEED;
      const angle = (Math.random() - 0.5) * 0.6;
      ball.vx = Math.cos(angle) * speed * serveDir;
      ball.vy = Math.sin(angle) * speed;
      serving = false;
    }

    initPositions();
    resetBall(1);

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    // --- GOALKEEPER AI ---
    function gkAI(gk, skill, dt) {
      const maxSpeed = H * 0.45 * skill;
      const center = gk.y + gk.h / 2;
      const target = ball.y;
      const lag = 1.0 - skill * 0.6;
      const effective = center + (target - center) * (1 - lag);
      const diff = effective - center;
      const move = Math.sign(diff) * Math.min(Math.abs(diff), maxSpeed * dt);
      gk.y = clamp(gk.y + move, 0, H - gk.h);
    }

    // --- OUTFIELD AI (right side opponent) ---
    function ofAI(of, dt) {
      const speed = H * OF_SPEED_RATIO * 0.75;
      const cy = of.y + of.h / 2;
      const diffY = ball.y - cy;
      of.y += Math.sign(diffY) * Math.min(Math.abs(diffY), speed * dt);
      of.y = clamp(of.y, 0, H - of.h);

      const idealX = clamp(ball.x + 60, W / 2 + 10, gkR.x - of.w - 30);
      const diffX = idealX - of.x;
      of.x += Math.sign(diffX) * Math.min(Math.abs(diffX), speed * 0.6 * dt);
      of.x = clamp(of.x, W / 2 + 10, gkR.x - of.w - 10);
    }

    // --- UPDATE ---
    let lastTime = performance.now();

    function update(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      // Recalc sizes
      gkL.h = H * GK_H_RATIO;
      gkR.h = H * GK_H_RATIO;
      ofL.h = H * OF_H_RATIO;
      ofR.h = H * OF_H_RATIO;
      gkL.x = 15;
      gkR.x = W - 15 - PADDLE_W;

      const pSpeed = H * OF_SPEED_RATIO;

      // --- Player controls left outfield (Arrow keys) — 1P ONLY ---
      if (keys['ArrowUp'])    ofL.y -= pSpeed * dt;
      if (keys['ArrowDown'])  ofL.y += pSpeed * dt;
      if (keys['ArrowLeft'])  ofL.x -= pSpeed * dt;
      if (keys['ArrowRight']) ofL.x += pSpeed * dt;
      ofL.x = clamp(ofL.x, gkL.x + gkL.w + 10, W / 2 - ofL.w - 10);
      ofL.y = clamp(ofL.y, 0, H - ofL.h);

      // --- AI controls both GKs and right outfield ---
      gkAI(gkL, GK_SKILL_LEFT, dt);
      gkAI(gkR, GK_SKILL_RIGHT, dt);
      ofAI(ofR, dt);

      // Serve
      if (serving) {
        serveTimer -= dt;
        if (serveTimer <= 0) serveBall();
        return;
      }

      // Ball physics
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      if (ball.y - ball.size / 2 < 0) {
        ball.y = ball.size / 2;
        ball.vy = Math.abs(ball.vy);
      }
      if (ball.y + ball.size / 2 > H) {
        ball.y = H - ball.size / 2;
        ball.vy = -Math.abs(ball.vy);
      }

      hitPaddle(gkL, true);
      hitPaddle(gkR, false);
      hitPaddle(ofL, true);
      hitPaddle(ofR, false);

      if (ball.x < 0) { scoreR++; resetBall(-1); }
      if (ball.x > W) { scoreL++; resetBall(1); }
    }

    function hitPaddle(p, isLeft) {
      if (ball.x + ball.size / 2 > p.x &&
          ball.x - ball.size / 2 < p.x + p.w &&
          ball.y + ball.size / 2 > p.y &&
          ball.y - ball.size / 2 < p.y + p.h) {

        if (isLeft) {
          ball.x = p.x + p.w + ball.size / 2;
        } else {
          ball.x = p.x - ball.size / 2;
        }

        const hitPos = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
        const angle = clamp(hitPos, -1, 1) * MAX_BOUNCE_ANGLE;
        const speed = Math.min(
          Math.hypot(ball.vx, ball.vy) * BALL_ACCEL,
          W * BALL_MAX_SPEED
        );

        ball.vx = Math.cos(angle) * speed * (isLeft ? 1 : -1);
        ball.vy = Math.sin(angle) * speed;
      }
    }

    // --- DRAW SOCCER FIELD LINES ---
    function drawField() {
      // Center line (dashed)
      ctx.setLineDash([10, 10]);
      ctx.strokeStyle = '#1a3d1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Center circle
      ctx.strokeStyle = '#1a3d1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, H * 0.12, 0, Math.PI * 2);
      ctx.stroke();

      // Center dot
      ctx.fillStyle = '#1a3d1a';
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 3, 0, Math.PI * 2);
      ctx.fill();

      // Penalty areas (left)
      const penW = W * 0.10;
      const penH = H * 0.40;
      ctx.strokeStyle = '#1a3d1a';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, H / 2 - penH / 2, penW, penH);

      // Penalty area (right)
      ctx.strokeRect(W - penW, H / 2 - penH / 2, penW, penH);

      // Goal areas (smaller box inside penalty area)
      const gaW = penW * 0.4;
      const gaH = penH * 0.5;
      ctx.strokeRect(0, H / 2 - gaH / 2, gaW, gaH);
      ctx.strokeRect(W - gaW, H / 2 - gaH / 2, gaW, gaH);

      // Field border
      ctx.strokeStyle = '#1a3d1a';
      ctx.lineWidth = 2;
      ctx.strokeRect(1, 1, W - 2, H - 2);
    }

    // --- RENDER ---
    function render() {
      ctx.clearRect(0, 0, W, H);

      // Field markings (subtle dark green on black)
      drawField();

      // Paddles — plain white, no indicators
      ctx.fillStyle = '#fff';
      ctx.fillRect(gkL.x, gkL.y, gkL.w, gkL.h);
      ctx.fillRect(gkR.x, gkR.y, gkR.w, gkR.h);
      ctx.fillRect(ofL.x, ofL.y, ofL.w, ofL.h);
      ctx.fillRect(ofR.x, ofR.y, ofR.w, ofR.h);

      // Ball
      if (!serving) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(
          ball.x - ball.size / 2,
          ball.y - ball.size / 2,
          ball.size, ball.size
        );
      }

      // Score
      ctx.fillStyle = '#fff';
      ctx.font = '32px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(scoreL, W / 2 - 60, 44);
      ctx.fillText(scoreR, W / 2 + 60, 44);

      // Controls hint
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Arrow keys to move', W / 2, H - 10);
    }

    // --- LOOP ---
    function loop(now) {
      update(now);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
