<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PongBall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; background: #000; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W, H;
    let leftTeam = null, rightTeam = null;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      if (leftTeam) repositionAll();
    }
    resize();
    window.addEventListener('resize', resize);

    // ═══════════════════════════════════════════
    //  GAME MODE: 'menu' | 'match' | 'physics'
    // ═══════════════════════════════════════════
    let gameMode = 'menu';
    let menuSelection = 0;  // 0 = match, 1 = match3d, 2 = physics, 3 = worldcup

    // ─── TEAMS: ITALIA 90 ───
    // Player = Italy (left), AI = Brazil (right)
    // Stats: speed (movement multiplier), reaction (ball tracking), size (paddle height multiplier)
    const TEAM_LEFT = {
      name: 'Italy', short: 'ITA',
      primary: '#003DA5', secondary: '#fff',
      kit: { head: '#fff', jersey: '#003DA5', shorts: '#fff', boots: '#003DA5' },
      gk:  { num: 1,  name: 'Zenga',        stats: { speed: 0.7, reaction: 0.70, size: 1.0 } },
      def: [
        { num: 2,  name: 'Bergomi',         stats: { speed: 0.65, reaction: 0.75, size: 1.05 } },
        { num: 6,  name: 'Baresi', captain: true, stats: { speed: 0.60, reaction: 0.95, size: 1.2 } },
        { num: 5,  name: 'Ferri',           stats: { speed: 0.70, reaction: 0.70, size: 1.0 } },
        { num: 3,  name: 'Maldini',         stats: { speed: 0.90, reaction: 0.85, size: 1.0 } }
      ],
      mid: [
        { num: 7,  name: 'Donadoni',        stats: { speed: 0.75, reaction: 0.75, size: 0.95 } },
        { num: 8,  name: 'De Napoli',       stats: { speed: 0.70, reaction: 0.70, size: 1.0 } },
        { num: 16, name: 'Berti',           stats: { speed: 0.75, reaction: 0.70, size: 1.0 } },
        { num: 11, name: 'Giannini',        stats: { speed: 0.80, reaction: 0.80, size: 0.95 } }
      ],
      fwd: [
        { num: 19, name: 'Schillaci',       stats: { speed: 0.85, reaction: 0.85, size: 1.0 } },
        { num: 15, name: 'Baggio',          stats: { speed: 0.90, reaction: 0.90, size: 1.0 } }
      ]
    };

    const TEAM_RIGHT = {
      name: 'Brazil', short: 'BRA',
      primary: '#FFDF00', secondary: '#009739',
      kit: { head: '#8B6914', jersey: '#FFDF00', shorts: '#003DA5', boots: '#fff' },
      gk:  { num: 1,  name: 'Taffarel',     stats: { speed: 0.7, reaction: 0.72, size: 1.0 } },
      def: [
        { num: 2,  name: 'Jorginho',        stats: { speed: 0.75, reaction: 0.70, size: 1.0 } },
        { num: 4,  name: 'Dunga', captain: true, stats: { speed: 0.65, reaction: 0.80, size: 1.1 } },
        { num: 3,  name: 'Ricardo Gomes',   stats: { speed: 0.60, reaction: 0.80, size: 1.05 } },
        { num: 6,  name: 'Branco',          stats: { speed: 0.70, reaction: 0.70, size: 1.0 } }
      ],
      mid: [
        { num: 5,  name: 'Alemão',          stats: { speed: 0.75, reaction: 0.75, size: 1.0 } },
        { num: 8,  name: 'Valdo',           stats: { speed: 0.80, reaction: 0.80, size: 0.95 } },
        { num: 15, name: 'Mazinho',         stats: { speed: 0.75, reaction: 0.70, size: 1.0 } },
        { num: 17, name: 'Silas',           stats: { speed: 0.85, reaction: 0.75, size: 0.95 } }
      ],
      fwd: [
        { num: 11, name: 'Romário',         stats: { speed: 0.95, reaction: 0.90, size: 0.9 } },
        { num: 9,  name: 'Careca',          stats: { speed: 0.90, reaction: 0.85, size: 0.95 } }
      ]
    };

    // ─── CONSTANTS ───
    const PADDLE_W = 7;
    const PADDLE_H_RATIO = 0.05;
    const BALL_SIZE = 12;
    const GOAL_LINE_RATIO = 0.02;

    const BALL_SPEED = 0.30;
    const BALL_MAX_SPEED = 0.60;
    const BALL_ACCEL = 1.03;
    const MAX_BOUNCE_ANGLE = Math.PI / 3;
    const HOLD_TIME_LIMIT = 2.0;

    const GRAVITY = 500;
    const LOB_POWER = 1.2;
    const AIR_THRESHOLD = 10;

    const GOAL_HEIGHT_RATIO = 0.30;
    const POST_THICK = 6;
    const GOAL_DEPTH = 18;

    const AI_SKILL = 0.70;
    const PADDLE_SPEED_RATIO = 0.50;

    // Zone x-boundaries (ratio of W, for left team — right is mirrored)
    const ZONE_BOX = 0.05;   // 0.00 – 0.05 = keeper zone
    const ZONE_DEF = 0.22;   // 0.05 – 0.22 = defense
    const ZONE_MID = 0.38;   // 0.22 – 0.38 = midfield
    // 0.38 – 0.50 = forward

    // ─── STATE ───
    let scoreL = 0, scoreR = 0;
    let _toScreen = (gx, gy) => ({ x: gx, y: gy });
    let _perspScale = (gy) => 1;
    let ball;
    let allPaddles = [];

    let ballState = 'live';       // 'live' | 'held_player' | 'held_ai'
    let holdPaddle = null;
    let holdTimer = 0;
    let goalPause = 0;

    let playerVelY = 0;
    let playerPrevY = 0;

    const keys = {};
    const justReleased = {};
    let spaceHeldTime = 0;
    let spaceDown = false;

    // Ball trail for neon effect
    let ballTrail = [];

    // Debug stats for physics mode
    let lastShotChargeTime = 0;
    let lastShotMaxZ = 0;
    let currentMaxZ = 0;

    // Cutscene state
    let cutsceneActive = false;
    let cutsceneStartTime = 0;
    const CUTSCENE_DURATION = 2.5;  // total seconds
    const CUTSCENE_ZOOM_END = 1.8;  // zoom finishes at this time
    const CUTSCENE_TEXT_START = 0.8; // team names appear
    const CUTSCENE_TEXT_END = 2.2;   // team names fade out

    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' && !spaceDown) {
        spaceDown = true;
        spaceHeldTime = 0;
      }
      // Menu input
      if (gameMode === 'menu') {
        if (e.code === 'ArrowUp') {
          menuSelection = (menuSelection + 3) % 4;
        }
        if (e.code === 'ArrowDown') {
          menuSelection = (menuSelection + 1) % 4;
        }
        if (e.code === 'Enter' || e.code === 'Space') {
          startGame(['match', 'match3d', 'physics', 'worldcup'][menuSelection]);
        }
        if (e.code === 'Digit1') startGame('match');
        if (e.code === 'Digit2') startGame('match3d');
        if (e.code === 'Digit3') startGame('physics');
        if (e.code === 'Digit4') startGame('worldcup');
      }
      // Skip cutscene
      if (cutsceneActive && (e.code === 'Space' || e.code === 'Enter')) {
        cutsceneActive = false;
        lastTime = performance.now();
      }
      // ESC back to menu
      if (e.code === 'Escape' && gameMode !== 'menu') {
        gameMode = 'menu';
        cutsceneActive = false;
      }
      e.preventDefault();
    });
    window.addEventListener('keyup', e => {
      keys[e.code] = false;
      justReleased[e.code] = true;
      if (e.code === 'Space') spaceDown = false;
    });

    function consumeRelease(code) {
      if (justReleased[code]) { justReleased[code] = false; return true; }
      return false;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ─── GOAL GEOMETRY ───
    function goalTop()    { return H / 2 - H * GOAL_HEIGHT_RATIO / 2; }
    function goalBottom() { return H / 2 + H * GOAL_HEIGHT_RATIO / 2; }

    // ─── BUILD TEAM — one paddle per team ───
    function makePaddle(isLeft, teamData) {
      const w = PADDLE_W;
      const h = H * PADDLE_H_RATIO;
      // Start in the box (keeper zone)
      const homeXRatio = isLeft ? 0.03 : 0.97;
      const homeX = W * homeXRatio - w / 2;
      const homeY = H * 0.5 - h / 2;
      return {
        isLeft,
        isPlayer: isLeft,  // left team is player-controlled
        x: homeX, y: homeY, w, h,
        homeXRatio,
        color: teamData.primary,
        teamName: teamData.short
      };
    }

    // ─── ZONE IDENTITY: resolve which player the paddle "is" based on position ───
    function getZoneIdentity(paddle, teamData) {
      const xRatio = (paddle.x + paddle.w / 2) / W;
      const yRatio = (paddle.y + paddle.h / 2) / H;
      const isLeft = paddle.isLeft;

      // X zones (left team; right team is mirrored)
      const x = isLeft ? xRatio : (1 - xRatio);
      let zone, zoneList;
      if (x < ZONE_BOX) {
        zone = 'box'; zoneList = [teamData.gk];
      } else if (x < ZONE_DEF) {
        zone = 'def'; zoneList = teamData.def;
      } else if (x < ZONE_MID) {
        zone = 'mid'; zoneList = teamData.mid;
      } else {
        zone = 'fwd'; zoneList = teamData.fwd;
      }

      // Y position picks specific player within the zone
      let idx = 0;
      if (zoneList.length === 4) {
        const bands = [0.265, 0.50, 0.735];
        if (yRatio < bands[0]) idx = 0;
        else if (yRatio < bands[1]) idx = 1;
        else if (yRatio < bands[2]) idx = 2;
        else idx = 3;
      } else if (zoneList.length === 2) {
        idx = yRatio < 0.5 ? 0 : 1;
      }

      const player = zoneList[idx];
      return { zone, player, stats: player.stats };
    }

    function buildTeam(td, isLeft, physicsMode) {
      const paddle = makePaddle(isLeft, td);
      return { paddle, data: td, isLeft };
    }

    function repositionAll() {
      [leftTeam, rightTeam].forEach(team => {
        if (!team) return;
        const p = team.paddle;
        p.h = H * PADDLE_H_RATIO;
        p.w = PADDLE_W;
      });
      rebuildPaddleList();
    }

    function rebuildPaddleList() {
      allPaddles = [];
      if (leftTeam) allPaddles.push(leftTeam.paddle);
      if (rightTeam) allPaddles.push(rightTeam.paddle);
    }

    // ─── INIT ───
    function startGame(mode) {
      gameMode = mode;
      if (mode === 'worldcup') return;
      const isPhysics = mode === 'physics';
      leftTeam = buildTeam(TEAM_LEFT, true, isPhysics);
      rightTeam = buildTeam(TEAM_RIGHT, false, isPhysics);
      rebuildPaddleList();
      ball = { x: 0, y: 0, vx: 0, vy: 0, z: 0, vz: 0, size: BALL_SIZE, curve: 0 };
      ballTrail = [];
      scoreL = 0; scoreR = 0;
      lastShotChargeTime = 0; lastShotMaxZ = 0; currentMaxZ = 0;
      resetAfterGoal(true);  // left team (conceding side) starts with ball
      goalPause = 0;  // no pause at kickoff (resetAfterGoal sets 0.8s pause for goals)
      lastTime = performance.now();

      if (mode === 'match' || mode === 'match3d') {
        cutsceneActive = true;
        cutsceneStartTime = performance.now() / 1000;
      } else {
        cutsceneActive = false;
      }
    }

    function resetAfterGoal(concedingLeft) {
      // Conceding team gets the ball — their paddle goes to box, holds ball
      const team = concedingLeft ? leftTeam : rightTeam;
      const p = team.paddle;
      // Move paddle to box (keeper zone)
      p.x = p.isLeft ? W * 0.03 - p.w / 2 : W * 0.97 - p.w / 2;
      p.y = H * 0.5 - p.h / 2;

      ballState = concedingLeft ? 'held_player' : 'held_ai';
      holdPaddle = p;
      holdTimer = 0;
      if (ball) { ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0; ball.curve = 0; stickBallToFront(p); }
      goalPause = 0.8;
      aiHoldTimer = 0.6 + Math.random() * 0.8;  // AI holds briefly before distributing
      currentMaxZ = 0;
    }

    let aiHoldTimer = 0;

    // ─── RELEASE FROM HOLD (box catch → distribute) ───
    function releaseFromHold(paddle, chargeTime) {
      const dir = paddle.isLeft ? 1 : -1;
      const charge = chargeTime || 0;
      const speed = W * BALL_SPEED;

      let aimY = 0;
      if (paddle.isPlayer) {
        if (keys['ArrowUp'])   aimY = -0.5;
        if (keys['ArrowDown']) aimY =  0.5;
      } else {
        aimY = (Math.random() - 0.5) * 0.4;
      }

      ball.x = paddle.isLeft ? paddle.x + paddle.w + ball.size / 2 + 2
                              : paddle.x - ball.size / 2 - 2;
      ball.vx = Math.cos(aimY) * speed * dir;
      ball.vy = Math.sin(aimY) * speed;
      ball.z = 0;
      ball.vz = charge * H * LOB_POWER * 0.5;  // gentle lob on distribute
      ball.curve = 0;

      lastShotChargeTime = charge;
      currentMaxZ = 0;
      ballState = 'live';
      holdPaddle = null;
      holdTimer = 0;
    }

    // ─── ZONE-SPECIFIC ABILITIES ───
    // Called when Space is held during paddle collision
    function handleZoneAbility(paddle, zone, chargeTime) {
      const dir = paddle.isLeft ? 1 : -1;
      const charge = chargeTime || 0;

      if (zone === 'box') {
        // CATCH — hold the ball
        ballState = paddle.isPlayer ? 'held_player' : 'held_ai';
        holdPaddle = paddle;
        holdTimer = 0;
        aiHoldTimer = 0.4 + Math.random() * 0.8;
        ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0; ball.curve = 0;
        return;
      }

      // All other zones: immediate directed shot (no catch)
      let aimY = 0;
      if (paddle.isPlayer) {
        if (keys['ArrowUp'])   aimY = -0.6;
        if (keys['ArrowDown']) aimY =  0.6;
      } else {
        aimY = (Math.random() - 0.5) * 0.5;
      }

      if (zone === 'def') {
        // LOB CLEARANCE — high and long
        const speed = W * BALL_SPEED;
        ball.vx = Math.cos(aimY) * speed * dir;
        ball.vy = Math.sin(aimY) * speed;
        ball.vz = Math.max(charge, 0.2) * H * LOB_POWER;
        ball.curve = 0;
      } else if (zone === 'mid') {
        // CURVING SHOT — ball curves in arrow direction
        const speed = W * BALL_SPEED * 1.2;
        ball.vx = Math.cos(aimY * 0.3) * speed * dir;
        ball.vy = Math.sin(aimY * 0.3) * speed;
        ball.vz = charge * H * LOB_POWER * 0.3;
        // Curve: positive = curves down, negative = curves up
        ball.curve = aimY * H * 1.5;  // strong lateral curve
      } else if (zone === 'fwd') {
        // POWER BLAST — fast rocket, charge = power, too much = over the bar
        const power = Math.min(charge * 3, 2.0);  // sweet spot ~0.15-0.4s
        const speed = W * BALL_SPEED * (1.0 + power * 0.8);
        ball.vx = Math.cos(aimY * 0.5) * speed * dir;
        ball.vy = Math.sin(aimY * 0.5) * speed;
        // Too much charge = over the bar (high vz)
        ball.vz = charge > 0.5 ? charge * H * LOB_POWER * 1.5 : charge * H * LOB_POWER * 0.2;
        ball.curve = 0;
      }

      ball.z = 0;
      lastShotChargeTime = charge;
      currentMaxZ = 0;
      spaceHeldTime = 0;
    }

    // ─── AI PADDLE (right team — one paddle, full field movement) ───
    function aiPaddle(paddle, dt) {
      if (!ball || ballState === 'held_ai') return;  // AI handles held state in update()

      const speed = H * PADDLE_SPEED_RATIO * AI_SKILL;
      const cy = paddle.y + paddle.h / 2;
      const cx = paddle.x + paddle.w / 2;

      // Decide target position based on game state
      let targetX, targetY;
      const ballComingToUs = ball.vx > 0;
      const ballInOurHalf = ball.x > W * 0.5;
      const ballDangerous = ballComingToUs && ballInOurHalf;

      if (ballDangerous || ballState !== 'live') {
        // DEFEND — retreat toward box, track ball y
        targetX = W * 0.55;  // near the box but not fully in
        targetY = ball.y;
        // If ball is very close, go full keeper mode
        if (ball.x > W * 0.75) {
          targetX = W * 0.97;  // in the box
        }
      } else if (!ballInOurHalf) {
        // ATTACK — push forward
        targetX = W * 0.65;
        targetY = ball.y;
      } else {
        // NEUTRAL — midfield positioning
        targetX = W * 0.70;
        targetY = H * 0.5;
      }

      // Move toward target
      const dx = targetX - cx;
      const dy = targetY - cy;
      const lag = 1 - AI_SKILL * 0.6;
      paddle.x += dx * (1 - lag) * dt * 3;
      paddle.y += dy * (1 - lag) * dt * 3;

      // Clamp to right half
      paddle.x = clamp(paddle.x, W * 0.50, W - paddle.w);
      paddle.y = clamp(paddle.y, 0, H - paddle.h);
    }

    // ─── PADDLE COLLISION ───
    function hitPaddle(p) {
      if (ball.x + ball.size / 2 > p.x &&
          ball.x - ball.size / 2 < p.x + p.w &&
          ball.y + ball.size / 2 > p.y &&
          ball.y - ball.size / 2 < p.y + p.h) {

        // Push ball out of paddle
        if (p.isLeft) {
          ball.x = p.x + p.w + ball.size / 2 + 1;
        } else {
          ball.x = p.x - ball.size / 2 - 1;
        }

        // Normal Pong deflection
        const hitPos = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
        const angle = clamp(hitPos, -1, 1) * MAX_BOUNCE_ANGLE;
        const currentSpeed = Math.hypot(ball.vx, ball.vy);
        const newSpeed = Math.min(currentSpeed * BALL_ACCEL, W * BALL_MAX_SPEED);
        const deflectDir = p.isLeft ? 1 : -1;

        ball.vx = Math.cos(angle) * newSpeed * deflectDir;
        ball.vy = Math.sin(angle) * newSpeed;
        ball.curve = 0;
        if (p.isPlayer) ball.vy += playerVelY * 0.3;

        return true;
      }
      return false;
    }

    // ─── GOAL POST COLLISION ───
    function checkGoalPosts() {
      const gt = goalTop();
      const gb = goalBottom();
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);

      if (ball.x - ball.size / 2 < glL + GOAL_DEPTH) {
        if (ball.y - ball.size / 2 < gt && ball.y + ball.size / 2 > gt - POST_THICK) {
          ball.y = gt - POST_THICK - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.y + ball.size / 2 > gb && ball.y - ball.size / 2 < gb + POST_THICK) {
          ball.y = gb + POST_THICK + ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.x - ball.size / 2 < glL && (ball.y < gt || ball.y > gb)) {
          ball.x = glL + ball.size / 2;
          ball.vx = Math.abs(ball.vx) * 0.85;
          return 'wall';
        }
      }

      if (ball.x + ball.size / 2 > glR - GOAL_DEPTH) {
        if (ball.y - ball.size / 2 < gt && ball.y + ball.size / 2 > gt - POST_THICK) {
          ball.y = gt - POST_THICK - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.y + ball.size / 2 > gb && ball.y - ball.size / 2 < gb + POST_THICK) {
          ball.y = gb + POST_THICK + ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.x + ball.size / 2 > glR && (ball.y < gt || ball.y > gb)) {
          ball.x = glR - ball.size / 2;
          ball.vx = -Math.abs(ball.vx) * 0.85;
          return 'wall';
        }
      }
      return null;
    }

    // ─── PHYSICS ───
    function physicsStep(dt) {
      const speed = Math.hypot(ball.vx, ball.vy);
      const maxStep = ball.size * 0.5;
      const totalDist = speed * dt;
      const steps = Math.max(1, Math.ceil(totalDist / maxStep));
      const subDt = dt / steps;

      for (let s = 0; s < steps; s++) {
        ball.x += ball.vx * subDt;
        ball.y += ball.vy * subDt;

        // Apply curve (MID zone curving shot)
        if (ball.curve !== 0) {
          ball.vy += ball.curve * subDt;
          ball.curve *= 0.98;  // decay curve over time
          if (Math.abs(ball.curve) < 1) ball.curve = 0;
        }

        // Z-axis (lob)
        if (ball.z > 0 || ball.vz > 0) {
          ball.z += ball.vz * subDt;
          ball.vz -= GRAVITY * subDt;
          if (ball.z <= 0) { ball.z = 0; ball.vz = 0; }
          if (ball.z > currentMaxZ) currentMaxZ = ball.z;
        }

        // Wall bounces (top/bottom)
        if (ball.y - ball.size / 2 < 0) {
          ball.y = ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.97;
        }
        if (ball.y + ball.size / 2 > H) {
          ball.y = H - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.97;
        }

        const airborne = ball.z > AIR_THRESHOLD;
        if (!airborne) checkGoalPosts();

        if (!airborne) {
          for (const p of allPaddles) {
            if (hitPaddle(p)) {
              // Get zone identity for this paddle
              const td = p.isLeft ? leftTeam.data : rightTeam.data;
              const identity = getZoneIdentity(p, td);

              // Space held = zone-specific ability
              if (spaceDown && p.isPlayer) {
                handleZoneAbility(p, identity.zone, spaceHeldTime);
                return;  // ability may change ball state
              }

              // AI: use zone ability occasionally
              if (!p.isPlayer) {
                const zone = identity.zone;
                if (zone === 'box') {
                  // AI always catches in the box
                  handleZoneAbility(p, 'box', 0);
                  return;
                } else if (Math.random() < 0.3) {
                  // 30% chance AI uses zone ability
                  handleZoneAbility(p, zone, 0.1 + Math.random() * 0.3);
                  return;
                }
              }

              break;
            }
          }
        }

        const gt = goalTop();
        const gb = goalBottom();
        const goalLineL = W * GOAL_LINE_RATIO;
        const goalLineR = W * (1 - GOAL_LINE_RATIO);

        // Goal scoring
        if (ball.x - ball.size / 2 < goalLineL && ball.y > gt && ball.y < gb) {
          scoreR++;
          resetAfterGoal(true);
          return;
        }
        if (ball.x + ball.size / 2 > goalLineR && ball.y > gt && ball.y < gb) {
          scoreL++;
          lastShotMaxZ = currentMaxZ;
          resetAfterGoal(false);
          return;
        }

        // Wall bounce outside goal mouth
        if (ball.y <= gt || ball.y >= gb || airborne) {
          if (ball.x - ball.size / 2 < goalLineL) {
            ball.x = goalLineL + ball.size / 2;
            ball.vx = Math.abs(ball.vx) * 0.7;
          }
          if (ball.x + ball.size / 2 > goalLineR) {
            ball.x = goalLineR - ball.size / 2;
            ball.vx = -Math.abs(ball.vx) * 0.7;
          }
        }
      }
    }

    // ─── STICK BALL TO PADDLE FRONT ───
    function stickBallToFront(paddle) {
      if (paddle.isLeft) {
        ball.x = paddle.x + paddle.w + ball.size / 2 + 2;
      } else {
        ball.x = paddle.x - ball.size / 2 - 2;
      }
      ball.y = paddle.y + paddle.h / 2;
      ball.y = clamp(ball.y, ball.size / 2, H - ball.size / 2);
    }

    // ─── UPDATE ───
    let lastTime = performance.now();

    function update(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      if (!leftTeam || !ball) return;

      const playerPaddle = leftTeam.paddle;
      const aiPad = rightTeam.paddle;
      const pSpeed = H * PADDLE_SPEED_RATIO;

      // ── Player movement (always controls one paddle, free movement in left half) ──
      if (playerPaddle) {
        if (keys['ArrowUp'])    playerPaddle.y -= pSpeed * dt;
        if (keys['ArrowDown'])  playerPaddle.y += pSpeed * dt;
        if (keys['ArrowLeft'])  playerPaddle.x -= pSpeed * dt;
        if (keys['ArrowRight']) playerPaddle.x += pSpeed * dt;
        playerPaddle.x = clamp(playerPaddle.x, 0, W * 0.50 - playerPaddle.w);
        playerPaddle.y = clamp(playerPaddle.y, 0, H - playerPaddle.h);

        playerVelY = (playerPaddle.y - playerPrevY) / Math.max(dt, 0.001);
        playerPrevY = playerPaddle.y;
      }

      // ── AI movement ──
      if (aiPad) aiPaddle(aiPad, dt);

      if (goalPause > 0) { goalPause -= dt; return; }

      // ── Track space charge ──
      if (spaceDown) spaceHeldTime += dt;

      // ── Ball held by player (caught in box) ──
      if (ballState === 'held_player') {
        stickBallToFront(holdPaddle);
        holdTimer += dt;
        if (consumeRelease('Space') || holdTimer >= HOLD_TIME_LIMIT) {
          releaseFromHold(holdPaddle, spaceHeldTime);
          spaceHeldTime = 0;
        }
        return;
      }

      // ── Ball held by AI ──
      if (ballState === 'held_ai') {
        stickBallToFront(holdPaddle);
        holdTimer += dt;
        aiHoldTimer -= dt;
        if (aiHoldTimer <= 0 || holdTimer >= HOLD_TIME_LIMIT) {
          releaseFromHold(holdPaddle, 0.1 + Math.random() * 0.2);
        }
        return;
      }

      // ── Ball is live ──
      // Store trail position
      ballTrail.push({ x: ball.x, y: ball.y });
      if (ballTrail.length > 12) ballTrail.shift();

      physicsStep(dt);
    }

    // ═══════════════════════════════
    //  RENDERING
    // ═══════════════════════════════

    // ─── DRAW FIELD ───
    function drawField() {
      // ========== Dark surface — neon arcade table ==========
      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, W, H);

      // Reset perspective to identity (flat top-down)
      _toScreen = (gx, gy) => ({ x: gx, y: gy });
      _perspScale = () => 1;

      const gt = goalTop(), gb = goalBottom();
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);

      ctx.save();

      // ─── Neon field border glow ───
      // Left half: team left color, right half: team right color
      const borderW = 3;
      ctx.shadowBlur = 15;

      ctx.shadowColor = TEAM_LEFT.primary;
      ctx.strokeStyle = TEAM_LEFT.primary;
      ctx.lineWidth = borderW;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0); ctx.lineTo(0, 0); ctx.lineTo(0, H); ctx.lineTo(W / 2, H);
      ctx.stroke();

      ctx.shadowColor = TEAM_RIGHT.primary;
      ctx.strokeStyle = TEAM_RIGHT.primary;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0); ctx.lineTo(W, 0); ctx.lineTo(W, H); ctx.lineTo(W / 2, H);
      ctx.stroke();

      // ─── Neon field lines ───
      ctx.shadowColor = 'rgba(100,200,255,0.6)';
      ctx.shadowBlur = 8;
      ctx.strokeStyle = 'rgba(100,200,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';

      // Center line (dashed)
      ctx.setLineDash([8, 8]);
      ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
      ctx.setLineDash([]);

      // Center circle
      const ccR = H * 0.12;
      ctx.beginPath(); ctx.arc(W / 2, H / 2, ccR, 0, Math.PI * 2); ctx.stroke();

      // Center spot
      ctx.fillStyle = 'rgba(100,200,255,0.5)';
      ctx.beginPath(); ctx.arc(W / 2, H / 2, 3, 0, Math.PI * 2); ctx.fill();

      // Penalty areas
      const penW = W * 0.14;
      const penH = H * 0.56;
      const penTop = (H - penH) / 2;
      ctx.strokeRect(glL, penTop, penW, penH);
      ctx.strokeRect(glR - penW, penTop, penW, penH);

      // Goal areas
      const gaW = penW * 0.42;
      const gaH = H * 0.32;
      const gaTop = (H - gaH) / 2;
      ctx.strokeRect(glL, gaTop, gaW, gaH);
      ctx.strokeRect(glR - gaW, gaTop, gaW, gaH);

      // ─── Neon goal mouths ───
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;

      // Left goal
      ctx.beginPath();
      ctx.moveTo(glL, gt); ctx.lineTo(glL, gb);
      ctx.stroke();

      // Right goal
      ctx.beginPath();
      ctx.moveTo(glR, gt); ctx.lineTo(glR, gb);
      ctx.stroke();

      ctx.restore();
    }

    // ─── NEON PADDLE ───
    function drawPaddle(p) {
      const team = p.isLeft ? leftTeam : rightTeam;

      // Zone-based identity
      let displayNum, displayName, zone;
      if (team) {
        const identity = getZoneIdentity(p, team.data);
        displayNum = identity.player.num;
        displayName = identity.player.name;
        zone = identity.zone;
      } else {
        displayNum = '?';
        displayName = '???';
        zone = 'fwd';
      }

      // Neon color: team color normally, distinct keeper color in box
      const teamColor = team ? team.data.primary : '#fff';
      const isKeeper = zone === 'box';
      const neonColor = isKeeper ? '#00ff88' : teamColor;
      const glowIntensity = p.isPlayer ? 20 : 12;

      if (gameMode === 'physics') {
        // Physics lab: simple neon rectangle
        ctx.save();
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = glowIntensity;
        ctx.fillStyle = neonColor;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.restore();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`#${displayNum} ${displayName.toUpperCase()}`, p.x + p.w / 2, p.y + p.h + 14);
        return;
      }

      // ===== Match mode: Neon rectangle with glow =====
      ctx.save();

      // Multiple glow passes for intensity
      for (let i = 0; i < 3; i++) {
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = glowIntensity + i * 8;
        ctx.fillStyle = i === 2 ? neonColor : 'rgba(0,0,0,0)';
        ctx.fillRect(p.x, p.y, p.w, p.h);
      }

      // Bright core
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
      ctx.globalAlpha = 1;

      ctx.restore();

      // Label above: #NUM NAME (glowing)
      ctx.save();
      ctx.shadowColor = neonColor;
      ctx.shadowBlur = 6;
      ctx.fillStyle = neonColor;
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`#${displayNum}`, p.x + p.w / 2, p.y - 6);
      ctx.restore();
    }

    function lerpPt(a, b, t) {
      return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
    }

    // ─── NEON BALL WITH TRAIL ───
    function drawBall() {
      if (goalPause > 0) return;
      const zPx = ball.z;
      const r = ball.size / 2 * (1 + zPx / 300);
      const bx = ball.x;
      const by = ball.y - zPx;

      // Ground shadow when airborne
      if (zPx > 2) {
        const shadowAlpha = Math.max(0.05, 0.2 - zPx / 400);
        ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(ball.x, ball.y, r * 1.5, r * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ball trail (fading positions)
      if (gameMode !== 'physics') {
        for (let i = 0; i < ballTrail.length; i++) {
          const t = ballTrail[i];
          const alpha = (i / ballTrail.length) * 0.3;
          const tr = r * (0.3 + (i / ballTrail.length) * 0.5);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(t.x, t.y - zPx, tr, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Ball core with glow
      ctx.save();
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(bx, by, r, 0, Math.PI * 2);
      ctx.fill();

      // Second glow pass (cyan tint)
      ctx.shadowColor = '#88ddff';
      ctx.shadowBlur = 25;
      ctx.beginPath();
      ctx.arc(bx, by, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawHUD() {
      // Charge indicator — shows when Space held
      if (spaceDown && (ballState === 'live' || ballState === 'held_player')) {
        const maxCharge = 1.5;
        const charge = clamp(spaceHeldTime / maxCharge, 0, 1);
        const barW = 30; const barH = 3;
        const bx = ball.x + ball.size + 4;
        const by = ball.y - 10 - ball.z;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(bx, by, barW, barH);
        ctx.save();
        ctx.shadowColor = charge < 0.6 ? '#0f0' : '#ff0';
        ctx.shadowBlur = 4;
        const r = Math.round(255 * charge);
        const g = Math.round(255 * (1 - charge * 0.4));
        ctx.fillStyle = `rgb(${r},${g},80)`;
        ctx.fillRect(bx, by, barW * charge, barH);
        ctx.restore();
      }
    }

    function drawScoreboard() {
      ctx.save();
      // Neon LED scoreboard at top center
      ctx.textAlign = 'center';

      // Team codes in neon team colors
      ctx.font = 'bold 14px monospace';
      ctx.shadowBlur = 8;

      ctx.shadowColor = TEAM_LEFT.primary;
      ctx.fillStyle = TEAM_LEFT.primary;
      ctx.fillText(TEAM_LEFT.short, W / 2 - 55, 30);

      ctx.shadowColor = TEAM_RIGHT.primary;
      ctx.fillStyle = TEAM_RIGHT.primary;
      ctx.fillText(TEAM_RIGHT.short, W / 2 + 55, 30);

      // Score — large glowing white
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 32px monospace';
      ctx.fillText(`${scoreL} - ${scoreR}`, W / 2, 35);

      ctx.restore();
    }

    // ─── PHYSICS MODE DEBUG HUD ───
    function drawPhysicsHUD() {
      const x = 14;
      let y = 90;
      const lh = 16;

      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(4, 72, 220, 160);

      ctx.fillStyle = '#4f8';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('PHYSICS LAB', x, y); y += lh + 4;

      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '10px monospace';

      const spd = Math.hypot(ball.vx, ball.vy);
      ctx.fillText(`ball speed:  ${(spd / W * 100).toFixed(1)}% W`, x, y); y += lh;
      ctx.fillText(`ball height: ${ball.z.toFixed(0)} px`, x, y); y += lh;
      ctx.fillText(`ball vz:     ${ball.vz.toFixed(0)} px/s`, x, y); y += lh;
      ctx.fillText(`peak height: ${currentMaxZ.toFixed(0)} px`, x, y); y += lh;

      ctx.fillStyle = '#ff8';
      ctx.fillText(`last charge: ${(lastShotChargeTime * 1000).toFixed(0)} ms`, x, y); y += lh;
      ctx.fillText(`last peak:   ${lastShotMaxZ.toFixed(0)} px`, x, y); y += lh;

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      y += 6;
      ctx.fillText(`airborne: ${ball.z > AIR_THRESHOLD ? 'YES' : 'no'}`, x, y); y += lh;

      // Bottom hint
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = back to menu', W / 2, H - 8);
    }

    // ═══════════════════════════════
    //  MENU SCREEN
    // ═══════════════════════════════
    function renderMenu() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;

      // Title
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(36, W * 0.04)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('PONGBALL', cx, cy - 60);

      // Menu items
      const items = ['MATCH', 'MATCH 3D', 'PHYSICS LAB', 'WORLD CUP'];

      items.forEach((label, i) => {
        const iy = cy + 20 + i * 50;
        const selected = menuSelection === i;

        ctx.fillStyle = selected ? '#fff' : 'rgba(255,255,255,0.3)';
        ctx.font = `bold 16px monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(`${selected ? '> ' : '  '}${label}`, cx, iy);
      });
    }

    // ═══════════════════════════════
    //  RENDER (match or physics)
    function render() {
      drawField();
      allPaddles.forEach(drawPaddle);
      drawBall();
      drawHUD();
      drawScoreboard();

      if (gameMode === 'physics') {
        drawPhysicsHUD();
      }

      // ESC hint
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = menu', W / 2, H - 8);
    }

    // ─── WORLD CUP SCREEN ───
    function renderWorldCup() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;

      // Title
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(28, W * 0.03)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('WORLD CUP', cx, H * 0.15);

      // Coming soon placeholder
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('COMING SOON', cx, H * 0.25);

      // ESC hint
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '11px monospace';
      ctx.fillText('ESC = back to menu', cx, H * 0.92);
    }

    // ─── CUTSCENE RENDER ───
    function renderCutscene(now) {
      const t = now / 1000 - cutsceneStartTime;

      // Auto-end cutscene
      if (t >= CUTSCENE_DURATION) {
        cutsceneActive = false;
        lastTime = now;  // reset so first update frame doesn't get huge dt
        return;
      }

      // Zoom: starts at 0.65, eases to 1.0
      const zoomT = Math.min(t / CUTSCENE_ZOOM_END, 1);
      const eased = 1 - Math.pow(1 - zoomT, 3);  // ease-out cubic
      const scale = 0.65 + eased * 0.35;

      // Draw field + paddles at zoomed scale
      ctx.save();
      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, W, H);

      // Translate so the zoom centers on the middle of the field
      const cx = W / 2, cy = H / 2;
      ctx.translate(cx * (1 - scale), cy * (1 - scale));
      ctx.scale(scale, scale);

      drawField();
      allPaddles.forEach(drawPaddle);

      ctx.restore();

      // Team names overlay
      if (t >= CUTSCENE_TEXT_START && t < CUTSCENE_TEXT_END) {
        const textT = (t - CUTSCENE_TEXT_START) / (CUTSCENE_TEXT_END - CUTSCENE_TEXT_START);
        // Fade in for first 30%, hold, fade out for last 30%
        let alpha;
        if (textT < 0.2) alpha = textT / 0.2;
        else if (textT > 0.7) alpha = (1 - textT) / 0.3;
        else alpha = 1;
        alpha = Math.max(0, Math.min(1, alpha));

        const fontSize = Math.max(32, W * 0.045);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Left team name (Italy - blue)
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.shadowBlur = 25;
        ctx.shadowColor = TEAM_LEFT.primary;
        ctx.fillStyle = TEAM_LEFT.primary;
        ctx.fillText(TEAM_LEFT.name.toUpperCase(), W * 0.35, H * 0.48);
        ctx.restore();

        // "vs" in white
        ctx.save();
        ctx.globalAlpha = alpha * 0.6;
        ctx.font = `bold ${fontSize * 0.5}px monospace`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#fff';
        ctx.fillStyle = '#fff';
        ctx.fillText('vs', W * 0.5, H * 0.48);
        ctx.restore();

        // Right team name (Brazil - yellow)
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.shadowBlur = 25;
        ctx.shadowColor = TEAM_RIGHT.primary;
        ctx.fillStyle = TEAM_RIGHT.primary;
        ctx.fillText(TEAM_RIGHT.name.toUpperCase(), W * 0.65, H * 0.48);
        ctx.restore();
      }

      // Skip hint at bottom
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE to skip', W / 2, H - 15);
      ctx.restore();
    }

    // ═══════════════════════════════
    //  3D PERSPECTIVE RENDER
    // ═══════════════════════════════

    // Project a point from game-space (0..W, 0..H) onto the 3D trapezoid
    // The table is viewed from the front-right at ~30° down
    function project3D(gx, gy, gz) {
      // Normalize to 0..1
      const u = gx / W;
      const v = gy / H;

      // Table quad corners in screen space (trapezoid — far edge narrower)
      // Viewed from front-right, the left side is further away
      const margin = 0.04;
      const tableW = 1 - margin * 2;

      // Perspective squeeze: far edge (top) is narrower
      const squeeze = 0.18;  // how much the far edge narrows
      const tiltY = 0.12;    // vertical offset — far edge is higher

      // Far edge (top of field, v=0)
      const farL  = margin + squeeze;
      const farR  = 1 - margin - squeeze;
      const farY  = 0.10 + tiltY;

      // Near edge (bottom of field, v=1)
      const nearL = margin;
      const nearR = 1 - margin;
      const nearY = 0.88;

      // Bilinear interpolation across the quad
      const left  = farL  + (nearL - farL)  * v;
      const right = farR  + (nearR - farR)  * v;
      const yPos  = farY  + (nearY - farY)  * v;

      const sx = (left + (right - left) * u) * W;
      const sy = yPos * H;

      // Scale factor (objects at far edge are smaller)
      const scale = 0.55 + 0.45 * v;  // 0.55 at far, 1.0 at near

      // Z-axis (height above table — lobs)
      const zOffset = gz * scale * 0.8;

      return { x: sx, y: sy - zOffset, scale };
    }

    function render3D() {
      // ─── Background: dark room ───
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      // ─── Draw table body (black box below the playing surface) ───
      const bodyTop = H * 0.88;
      const bodyH = H * 0.14;

      // Table front face
      const tblL = W * 0.04;
      const tblR = W * 0.96;
      ctx.fillStyle = '#111';
      ctx.fillRect(tblL, bodyTop, tblR - tblL, bodyH);

      // Table leg cutout (arch in center)
      const legW = W * 0.30;
      const legH = bodyH * 0.65;
      const legX = (W - legW) / 2;
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.moveTo(legX, bodyTop + bodyH);
      ctx.lineTo(legX, bodyTop + bodyH - legH);
      ctx.quadraticCurveTo(W / 2, bodyTop + bodyH - legH - 10, legX + legW, bodyTop + bodyH - legH);
      ctx.lineTo(legX + legW, bodyTop + bodyH);
      ctx.closePath();
      ctx.fill();

      // ─── PONGBALL branding on table front ───
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(20, W * 0.028)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PONGBALL', W * 0.28, bodyTop + bodyH * 0.35);
      ctx.fillText('PONGBALL', W * 0.72, bodyTop + bodyH * 0.35);

      // Italia '90 with flag stripe
      ctx.font = `bold ${Math.max(10, W * 0.012)}px monospace`;
      ctx.fillStyle = '#ccc';
      ctx.fillText("ITALIA '90", W * 0.28, bodyTop + bodyH * 0.60);
      ctx.fillText("ITALIA '90", W * 0.72, bodyTop + bodyH * 0.60);

      // Italian flag stripes
      const flagW = W * 0.04;
      const flagH = 3;
      [W * 0.28, W * 0.72].forEach(cx => {
        const fx = cx - flagW / 2;
        const fy = bodyTop + bodyH * 0.72;
        ctx.fillStyle = '#009246'; ctx.fillRect(fx, fy, flagW / 3, flagH);
        ctx.fillStyle = '#fff';    ctx.fillRect(fx + flagW / 3, fy, flagW / 3, flagH);
        ctx.fillStyle = '#CE2B37'; ctx.fillRect(fx + flagW * 2 / 3, fy, flagW / 3, flagH);
      });
      ctx.restore();

      // ─── Art deco stripes on table sides ───
      ctx.save();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      // Left side stripe
      ctx.beginPath();
      ctx.moveTo(tblL + 8, bodyTop + 4);
      ctx.lineTo(tblL + 8, bodyTop + bodyH - 4);
      ctx.lineTo(tblL + 30, bodyTop + bodyH - 4);
      ctx.stroke();
      // Right side stripe
      ctx.beginPath();
      ctx.moveTo(tblR - 8, bodyTop + 4);
      ctx.lineTo(tblR - 8, bodyTop + bodyH - 4);
      ctx.lineTo(tblR - 30, bodyTop + bodyH - 4);
      ctx.stroke();
      ctx.restore();

      // ─── Draw the playing surface (perspective quad) ───
      // Surface is a filled trapezoid
      const tl = project3D(0, 0, 0);
      const tr = project3D(W, 0, 0);
      const bl = project3D(0, H, 0);
      const br = project3D(W, H, 0);

      ctx.save();
      ctx.fillStyle = '#0c0c0c';
      ctx.beginPath();
      ctx.moveTo(tl.x, tl.y);
      ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y);
      ctx.lineTo(bl.x, bl.y);
      ctx.closePath();
      ctx.fill();

      // ─── LED border strips (the signature neon glow) ───
      ctx.lineWidth = 4;

      // Left half border — team left color
      ctx.save();
      ctx.shadowColor = TEAM_LEFT.primary;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = TEAM_LEFT.primary;
      ctx.beginPath();
      const ml = project3D(0, H / 2, 0);
      const mt = project3D(W / 2, 0, 0);
      ctx.moveTo(ml.x, ml.y);
      ctx.lineTo(tl.x, tl.y);
      ctx.lineTo(mt.x, mt.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ml.x, ml.y);
      ctx.lineTo(bl.x, bl.y);
      const mb = project3D(W / 2, H, 0);
      ctx.lineTo(mb.x, mb.y);
      ctx.stroke();
      ctx.restore();

      // Right half border — team right color
      ctx.save();
      ctx.shadowColor = TEAM_RIGHT.primary;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = TEAM_RIGHT.primary;
      ctx.beginPath();
      const mr = project3D(W, H / 2, 0);
      ctx.moveTo(mr.x, mr.y);
      ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(mt.x, mt.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mr.x, mr.y);
      ctx.lineTo(br.x, br.y);
      ctx.lineTo(mb.x, mb.y);
      ctx.stroke();
      ctx.restore();

      // ─── Field lines (projected) ───
      ctx.save();
      ctx.shadowColor = 'rgba(100,200,255,0.6)';
      ctx.shadowBlur = 6;
      ctx.strokeStyle = 'rgba(100,200,255,0.30)';
      ctx.lineWidth = 1.2;

      // Center line (dashed)
      ctx.setLineDash([6, 6]);
      const ct = project3D(W / 2, 0, 0);
      const cb = project3D(W / 2, H, 0);
      ctx.beginPath(); ctx.moveTo(ct.x, ct.y); ctx.lineTo(cb.x, cb.y); ctx.stroke();
      ctx.setLineDash([]);

      // Center circle (approximate with projected points)
      const ccR = H * 0.12;
      const ccSteps = 32;
      ctx.beginPath();
      for (let i = 0; i <= ccSteps; i++) {
        const a = (i / ccSteps) * Math.PI * 2;
        const px = W / 2 + Math.cos(a) * ccR * (W / H);
        const py = H / 2 + Math.sin(a) * ccR;
        const p = project3D(px, py, 0);
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();

      // Center spot
      const cs = project3D(W / 2, H / 2, 0);
      ctx.fillStyle = 'rgba(100,200,255,0.5)';
      ctx.beginPath(); ctx.arc(cs.x, cs.y, 2 * cs.scale, 0, Math.PI * 2); ctx.fill();

      // Penalty areas
      const penW = W * 0.14;
      const penH = H * 0.56;
      const penTop = (H - penH) / 2;
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);

      // Left penalty area
      drawProjectedRect(glL, penTop, penW, penH);
      // Right penalty area
      drawProjectedRect(glR - penW, penTop, penW, penH);

      // Goal areas
      const gaW = penW * 0.42;
      const gaH = H * 0.32;
      const gaTop = (H - gaH) / 2;
      drawProjectedRect(glL, gaTop, gaW, gaH);
      drawProjectedRect(glR - gaW, gaTop, gaW, gaH);

      // Goal mouths (bright white)
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;

      const gt = goalTop(), gb = goalBottom();
      let p1 = project3D(glL, gt, 0);
      let p2 = project3D(glL, gb, 0);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

      p1 = project3D(glR, gt, 0);
      p2 = project3D(glR, gb, 0);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

      ctx.restore();

      // ─── Paddles (projected) ───
      allPaddles.forEach(p => {
        const team = p.isLeft ? leftTeam : rightTeam;
        const identity = team ? getZoneIdentity(p, team.data) : { zone: 'fwd', player: { num: '?', name: '???' } };
        const isKeeper = identity.zone === 'box';
        const teamColor = team ? team.data.primary : '#fff';
        const neonColor = isKeeper ? '#00ff88' : teamColor;

        // Project paddle center — paddles are larger in 3D mode for visibility
        const pcx = p.x + p.w / 2;
        const pcy = p.y + p.h / 2;
        const pp = project3D(pcx, pcy, 0);
        const pw = p.w * pp.scale * 2.2;   // thicker
        const ph = p.h * pp.scale * 1.6;   // taller

        ctx.save();
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = p.isPlayer ? 18 : 10;
        ctx.fillStyle = neonColor;
        ctx.fillRect(pp.x - pw / 2, pp.y - ph / 2, pw, ph);
        // Bright core
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.35;
        ctx.fillRect(pp.x - pw / 2 + 1, pp.y - ph / 2 + 1, pw - 2, ph - 2);
        ctx.globalAlpha = 1;
        ctx.restore();

        // Label
        ctx.save();
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = 4;
        ctx.fillStyle = neonColor;
        ctx.font = `bold ${Math.max(7, 8 * pp.scale)}px monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(`#${identity.player.num}`, pp.x, pp.y - ph / 2 - 4 * pp.scale);
        ctx.restore();
      });

      // ─── Ball (projected) ───
      if (goalPause <= 0 && ball) {
        const bp = project3D(ball.x, ball.y, ball.z);
        const r = (ball.size / 2) * bp.scale * 1.4 * (1 + ball.z / 300);

        // Ground shadow when airborne
        if (ball.z > 2) {
          const gp = project3D(ball.x, ball.y, 0);
          const shadowAlpha = Math.max(0.05, 0.15 - ball.z / 500);
          ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
          ctx.beginPath();
          ctx.ellipse(gp.x, gp.y, r * 1.8, r * 0.5 * bp.scale, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        // Ball trail
        for (let i = 0; i < ballTrail.length; i++) {
          const t = ballTrail[i];
          const tp = project3D(t.x, t.y, ball.z * (i / ballTrail.length));
          const alpha = (i / ballTrail.length) * 0.25;
          const tr = r * (0.3 + (i / ballTrail.length) * 0.5);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, tr, 0, Math.PI * 2);
          ctx.fill();
        }

        // Ball core with glow
        ctx.save();
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 12 * bp.scale;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(bp.x, bp.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = '#88ddff';
        ctx.shadowBlur = 20 * bp.scale;
        ctx.beginPath();
        ctx.arc(bp.x, bp.y, r * 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // ─── Glass top edge (subtle reflection) ───
      ctx.save();
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tl.x - 3, tl.y - 3);
      ctx.lineTo(tr.x + 3, tr.y - 3);
      ctx.lineTo(br.x + 3, br.y + 3);
      ctx.lineTo(bl.x - 3, bl.y + 3);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      // ─── Scoreboard (above table, LED style) ───
      ctx.save();
      const scoreY = tl.y - 20;
      ctx.textAlign = 'center';

      // Get current player identities
      const leftId = leftTeam ? getZoneIdentity(leftTeam.paddle, leftTeam.data) : null;
      const rightId = rightTeam ? getZoneIdentity(rightTeam.paddle, rightTeam.data) : null;

      // Left team: short code + player name
      ctx.font = 'bold 13px monospace';
      ctx.shadowBlur = 8;
      ctx.shadowColor = TEAM_LEFT.primary;
      ctx.fillStyle = TEAM_LEFT.primary;
      ctx.textAlign = 'right';
      const leftLabel = leftId ? `${TEAM_LEFT.short}  #${leftId.player.num} ${leftId.player.name.toUpperCase()}` : TEAM_LEFT.short;
      ctx.fillText(leftLabel, W / 2 - 45, scoreY);

      // Right team: player name + short code
      ctx.shadowColor = TEAM_RIGHT.primary;
      ctx.fillStyle = TEAM_RIGHT.primary;
      ctx.textAlign = 'left';
      const rightLabel = rightId ? `${rightId.player.name.toUpperCase()} #${rightId.player.num}  ${TEAM_RIGHT.short}` : TEAM_RIGHT.short;
      ctx.fillText(rightLabel, W / 2 + 45, scoreY);

      // Score — large glowing white
      ctx.textAlign = 'center';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px monospace';
      ctx.fillText(`${scoreL} - ${scoreR}`, W / 2, scoreY + 2);
      ctx.restore();

      // ─── HUD (charge bar, projected near ball) ───
      if (spaceDown && (ballState === 'live' || ballState === 'held_player') && ball) {
        const hp = project3D(ball.x + ball.size + 4, ball.y - 10 - ball.z, 0);
        const maxCharge = 1.5;
        const charge = clamp(spaceHeldTime / maxCharge, 0, 1);
        const barW = 25 * hp.scale;
        const barH = 2 * hp.scale;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(hp.x, hp.y, barW, barH);
        ctx.save();
        ctx.shadowColor = charge < 0.6 ? '#0f0' : '#ff0';
        ctx.shadowBlur = 3;
        const cr = Math.round(255 * charge);
        const cg = Math.round(255 * (1 - charge * 0.4));
        ctx.fillStyle = `rgb(${cr},${cg},80)`;
        ctx.fillRect(hp.x, hp.y, barW * charge, barH);
        ctx.restore();
      }

      // ESC hint
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = menu', W / 2, H - 8);
    }

    // Helper: draw a projected rectangle outline
    function drawProjectedRect(x, y, w, h) {
      const p1 = project3D(x, y, 0);
      const p2 = project3D(x + w, y, 0);
      const p3 = project3D(x + w, y + h, 0);
      const p4 = project3D(x, y + h, 0);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.lineTo(p4.x, p4.y);
      ctx.closePath();
      ctx.stroke();
    }

    // ─── MAIN LOOP ───
    function loop(now) {
      if (gameMode === 'menu') {
        renderMenu();
      } else if (gameMode === 'worldcup') {
        renderWorldCup();
      } else if (cutsceneActive) {
        renderCutscene(now);
      } else if (gameMode === 'match3d') {
        update(now);
        render3D();
      } else {
        update(now);
        render();
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
