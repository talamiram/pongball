<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PongBall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; background: #000; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    // ─── CONSTANTS ───
    const PADDLE_W = 10;
    const OF_H_RATIO = 0.08;
    const GK_H_RATIO = 0.04;
    const BALL_SIZE = 8;
    const OF_SPEED_RATIO = 0.50;
    const BALL_START_SPEED = 0.20;
    const BALL_MAX_SPEED = 0.55;
    const BALL_ACCEL = 1.03;
    const MAX_BOUNCE_ANGLE = Math.PI / 3;

    const GK_SKILL_LEFT = 0.75;
    const GK_SKILL_RIGHT = 0.65;

    // ─── STATE ───
    let scoreL = 0, scoreR = 0;
    let ball, gkL, gkR, ofL, ofR;

    // Ball state: 'on_gk' (sitting on goalkeeper), 'held' (caught by outfield), 'live' (in play)
    let ballState = 'on_gk';
    let holdPaddle = null;
    let holdOffsetY = 0;
    let serveFromLeft = true;      // which GK has the ball for serve

    // Pause after goal before ball appears on GK
    let goalPause = 0;

    // Track paddle velocity for spin
    let ofLPrevY = 0;
    let ofLVelY = 0;

    const keys = {};
    const justPressed = {};
    window.addEventListener('keydown', e => {
      if (!keys[e.code]) justPressed[e.code] = true;
      keys[e.code] = true;
      e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    function consumePress(code) {
      if (justPressed[code]) { justPressed[code] = false; return true; }
      return false;
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    // ─── INIT ───
    function initPositions() {
      const gkH = H * GK_H_RATIO;
      const ofH = H * OF_H_RATIO;

      gkL = { x: 15, y: H / 2 - gkH / 2, w: PADDLE_W, h: gkH };
      gkR = { x: W - 15 - PADDLE_W, y: H / 2 - gkH / 2, w: PADDLE_W, h: gkH };
      ofL = { x: W * 0.30, y: H / 2 - ofH / 2, w: PADDLE_W, h: ofH };
      ofR = { x: W * 0.70 - PADDLE_W, y: H / 2 - ofH / 2, w: PADDLE_W, h: ofH };

      ball = { x: 0, y: 0, vx: 0, vy: 0, size: BALL_SIZE };
    }

    function resetAfterGoal(servingLeft) {
      serveFromLeft = servingLeft;
      ballState = 'on_gk';
      holdPaddle = null;
      ball.vx = 0;
      ball.vy = 0;
      goalPause = 0.6;  // brief pause before ball appears
    }

    // ─── SERVE FROM GK ───
    function serveFromGK() {
      const gk = serveFromLeft ? gkL : gkR;
      const dir = serveFromLeft ? 1 : -1;
      const speed = W * BALL_START_SPEED;
      const angle = (Math.random() - 0.5) * 0.4;

      ball.x = serveFromLeft ? gk.x + gk.w + ball.size / 2 + 2 : gk.x - ball.size / 2 - 2;
      ball.vx = Math.cos(angle) * speed * dir;
      ball.vy = Math.sin(angle) * speed;
      ballState = 'live';
    }

    // AI serve (when right GK has ball)
    let aiServeTimer = 0;
    function aiServeDelay() {
      aiServeTimer = 0.5 + Math.random() * 1.0; // wait 0.5–1.5s then serve
    }

    // ─── SHOOT FROM OUTFIELD ───
    function shootFromOutfield() {
      if (ballState !== 'held' || !holdPaddle) return;

      const speed = W * BALL_START_SPEED * 1.4;
      const spinInfluence = clamp(ofLVelY / (H * 0.5), -1, 1);
      const shootAngle = spinInfluence * MAX_BOUNCE_ANGLE * 0.8;

      // Shoot toward opponent goal (right)
      ball.vx = Math.cos(shootAngle) * speed;
      ball.vy = Math.sin(shootAngle) * speed + ofLVelY * 0.25;

      ballState = 'live';
      holdPaddle = null;
    }

    // ─── GOALKEEPER AI ───
    function gkAI(gk, skill, dt) {
      const maxSpeed = H * 0.45 * skill;
      const center = gk.y + gk.h / 2;

      const ballComingLeft = ball.vx < 0 && gk.x < W / 2;
      const ballComingRight = ball.vx > 0 && gk.x > W / 2;
      const active = ballComingLeft || ballComingRight || ballState !== 'live';

      let target = active ? ball.y : H / 2;

      const lag = active ? (1.0 - skill * 0.7) : 0.95;
      const effective = center + (target - center) * (1 - lag);
      const diff = effective - center;
      const move = Math.sign(diff) * Math.min(Math.abs(diff), maxSpeed * dt);
      gk.y = clamp(gk.y + move, 0, H - gk.h);
    }

    // ─── OUTFIELD AI (right side) ───
    function ofAI(of, dt) {
      const speed = H * OF_SPEED_RATIO * 0.72;
      const cy = of.y + of.h / 2;

      let targetY = ball.y;
      if (ball.vx > 0) {
        const timeToReach = Math.max(0, (of.x - ball.x) / Math.max(ball.vx, 1));
        targetY = ball.y + ball.vy * timeToReach * 0.6;
      }

      const diffY = targetY - cy;
      of.y += Math.sign(diffY) * Math.min(Math.abs(diffY), speed * dt);
      of.y = clamp(of.y, 0, H - of.h);

      let idealX;
      if (ball.vx > 0) {
        idealX = clamp(ball.x + 80, W / 2 + 20, gkR.x - of.w - 40);
      } else {
        idealX = W * 0.68;
      }
      const diffX = idealX - of.x;
      of.x += Math.sign(diffX) * Math.min(Math.abs(diffX), speed * 0.5 * dt);
      of.x = clamp(of.x, W / 2 + 10, gkR.x - of.w - 10);
    }

    // ─── PADDLE COLLISION ───
    function hitPaddle(p, isLeft) {
      if (ball.x + ball.size / 2 > p.x &&
          ball.x - ball.size / 2 < p.x + p.w &&
          ball.y + ball.size / 2 > p.y &&
          ball.y - ball.size / 2 < p.y + p.h) {

        if (isLeft) {
          ball.x = p.x + p.w + ball.size / 2 + 1;
        } else {
          ball.x = p.x - ball.size / 2 - 1;
        }

        const hitPos = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
        const angle = clamp(hitPos, -1, 1) * MAX_BOUNCE_ANGLE;
        const currentSpeed = Math.hypot(ball.vx, ball.vy);
        const newSpeed = Math.min(currentSpeed * BALL_ACCEL, W * BALL_MAX_SPEED);

        ball.vx = Math.cos(angle) * newSpeed * (isLeft ? 1 : -1);
        ball.vy = Math.sin(angle) * newSpeed;

        if (p === ofL) {
          ball.vy += ofLVelY * 0.35;
        }

        return true;
      }
      return false;
    }

    // ─── PHYSICS ───
    function physicsStep(dt) {
      const speed = Math.hypot(ball.vx, ball.vy);
      const maxStep = ball.size * 0.5;
      const totalDist = speed * dt;
      const steps = Math.max(1, Math.ceil(totalDist / maxStep));
      const subDt = dt / steps;

      for (let s = 0; s < steps; s++) {
        ball.x += ball.vx * subDt;
        ball.y += ball.vy * subDt;

        // Wall bounce
        if (ball.y - ball.size / 2 < 0) {
          ball.y = ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.98;
        }
        if (ball.y + ball.size / 2 > H) {
          ball.y = H - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.98;
        }

        // Player outfield catches the ball
        if (hitPaddle(ofL, true)) {
          ballState = 'held';
          holdPaddle = ofL;
          holdOffsetY = clamp(ball.y - (ofL.y + ofL.h / 2), -ofL.h / 2, ofL.h / 2);
          ball.vx = 0;
          ball.vy = 0;
          return;
        }

        // Other paddles just bounce
        hitPaddle(gkL, true);
        hitPaddle(gkR, false);
        hitPaddle(ofR, false);

        // Goals
        if (ball.x + ball.size / 2 < 0) {
          scoreR++;
          resetAfterGoal(true);  // left GK gets the ball (conceded)
          return;
        }
        if (ball.x - ball.size / 2 > W) {
          scoreL++;
          resetAfterGoal(false);  // right GK gets the ball
          return;
        }
      }
    }

    // ─── UPDATE ───
    let lastTime = performance.now();
    initPositions();
    resetAfterGoal(true);  // start with ball on left GK

    function update(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      // Recalc sizes
      gkL.h = H * GK_H_RATIO;
      gkR.h = H * GK_H_RATIO;
      ofL.h = H * OF_H_RATIO;
      ofR.h = H * OF_H_RATIO;
      gkL.x = 15;
      gkR.x = W - 15 - PADDLE_W;

      const pSpeed = H * OF_SPEED_RATIO;
      const prevY = ofLPrevY;

      // Player controls (Arrow keys)
      if (keys['ArrowUp'])    ofL.y -= pSpeed * dt;
      if (keys['ArrowDown'])  ofL.y += pSpeed * dt;
      if (keys['ArrowLeft'])  ofL.x -= pSpeed * dt;
      if (keys['ArrowRight']) ofL.x += pSpeed * dt;
      ofL.x = clamp(ofL.x, gkL.x + gkL.w + 10, W / 2 - ofL.w - 10);
      ofL.y = clamp(ofL.y, 0, H - ofL.h);

      ofLVelY = (ofL.y - prevY) / Math.max(dt, 0.001);
      ofLPrevY = ofL.y;

      // AI
      gkAI(gkL, GK_SKILL_LEFT, dt);
      gkAI(gkR, GK_SKILL_RIGHT, dt);
      ofAI(ofR, dt);

      // ─── Ball state machine ───

      // Goal pause countdown
      if (goalPause > 0) {
        goalPause -= dt;
        return;
      }

      // Ball sitting on GK — waiting for serve
      if (ballState === 'on_gk') {
        const gk = serveFromLeft ? gkL : gkR;
        // Ball sticks to the GK paddle
        if (serveFromLeft) {
          ball.x = gk.x + gk.w + ball.size / 2 + 2;
        } else {
          ball.x = gk.x - ball.size / 2 - 2;
        }
        ball.y = gk.y + gk.h / 2;

        // Player serves with Space (when it's left GK)
        if (serveFromLeft && consumePress('Space')) {
          serveFromGK();
          return;
        }

        // AI serves after a delay (when it's right GK)
        if (!serveFromLeft) {
          if (aiServeTimer <= 0) {
            aiServeDelay();
          }
          aiServeTimer -= dt;
          if (aiServeTimer <= 0) {
            serveFromGK();
          }
        }
        return;
      }

      // Ball held by outfield — Space to shoot
      if (ballState === 'held' && holdPaddle) {
        ball.x = holdPaddle.x + holdPaddle.w + ball.size / 2 + 2;
        ball.y = holdPaddle.y + holdPaddle.h / 2 + holdOffsetY;
        ball.y = clamp(ball.y, ball.size / 2, H - ball.size / 2);

        if (consumePress('Space')) {
          shootFromOutfield();
        }
        return;
      }

      // Ball is live
      physicsStep(dt);
    }

    // ─── DRAW FIELD ───
    function drawField() {
      ctx.strokeStyle = '#1a3d1a';
      ctx.lineWidth = 2;

      // Center line (dashed)
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Center circle
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, H * 0.12, 0, Math.PI * 2);
      ctx.stroke();

      // Center dot
      ctx.fillStyle = '#1a3d1a';
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 3, 0, Math.PI * 2);
      ctx.fill();

      // Penalty areas
      const penW = W * 0.10;
      const penH = H * 0.40;
      ctx.strokeRect(0, H / 2 - penH / 2, penW, penH);
      ctx.strokeRect(W - penW, H / 2 - penH / 2, penW, penH);

      // Goal areas
      const gaW = penW * 0.4;
      const gaH = penH * 0.5;
      ctx.strokeRect(0, H / 2 - gaH / 2, gaW, gaH);
      ctx.strokeRect(W - gaW, H / 2 - gaH / 2, gaW, gaH);

      // Field border
      ctx.strokeRect(1, 1, W - 2, H - 2);
    }

    // ─── RENDER ───
    function render() {
      ctx.clearRect(0, 0, W, H);

      drawField();

      // Paddles
      ctx.fillStyle = '#fff';
      ctx.fillRect(gkL.x, gkL.y, gkL.w, gkL.h);
      ctx.fillRect(gkR.x, gkR.y, gkR.w, gkR.h);
      ctx.fillRect(ofL.x, ofL.y, ofL.w, ofL.h);
      ctx.fillRect(ofR.x, ofR.y, ofR.w, ofR.h);

      // Ball (show when not in goal-pause)
      if (goalPause <= 0) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(
          ball.x - ball.size / 2,
          ball.y - ball.size / 2,
          ball.size, ball.size
        );
      }

      // Prompts
      if (ballState === 'on_gk' && serveFromLeft && goalPause <= 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE to serve', W / 2, 22);
      }
      if (ballState === 'held') {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE to shoot', W / 2, 22);
      }

      // Score
      ctx.fillStyle = '#fff';
      ctx.font = '32px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(scoreL, W / 2 - 60, 50);
      ctx.fillText(scoreR, W / 2 + 60, 50);

      // Controls hint
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Arrows = move  |  Space = serve / shoot', W / 2, H - 10);
    }

    // ─── LOOP ───
    function loop(now) {
      update(now);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
