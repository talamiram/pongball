    // ═══════════════════════════════════════════
    //  AUDIO ENGINE (Web Audio API, no files)
    // ═══════════════════════════════════════════
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    // Crowd ambient noise (filtered white noise)
    let crowdNode = null;
    let crowdGain = null;
    function startCrowd() {
      const ac = ensureAudio();
      if (crowdNode) return;
      const bufSize = ac.sampleRate * 2;
      const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
      crowdNode = ac.createBufferSource();
      crowdNode.buffer = buf;
      crowdNode.loop = true;
      // Band-pass filter to sound like crowd murmur
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 400;
      bp.Q.value = 0.4;
      // Low-frequency modulation for "wave" effect
      const mod = ac.createGain();
      const lfo = ac.createOscillator();
      const lfoGain = ac.createGain();
      lfo.frequency.value = 0.15;  // slow swell
      lfoGain.gain.value = 0.02;
      lfo.connect(lfoGain);
      lfoGain.connect(mod.gain);
      lfo.start();
      crowdGain = ac.createGain();
      crowdGain.gain.value = 0.06;  // quiet background
      crowdNode.connect(bp);
      bp.connect(mod);
      mod.connect(crowdGain);
      crowdGain.connect(ac.destination);
      crowdNode.start();
    }
    function stopCrowd() {
      if (crowdNode) { try { crowdNode.stop(); } catch(e) {} crowdNode = null; }
      crowdGain = null;
    }

    // Crowd roar (goal excitement — louder, higher pitch burst)
    function crowdRoar() {
      const ac = ensureAudio();
      const dur = 2.5;
      const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const src = ac.createBufferSource();
      src.buffer = buf;
      src.loop = false;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 700;
      bp.Q.value = 0.3;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.25, ac.currentTime);
      g.gain.linearRampToValueAtTime(0.15, ac.currentTime + 0.8);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + dur);
      src.connect(bp);
      bp.connect(g);
      g.connect(ac.destination);
      src.start();
      // Also swell the ambient crowd
      if (crowdGain) {
        crowdGain.gain.setValueAtTime(0.15, ac.currentTime);
        crowdGain.gain.linearRampToValueAtTime(0.06, ac.currentTime + 2.5);
      }
    }

    // "GOL!" — Italian broadcaster voice (synthesized vowel formants)
    function playGol() {
      const ac = ensureAudio();
      const t = ac.currentTime + 0.2;  // slight delay after goal
      const dur = 1.8;

      // Vocal oscillator (sawtooth for voice-like timbre)
      const voice = ac.createOscillator();
      voice.type = 'sawtooth';
      // Pitch: starts high, drops like "GOOOOOL!"
      voice.frequency.setValueAtTime(220, t);
      voice.frequency.linearRampToValueAtTime(180, t + 0.15);  // "G"
      voice.frequency.setValueAtTime(200, t + 0.15);            // "O" rise
      voice.frequency.linearRampToValueAtTime(160, t + dur * 0.8);  // long "O" sustain drops
      voice.frequency.linearRampToValueAtTime(120, t + dur);     // "L" drop

      // Second harmonic for richness
      const voice2 = ac.createOscillator();
      voice2.type = 'sawtooth';
      voice2.frequency.setValueAtTime(441, t);
      voice2.frequency.linearRampToValueAtTime(361, t + 0.15);
      voice2.frequency.setValueAtTime(401, t + 0.15);
      voice2.frequency.linearRampToValueAtTime(321, t + dur * 0.8);
      voice2.frequency.linearRampToValueAtTime(241, t + dur);

      // Formant filter for "O" vowel sound
      const formant1 = ac.createBiquadFilter();
      formant1.type = 'bandpass';
      formant1.frequency.value = 500;  // F1 for "O"
      formant1.Q.value = 8;
      const formant2 = ac.createBiquadFilter();
      formant2.type = 'bandpass';
      formant2.frequency.value = 1000;  // F2 for "O"
      formant2.Q.value = 8;

      // Amplitude envelope
      const g = ac.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.12, t + 0.08);  // attack
      g.gain.setValueAtTime(0.12, t + 0.15);
      g.gain.linearRampToValueAtTime(0.08, t + dur * 0.7);  // sustain
      g.gain.linearRampToValueAtTime(0, t + dur);  // release

      const g2 = ac.createGain();
      g2.gain.value = 0.06;

      // Route: voice → formant filters → gain → out
      const merger = ac.createGain();
      voice.connect(formant1);
      voice.connect(formant2);
      voice2.connect(formant1);
      voice2.connect(formant2);
      formant1.connect(merger);
      formant2.connect(merger);
      merger.connect(g);
      g.connect(ac.destination);

      voice.start(t);
      voice.stop(t + dur);
      voice2.start(t);
      voice2.stop(t + dur);
    }

    // Ball hit sound (short percussive click)
    function playKickSound(intensity) {
      const ac = ensureAudio();
      const t = ac.currentTime;
      const vol = 0.10 + 0.08 * (intensity || 0.5);
      // Deep kick thump
      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.12);
      const g = ac.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(g);
      g.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.15);
      // Snappy attack click
      const osc2 = ac.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(600, t);
      osc2.frequency.exponentialRampToValueAtTime(150, t + 0.04);
      const g2 = ac.createGain();
      g2.gain.setValueAtTime(vol * 0.6, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      osc2.connect(g2);
      g2.connect(ac.destination);
      osc2.start(t);
      osc2.stop(t + 0.05);
    }

    // Lob landing thud (deep satisfying impact)
    function playLandingThud(intensity) {
      const ac = ensureAudio();
      const t = ac.currentTime;
      const vol = 0.12 * intensity;
      // Deep thump
      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
      const g = ac.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(g);
      g.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.2);
      // Higher click layer
      const osc2 = ac.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(500 * intensity, t);
      osc2.frequency.exponentialRampToValueAtTime(100, t + 0.05);
      const g2 = ac.createGain();
      g2.gain.setValueAtTime(vol * 0.5, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      osc2.connect(g2);
      g2.connect(ac.destination);
      osc2.start(t);
      osc2.stop(t + 0.06);
    }

    // Wall bounce sound (softer thud)
    function playWallSound() {
      const ac = ensureAudio();
      const t = ac.currentTime;
      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.06);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.connect(g);
      g.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.08);
    }

    function playWhistle() {
      const ac = ensureAudio();
      const t = ac.currentTime;
      // High-pitched whistle
      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(2800, t);
      osc.frequency.setValueAtTime(3200, t + 0.1);
      osc.frequency.setValueAtTime(2800, t + 0.25);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.08, t);
      g.gain.setValueAtTime(0.10, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.connect(g);
      g.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.35);
    }

    // World Cup tournament state
    let wcState = null;  // { phase, groups, bracket, currentMatch, results }

    function initWorldCup() {
      wcState = {
        phase: 'group_show',  // group_show → group_play → r16_show → r16_play → qf_show → qf_play → sf_show → sf_play → final_show → final_play → champion
        groupStandings: {},
        groupMatches: {},
        groupMatchIndex: {},  // which match we're on per group
        bracket: {},  // r16, qf, sf, final results
        currentMatch: null,
        playerTeam: 'ITA',
        schedule: [],
        scheduleIndex: 0
      };

      // Build group standings
      for (const [g, teams] of Object.entries(WC_GROUPS)) {
        wcState.groupStandings[g] = teams.map(t => ({ team: t, pts: 0, gf: 0, ga: 0, gd: 0, w: 0, d: 0, l: 0 }));
        // 6 matches per group (each team plays other 3)
        const matches = [];
        for (let i = 0; i < teams.length; i++) {
          for (let j = i + 1; j < teams.length; j++) {
            matches.push({ home: teams[i], away: teams[j], scoreH: null, scoreA: null, played: false });
          }
        }
        wcState.groupMatches[g] = matches;
        wcState.groupMatchIndex[g] = 0;
      }

      // Build schedule: all group matches, player's matches first per round
      buildGroupSchedule();
    }

    function buildGroupSchedule() {
      // Schedule all group matches — player team matches are playable, rest are simulated
      wcState.schedule = [];
      const allMatches = [];
      for (const [g, matches] of Object.entries(wcState.groupMatches)) {
        matches.forEach((m, i) => allMatches.push({ group: g, matchIdx: i, ...m }));
      }
      // Sort: player matches first, then others
      allMatches.sort((a, b) => {
        const aPlayer = a.home === 'ITA' || a.away === 'ITA';
        const bPlayer = b.home === 'ITA' || b.away === 'ITA';
        if (aPlayer && !bPlayer) return -1;
        if (!aPlayer && bPlayer) return 1;
        return 0;
      });
      wcState.schedule = allMatches;
      wcState.scheduleIndex = 0;
    }

    function wcNextMatch() {
      while (wcState.scheduleIndex < wcState.schedule.length) {
        const m = wcState.schedule[wcState.scheduleIndex];
        if (!m.played) return m;
        wcState.scheduleIndex++;
      }
      return null;
    }

    function wcSimMatch(home, away) {
      // Simple simulation based on team quality
      const hTeam = WC_TEAMS[home], aTeam = WC_TEAMS[away];
      const hStr = hTeam ? (hTeam.fwd[0].stats.speed + hTeam.mid[0].stats.reaction) : 1.4;
      const aStr = aTeam ? (aTeam.fwd[0].stats.speed + aTeam.mid[0].stats.reaction) : 1.4;
      const hGoals = Math.floor(Math.random() * 3 * (hStr / (hStr + aStr)) + Math.random());
      const aGoals = Math.floor(Math.random() * 3 * (aStr / (hStr + aStr)) + Math.random());
      return { scoreH: hGoals, scoreA: aGoals };
    }

    function wcUpdateStandings(group, home, away, scoreH, scoreA) {
      const standings = wcState.groupStandings[group];
      const h = standings.find(s => s.team === home);
      const a = standings.find(s => s.team === away);
      h.gf += scoreH; h.ga += scoreA; h.gd = h.gf - h.ga;
      a.gf += scoreA; a.ga += scoreH; a.gd = a.gf - a.ga;
      if (scoreH > scoreA) { h.pts += 3; h.w++; a.l++; }
      else if (scoreA > scoreH) { a.pts += 3; a.w++; h.l++; }
      else { h.pts += 1; a.pts += 1; h.d++; a.d++; }
      // Sort standings
      standings.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    }

    function wcSimRemainingGroupMatches() {
      for (const [g, matches] of Object.entries(wcState.groupMatches)) {
        matches.forEach(m => {
          if (!m.played) {
            const result = wcSimMatch(m.home, m.away);
            m.scoreH = result.scoreH;
            m.scoreA = result.scoreA;
            m.played = true;
            wcUpdateStandings(g, m.home, m.away, m.scoreH, m.scoreA);
          }
        });
      }
    }

    function wcGetGroupWinners() {
      // Top 2 from each group + 4 best 3rd-place teams
      const qualified = [];
      const thirdPlace = [];
      for (const [g, standings] of Object.entries(wcState.groupStandings)) {
        qualified.push(standings[0].team, standings[1].team);
        thirdPlace.push({ ...standings[2], group: g });
      }
      // Best 4 third-place teams
      thirdPlace.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
      for (let i = 0; i < 4; i++) qualified.push(thirdPlace[i].team);
      return qualified;
    }

    function wcBuildBracket() {
      // Italia '90 Round of 16 bracket (simplified — actual FIFA bracket rules)
      const q = wcGetGroupWinners();
      const gs = wcState.groupStandings;
      // R16 matchups: 1A v 3C/D/E, 2A v 2C, 1B v 3A/C/F, 2B v 2D, 1C v 3A/B/F, 2C v 2A... etc
      // Simplified: group winners vs third-place, runners-up vs runners-up from other groups
      const w = (g) => gs[g][0].team;  // winner
      const r = (g) => gs[g][1].team;  // runner-up
      const t = (g) => gs[g][2].team;  // third

      // Approximate Italia '90 R16 bracket
      wcState.bracket = {
        r16: [
          { home: w('A'), away: t('C'), scoreH: null, scoreA: null, played: false },  // 1
          { home: r('B'), away: r('C'), scoreH: null, scoreA: null, played: false },  // 2
          { home: w('D'), away: t('B'), scoreH: null, scoreA: null, played: false },  // 3
          { home: r('A'), away: r('D'), scoreH: null, scoreA: null, played: false },  // 4
          { home: w('C'), away: t('A'), scoreH: null, scoreA: null, played: false },  // 5
          { home: r('F'), away: r('E'), scoreH: null, scoreA: null, played: false },  // 6
          { home: w('B'), away: t('F'), scoreH: null, scoreA: null, played: false },  // 7
          { home: w('E'), away: w('F'), scoreH: null, scoreA: null, played: false },  // 8
        ],
        qf: [], sf: [], final: []
      };
    }

    function wcMatchWinner(m) {
      if (m.scoreH > m.scoreA) return m.home;
      if (m.scoreA > m.scoreH) return m.away;
      // Penalty shootout (random for simulated)
      return Math.random() < 0.5 ? m.home : m.away;
    }

    function wcAdvanceBracket(round) {
      const matches = wcState.bracket[round];
      const nextRound = round === 'r16' ? 'qf' : round === 'qf' ? 'sf' : 'final';
      wcState.bracket[nextRound] = [];
      for (let i = 0; i < matches.length; i += 2) {
        const w1 = wcMatchWinner(matches[i]);
        const w2 = wcMatchWinner(matches[i + 1]);
        wcState.bracket[nextRound].push({ home: w1, away: w2, scoreH: null, scoreA: null, played: false });
      }
    }

    function wcIsPlayerMatch(m) {
      return m.home === 'ITA' || m.away === 'ITA';
    }

    function wcStartPlayableMatch(m) {
      // Set up a real game with the opponent
      const opponent = m.home === 'ITA' ? m.away : m.home;
      const oppTeam = WC_TEAMS[opponent];
      const playerIsLeft = m.home === 'ITA';

      // Set active teams
      if (playerIsLeft) {
        activeLeftData = WC_TEAMS.ITA;
        activeRightData = oppTeam;
        leftTeam = buildTeam(WC_TEAMS.ITA, true, false);
        rightTeam = buildTeam(oppTeam, false, false);
      } else {
        activeLeftData = oppTeam;
        activeRightData = WC_TEAMS.ITA;
        leftTeam = buildTeam(oppTeam, true, false);
        rightTeam = buildTeam(WC_TEAMS.ITA, false, false);
      }
      // Player always controls left
      leftTeam.paddle.isPlayer = true;
      leftTeam.paddle.isLeft = true;
      rightTeam.paddle.isPlayer = false;
      rightTeam.paddle.isLeft = false;

      rebuildPaddleList();
      ball = { x: 0, y: 0, vx: 0, vy: 0, z: 0, vz: 0, size: BALL_SIZE, curve: 0 };
      ballTrail = [];
      scoreL = 0; scoreR = 0;
      matchTimer = MATCH_TIME; matchOver = false; goalLog = [];
      injuryTime = 1 + Math.floor(Math.random() * 5);
      inInjuryTime = false;
      possessionLeft = 0; possessionRight = 0;
      foulState = null; foulCooldown = 0;
      lastShotChargeTime = 0; lastShotMaxZ = 0; currentMaxZ = 0;
      resetAfterGoal(true);
      goalPause = 0;
      lastTime = performance.now();
      goalCelebration = null;

      wcState.currentMatch = m;
      gameMode = 'wc_match';
      cutsceneActive = false;
    }

    function wcFinishMatch() {
      const m = wcState.currentMatch;
      const playerIsLeft = m.home === 'ITA';
      m.scoreH = playerIsLeft ? scoreL : scoreR;
      m.scoreA = playerIsLeft ? scoreR : scoreL;
      m.played = true;

      // Update standings if group phase
      if (wcState.phase === 'group_play') {
        // Find which group this match is in
        for (const [g, matches] of Object.entries(wcState.groupMatches)) {
          const found = matches.find(gm => gm.home === m.home && gm.away === m.away);
          if (found) {
            found.scoreH = m.scoreH;
            found.scoreA = m.scoreA;
            found.played = true;
            wcUpdateStandings(g, m.home, m.away, m.scoreH, m.scoreA);
            break;
          }
        }
      }

      wcState.currentMatch = null;
      gameMode = 'worldcup';

      // Advance tournament
      wcAdvanceTournament();
    }

    function wcAdvanceTournament() {
      if (wcState.phase === 'group_play') {
        // Check if player has more group matches
        const playerGroup = Object.entries(WC_GROUPS).find(([g, teams]) => teams.includes('ITA'))[0];
        const remaining = wcState.groupMatches[playerGroup].filter(m => !m.played && wcIsPlayerMatch(m));
        if (remaining.length > 0) return;  // more to play

        // Sim remaining group matches
        wcSimRemainingGroupMatches();
        wcState.phase = 'group_done';

        // Check if Italy qualified
        const winners = wcGetGroupWinners();
        if (!winners.includes('ITA')) {
          wcState.phase = 'eliminated';
          return;
        }

        // Build knockout bracket
        wcBuildBracket();
        wcState.phase = 'r16_show';
      } else if (wcState.phase === 'r16_play') {
        // Sim non-player R16 matches
        wcState.bracket.r16.forEach(m => {
          if (!m.played) {
            const r = wcSimMatch(m.home, m.away);
            m.scoreH = r.scoreH; m.scoreA = r.scoreA; m.played = true;
          }
        });
        if (!wcState.bracket.r16.find(m => wcMatchWinner(m) === 'ITA')) {
          wcState.phase = 'eliminated'; return;
        }
        wcAdvanceBracket('r16');
        wcState.phase = 'qf_show';
      } else if (wcState.phase === 'qf_play') {
        wcState.bracket.qf.forEach(m => {
          if (!m.played) {
            const r = wcSimMatch(m.home, m.away);
            m.scoreH = r.scoreH; m.scoreA = r.scoreA; m.played = true;
          }
        });
        if (!wcState.bracket.qf.find(m => wcMatchWinner(m) === 'ITA')) {
          wcState.phase = 'eliminated'; return;
        }
        wcAdvanceBracket('qf');
        wcState.phase = 'sf_show';
      } else if (wcState.phase === 'sf_play') {
        wcState.bracket.sf.forEach(m => {
          if (!m.played) {
            const r = wcSimMatch(m.home, m.away);
            m.scoreH = r.scoreH; m.scoreA = r.scoreA; m.played = true;
          }
        });
        if (!wcState.bracket.sf.find(m => wcMatchWinner(m) === 'ITA')) {
          wcState.phase = 'eliminated'; return;
        }
        wcAdvanceBracket('sf');
        wcState.phase = 'final_show';
      } else if (wcState.phase === 'final_play') {
        const finalMatch = wcState.bracket.final[0];
        if (wcMatchWinner(finalMatch) === 'ITA') {
          wcState.phase = 'champion';
        } else {
          wcState.phase = 'eliminated';
        }
      }
    }

    // ─── CONSTANTS ───
    const PADDLE_W = 12;
    const PADDLE_H_RATIO = 0.09;
    const BALL_SIZE = 12;
    const GOAL_LINE_RATIO = 0.02;

    const BALL_SPEED = 0.20;
    const BALL_MAX_SPEED = 0.40;
    const BALL_ACCEL = 1.02;
    const SPEED_3D = 1.30;  // 3D field is visually smaller, so speed up to compensate
    const MAX_BOUNCE_ANGLE = Math.PI / 3;
    const HOLD_TIME_LIMIT = 2.0;

    const LOB_POWER = 2.2;
    const AIR_THRESHOLD = 10;

    const GOAL_HEIGHT_RATIO = 0.20;
    const POST_THICK = 6;
    const GOAL_DEPTH = 18;

    const MATCH_TIME = 90;  // 90-second match
    const AI_SKILL = 0.80;
    const PADDLE_SPEED_RATIO = 0.50;

    // Zone x-boundaries (ratio of W, for left team — right is mirrored)
    const ZONE_BOX = 0.05;   // 0.00 – 0.05 = keeper zone
    const ZONE_DEF = 0.22;   // 0.05 – 0.22 = defense
    const ZONE_MID = 0.38;   // 0.22 – 0.38 = midfield
    // 0.38 – 0.50 = forward

    // ─── STATE ───
    let scoreL = 0, scoreR = 0;
    let matchTimer = MATCH_TIME;
    let matchOver = false;
    let injuryTime = 0;  // random 1-5 extra seconds/minutes
    let inInjuryTime = false;
    let goalLog = [];  // { side: 'left'|'right', scorer, num, time }
    // Active team data (changes for WC matches)
    let activeLeftData = TEAM_LEFT;
    let activeRightData = TEAM_RIGHT;
    let possessionLeft = 0, possessionRight = 0;  // time in seconds
    let _toScreen = (gx, gy) => ({ x: gx, y: gy });
    let _perspScale = (gy) => 1;
    let ball;
    let allPaddles = [];

    let ballState = 'live';       // 'live' | 'held_player' | 'held_ai'
    let holdPaddle = null;
    let holdTimer = 0;
    let goalPause = 0;

    // Net rattle state
    let netRattleLeft = 0;   // remaining rattle time (seconds)
    let netRattleRight = 0;
    let netRattleSeed = 0;   // randomize rattle pattern per goal

    // Lob landing impact
    let landingImpact = 0;     // 0→1 decaying shake intensity
    let landingX = 0, landingY = 0;  // where it landed

    // Goal celebration state
    let goalCelebration = null;  // { scorer, team, timer, side }
    const CELEBRATION_TIME = 2.0;  // seconds

    // Paddle hit bounce (rubber feel)
    let paddleBounce = {};  // keyed by paddle ref, { timer, intensity }

    // Foul / free kick state
    let foulState = null;  // null | { x, y, team: 'left'|'right', timer, isPenalty }
    let foulCooldown = 0;  // prevent rapid fouls

    let playerVelY = 0;
    let playerPrevY = 0;

    const keys = {};
    const justReleased = {};
    let spaceHeldTime = 0;
    let spaceDown = false;

    // Ball trail for neon effect
    let ballTrail = [];

    // Debug stats for physics mode
    let lastShotChargeTime = 0;
    let lastShotMaxZ = 0;
    let currentMaxZ = 0;

    // Cutscene state
    let cutsceneActive = false;
    let cutsceneStartTime = 0;
    const CUTSCENE_DURATION = 6.0;

    // Coffee Table cutscene
    let ctCutsceneActive = false;
    let ctCutsceneStart = 0;
    const CT_CUTSCENE_DUR = 4.5;  // total seconds   // total seconds
    const CUTSCENE_LOGO_END = 2.2;   // logo phase ends
    const CUTSCENE_TABLE_START = 1.8; // table fades in (overlaps logo end)
    const CUTSCENE_ZOOM_START = 3.0;  // zoom into gameplay begins
    const CUTSCENE_ZOOM_END = 5.0;    // zoom finishes
    const CUTSCENE_TEXT_START = 4.0;   // team names appear
    const CUTSCENE_TEXT_END = 5.8;     // team names fade out

    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' && !spaceDown) {
        spaceDown = true;
        spaceHeldTime = 0;
      }
      // Menu input
      if (gameMode === 'menu') {
        if (e.code === 'ArrowUp') {
          menuSelection = (menuSelection + 4) % 5;
        }
        if (e.code === 'ArrowDown') {
          menuSelection = (menuSelection + 1) % 5;
        }
        if (e.code === 'Enter' || e.code === 'Space') {
          startGame(['physics', 'coffeetable', 'match3d', 'match', 'worldcup'][menuSelection]);
        }
        if (e.code === 'Digit1') startGame('physics');
        if (e.code === 'Digit2') startGame('coffeetable');
        if (e.code === 'Digit3') startGame('match3d');
        if (e.code === 'Digit4') startGame('match');
        if (e.code === 'Digit5') startGame('worldcup');
      }
      // World Cup navigation
      if (gameMode === 'worldcup' && wcState && (e.code === 'Space' || e.code === 'Enter')) {
        const p = wcState.phase;
        if (p === 'group_show') {
          wcState.phase = 'group_play';
          // Find next player match
          const playerGroup = Object.entries(WC_GROUPS).find(([g, teams]) => teams.includes('ITA'))[0];
          const nextMatch = wcState.groupMatches[playerGroup].find(m => !m.played && wcIsPlayerMatch(m));
          if (nextMatch) wcStartPlayableMatch(nextMatch);
        } else if (p === 'group_play') {
          // Find next player match in groups
          const pg = Object.entries(WC_GROUPS).find(([g, teams]) => teams.includes('ITA'))[0];
          const nm = wcState.groupMatches[pg].find(m => !m.played && wcIsPlayerMatch(m));
          if (nm) { wcStartPlayableMatch(nm); }
          else { wcState.phase = 'group_done'; wcAdvanceTournament(); }
        } else if (p === 'group_done') {
          wcAdvanceTournament();
        } else if (p === 'r16_show') {
          wcState.phase = 'r16_play';
          const m = wcState.bracket.r16.find(m => !m.played && wcIsPlayerMatch(m));
          if (m) wcStartPlayableMatch(m);
        } else if (p === 'qf_show') {
          wcState.phase = 'qf_play';
          const m = wcState.bracket.qf.find(m => !m.played && wcIsPlayerMatch(m));
          if (m) wcStartPlayableMatch(m);
        } else if (p === 'sf_show') {
          wcState.phase = 'sf_play';
          const m = wcState.bracket.sf.find(m => !m.played && wcIsPlayerMatch(m));
          if (m) wcStartPlayableMatch(m);
        } else if (p === 'final_show') {
          wcState.phase = 'final_play';
          const m = wcState.bracket.final.find(m => !m.played && wcIsPlayerMatch(m));
          if (m) wcStartPlayableMatch(m);
        } else if (p === 'champion' || p === 'eliminated') {
          startGame('worldcup');  // restart tournament
        }
        return;
      }
      // WC match game over → return to World Cup screen
      if (gameMode === 'wc_match' && matchOver && e.code === 'Space') {
        wcFinishMatch();
        return;
      }
      // Rematch on Space when game over (non-WC)
      if (matchOver && e.code === 'Space' && gameMode !== 'wc_match') {
        startGame(gameMode);
        return;
      }
      // Skip cutscene
      if ((cutsceneActive || ctCutsceneActive) && (e.code === 'Space' || e.code === 'Enter')) {
        cutsceneActive = false;
        ctCutsceneActive = false;
        lastTime = performance.now();
      }
      // ESC back to menu
      if (e.code === 'Escape' && gameMode !== 'menu') {
        gameMode = 'menu';
        cutsceneActive = false;
        ctCutsceneActive = false;
        stopCrowd();
        goalCelebration = null;
      }
      e.preventDefault();
    });
    window.addEventListener('keyup', e => {
      keys[e.code] = false;
      justReleased[e.code] = true;
      if (e.code === 'Space') spaceDown = false;
    });

    function consumeRelease(code) {
      if (justReleased[code]) { justReleased[code] = false; return true; }
      return false;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ─── GOAL GEOMETRY ───
    function goalTop()    { return H / 2 - H * GOAL_HEIGHT_RATIO / 2; }
    function goalBottom() { return H / 2 + H * GOAL_HEIGHT_RATIO / 2; }

    // ─── BUILD TEAM — one paddle per team ───
    function makePaddle(isLeft, teamData) {
      const w = PADDLE_W;
      const h = H * PADDLE_H_RATIO;
      // Start in the box (keeper zone)
      const homeXRatio = isLeft ? 0.03 : 0.97;
      const homeX = W * homeXRatio - w / 2;
      const homeY = H * 0.5 - h / 2;
      return {
        isLeft,
        isPlayer: isLeft,  // left team is player-controlled
        x: homeX, y: homeY, w, h,
        homeXRatio,
        color: teamData.primary,
        teamName: teamData.short
      };
    }

    // ─── ZONE IDENTITY: resolve which player the paddle "is" based on position ───
    function getZoneIdentity(paddle, teamData) {
      const xRatio = (paddle.x + paddle.w / 2) / W;
      const yRatio = (paddle.y + paddle.h / 2) / H;
      const isLeft = paddle.isLeft;

      // X zones (left team; right team is mirrored)
      const x = isLeft ? xRatio : (1 - xRatio);
      let zone, zoneList;
      if (x < ZONE_BOX) {
        zone = 'box'; zoneList = [teamData.gk];
      } else if (x < ZONE_DEF) {
        zone = 'def'; zoneList = teamData.def;
      } else if (x < ZONE_MID) {
        zone = 'mid'; zoneList = teamData.mid;
      } else {
        zone = 'fwd'; zoneList = teamData.fwd;
      }

      // Y position picks specific player within the zone
      let idx = 0;
      if (zoneList.length === 4) {
        const bands = [0.265, 0.50, 0.735];
        if (yRatio < bands[0]) idx = 0;
        else if (yRatio < bands[1]) idx = 1;
        else if (yRatio < bands[2]) idx = 2;
        else idx = 3;
      } else if (zoneList.length === 2) {
        idx = yRatio < 0.5 ? 0 : 1;
      }

      const player = zoneList[idx];
      return { zone, player, stats: player.stats };
    }

    function buildTeam(td, isLeft, physicsMode) {
      const paddle = makePaddle(isLeft, td);
      return { paddle, data: td, isLeft };
    }

    function repositionAll() {
      [leftTeam, rightTeam].forEach(team => {
        if (!team) return;
        const p = team.paddle;
        p.h = H * PADDLE_H_RATIO;
        p.w = PADDLE_W;
      });
      rebuildPaddleList();
    }

    function rebuildPaddleList() {
      allPaddles = [];
      if (leftTeam) allPaddles.push(leftTeam.paddle);
      if (rightTeam) allPaddles.push(rightTeam.paddle);
    }

    // ─── INIT ───
    function startGame(mode) {
      gameMode = mode;
      if (mode === 'worldcup') {
        initWorldCup();
        return;
      }
      const isPhysics = mode === 'physics';
      activeLeftData = TEAM_LEFT;
      activeRightData = TEAM_RIGHT;
      leftTeam = buildTeam(activeLeftData, true, isPhysics);
      rightTeam = buildTeam(activeRightData, false, isPhysics);
      rebuildPaddleList();
      ball = { x: 0, y: 0, vx: 0, vy: 0, z: 0, vz: 0, size: BALL_SIZE, curve: 0 };
      ballTrail = [];
      scoreL = 0; scoreR = 0;
      matchTimer = MATCH_TIME; matchOver = false; goalLog = [];
      injuryTime = 1 + Math.floor(Math.random() * 5);  // 1-5 injury time minutes
      inInjuryTime = false;
      possessionLeft = 0; possessionRight = 0;
      lastShotChargeTime = 0; lastShotMaxZ = 0; currentMaxZ = 0;
      resetAfterGoal(true);  // left team (conceding side) starts with ball
      goalPause = 0;  // no pause at kickoff (resetAfterGoal sets 0.8s pause for goals)
      lastTime = performance.now();

      // Audio context ready for goal sounds (no ambient crowd)

      if (mode === 'match' || mode === 'match3d') {
        cutsceneActive = true;
        cutsceneStartTime = performance.now() / 1000;
      } else if (mode === 'coffeetable') {
        ctCutsceneActive = true;
        ctCutsceneStart = performance.now() / 1000;
        cutsceneActive = false;
      } else {
        cutsceneActive = false;
      }
    }

    function resetAfterGoal(concedingLeft) {
      // Conceding team gets the ball — their paddle goes to box, holds ball
      const team = concedingLeft ? leftTeam : rightTeam;
      const p = team.paddle;
      // Move paddle to box (keeper zone)
      p.x = p.isLeft ? W * 0.03 - p.w / 2 : W * 0.97 - p.w / 2;
      p.y = H * 0.5 - p.h / 2;

      ballState = concedingLeft ? 'held_player' : 'held_ai';
      holdPaddle = p;
      holdTimer = 0;
      if (ball) { ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0; ball.curve = 0; stickBallToFront(p); }
      goalPause = 2.0;  // extended for celebration
      aiHoldTimer = 0.6 + Math.random() * 0.8;  // AI holds briefly before distributing
      currentMaxZ = 0;
    }

    let aiHoldTimer = 0;

    // ─── RELEASE FROM HOLD (box catch → distribute) ───
    function releaseFromHold(paddle, chargeTime) {
      const dir = paddle.isLeft ? 1 : -1;
      const charge = chargeTime || 0;
      const speed = W * BALL_SPEED;

      let aimY = 0;
      if (paddle.isPlayer) {
        if (keys['ArrowUp'])   aimY = -0.5;
        if (keys['ArrowDown']) aimY =  0.5;
      } else {
        aimY = (Math.random() - 0.5) * 0.4;
      }

      ball.x = paddle.isLeft ? paddle.x + paddle.w + ball.size / 2 + 2
                              : paddle.x - ball.size / 2 - 2;
      ball.vx = Math.cos(aimY) * speed * dir;
      ball.vy = Math.sin(aimY) * speed;
      ball.z = 0;
      ball.vz = charge * H * LOB_POWER * 0.5;  // gentle lob on distribute
      ball.curve = 0;

      lastShotChargeTime = charge;
      currentMaxZ = 0;
      ballState = 'live';
      holdPaddle = null;
      holdTimer = 0;
    }

    // ─── ZONE-SPECIFIC ABILITIES ───
    // Called when Space is held during paddle collision
    function handleZoneAbility(paddle, zone, chargeTime) {
      const dir = paddle.isLeft ? 1 : -1;
      const charge = chargeTime || 0;

      if (zone === 'box') {
        // CATCH — hold the ball
        ballState = paddle.isPlayer ? 'held_player' : 'held_ai';
        holdPaddle = paddle;
        holdTimer = 0;
        aiHoldTimer = 0.4 + Math.random() * 0.8;
        ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0; ball.curve = 0;
        return;
      }

      // All other zones: LOB — hold Space longer = higher lob
      let aimY = 0;
      if (paddle.isPlayer) {
        if (keys['ArrowUp'])   aimY = -0.6;
        if (keys['ArrowDown']) aimY =  0.6;
      } else {
        aimY = (Math.random() - 0.5) * 0.5;
      }

      const speed = W * BALL_SPEED;
      ball.vx = Math.cos(aimY) * speed * dir;
      ball.vy = Math.sin(aimY) * speed;
      ball.vz = Math.max(charge, 0.35) * H * LOB_POWER;
      ball.curve = 0;

      ball.z = 0;
      lastShotChargeTime = charge;
      currentMaxZ = 0;
      spaceHeldTime = 0;
    }

    // ─── AI PADDLE (right team — one paddle, full field movement) ───
    function aiPaddle(paddle, dt) {
      if (!ball || ballState === 'held_ai') return;  // AI handles held state in update()

      const speed = H * PADDLE_SPEED_RATIO * AI_SKILL;
      const cy = paddle.y + paddle.h / 2;
      const cx = paddle.x + paddle.w / 2;

      // Decide target position based on game state
      let targetX, targetY;
      const ballComingToUs = ball.vx > 0;
      const ballInOurHalf = ball.x > W * 0.5;
      const ballDangerous = ballComingToUs && ballInOurHalf;

      if (ballDangerous || ballState !== 'live') {
        // DEFEND — retreat toward box, track ball y
        targetX = W * 0.55;  // near the box but not fully in
        targetY = ball.y;
        // If ball is very close, go full keeper mode
        if (ball.x > W * 0.75) {
          targetX = W * 0.97;  // in the box
        }
      } else if (!ballInOurHalf) {
        // ATTACK — push forward into player's half
        targetX = W * 0.40;  // cross into enemy territory
        targetY = ball.y;
      } else {
        // NEUTRAL — midfield positioning
        targetX = W * 0.60;
        targetY = H * 0.5;
      }

      // Move toward target — slower in enemy half
      const inEnemyHalf = cx < W * 0.5;
      const aiSpeedMult = inEnemyHalf ? 0.65 : 1.0;
      const dx = targetX - cx;
      const dy = targetY - cy;
      const lag = 1 - AI_SKILL * 0.6;
      paddle.x += dx * (1 - lag) * dt * 3 * aiSpeedMult;
      paddle.y += dy * (1 - lag) * dt * 3 * aiSpeedMult;
      // Magnetic pull back toward own half
      if (inEnemyHalf) {
        const overBy = (W * 0.5 - cx) / (W * 0.5);
        paddle.x += overBy * speed * 0.3 * dt;
      }

      // Full pitch movement
      paddle.x = clamp(paddle.x, 0, W - paddle.w);
      paddle.y = clamp(paddle.y, 0, H - paddle.h);
    }

    // ─── PADDLE COLLISION ───
    function hitPaddle(p) {
      if (ball.x + ball.size / 2 > p.x &&
          ball.x - ball.size / 2 < p.x + p.w &&
          ball.y + ball.size / 2 > p.y &&
          ball.y - ball.size / 2 < p.y + p.h) {

        // Push ball out of paddle
        if (p.isLeft) {
          ball.x = p.x + p.w + ball.size / 2 + 1;
        } else {
          ball.x = p.x - ball.size / 2 - 1;
        }

        // Normal Pong deflection
        const hitPos = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
        const angle = clamp(hitPos, -1, 1) * MAX_BOUNCE_ANGLE;
        const currentSpeed = Math.hypot(ball.vx, ball.vy);
        const newSpeed = Math.min(currentSpeed * BALL_ACCEL, W * BALL_MAX_SPEED);
        const deflectDir = p.isLeft ? 1 : -1;

        ball.vx = Math.cos(angle) * newSpeed * deflectDir;
        ball.vy = Math.sin(angle) * newSpeed;
        ball.curve = 0;
        if (p.isPlayer) ball.vy += playerVelY * 0.3;

        // Rubber bounce effect on paddle + kick sound
        const bounceKey = p.isLeft ? 'left' : 'right';
        const hitIntensity = Math.min(newSpeed / (W * 0.3), 1.0);
        paddleBounce[bounceKey] = { timer: 0.3, intensity: hitIntensity };
        playKickSound(hitIntensity);

        return true;
      }
      return false;
    }

    // ─── GOAL POST COLLISION ───
    function checkGoalPosts() {
      const gt = goalTop();
      const gb = goalBottom();
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);

      if (ball.x - ball.size / 2 < glL + GOAL_DEPTH) {
        if (ball.y - ball.size / 2 < gt && ball.y + ball.size / 2 > gt - POST_THICK) {
          ball.y = gt - POST_THICK - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.y + ball.size / 2 > gb && ball.y - ball.size / 2 < gb + POST_THICK) {
          ball.y = gb + POST_THICK + ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.x - ball.size / 2 < glL && (ball.y < gt || ball.y > gb)) {
          ball.x = glL + ball.size / 2;
          ball.vx = Math.abs(ball.vx) * 0.85;
          return 'wall';
        }
      }

      if (ball.x + ball.size / 2 > glR - GOAL_DEPTH) {
        if (ball.y - ball.size / 2 < gt && ball.y + ball.size / 2 > gt - POST_THICK) {
          ball.y = gt - POST_THICK - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.y + ball.size / 2 > gb && ball.y - ball.size / 2 < gb + POST_THICK) {
          ball.y = gb + POST_THICK + ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.8;
          return 'post';
        }
        if (ball.x + ball.size / 2 > glR && (ball.y < gt || ball.y > gb)) {
          ball.x = glR - ball.size / 2;
          ball.vx = -Math.abs(ball.vx) * 0.85;
          return 'wall';
        }
      }
      return null;
    }

    // ─── PHYSICS ───
    function physicsStep(dt) {
      const speed = Math.hypot(ball.vx, ball.vy);
      const maxStep = ball.size * 0.5;
      const totalDist = speed * dt;
      const steps = Math.max(1, Math.ceil(totalDist / maxStep));
      const subDt = dt / steps;

      for (let s = 0; s < steps; s++) {
        ball.x += ball.vx * subDt;
        ball.y += ball.vy * subDt;

        // Z-axis (lob)
        if (ball.z > 0 || ball.vz > 0) {
          ball.z += ball.vz * subDt;
          ball.vz -= GRAVITY * subDt;
          if (ball.z <= 0) {
            // Landing impact — intensity based on how fast it was falling
            const fallSpeed = Math.abs(ball.vz);
            if (fallSpeed > 80) {
              landingImpact = Math.min(fallSpeed / 400, 1.0);
              landingX = ball.x; landingY = ball.y;
              playLandingThud(landingImpact);
            }
            ball.z = 0; ball.vz = 0;
          }
          if (ball.z > currentMaxZ) currentMaxZ = ball.z;
        }

        // Wall bounces (top/bottom)
        if (ball.y - ball.size / 2 < 0) {
          ball.y = ball.size / 2;
          ball.vy = Math.abs(ball.vy) * 0.97;
        }
        if (ball.y + ball.size / 2 > H) {
          ball.y = H - ball.size / 2;
          ball.vy = -Math.abs(ball.vy) * 0.97;
        }

        const airborne = ball.z > AIR_THRESHOLD;
        if (!airborne) checkGoalPosts();

        if (!airborne) {
          for (const p of allPaddles) {
            if (hitPaddle(p)) {
              // Get zone identity for this paddle
              const td = p.isLeft ? leftTeam.data : rightTeam.data;
              const identity = getZoneIdentity(p, td);

              // Space held = zone-specific ability
              if (spaceDown && p.isPlayer) {
                handleZoneAbility(p, identity.zone, spaceHeldTime);
                return;  // ability may change ball state
              }

              // AI: use zone ability occasionally
              if (!p.isPlayer) {
                const zone = identity.zone;
                if (zone === 'box') {
                  // AI always catches in the box
                  handleZoneAbility(p, 'box', 0);
                  return;
                } else if (Math.random() < 0.3) {
                  // 30% chance AI uses zone ability
                  handleZoneAbility(p, zone, 0.1 + Math.random() * 0.3);
                  return;
                }
              }

              break;
            }
          }
        }

        const gt = goalTop();
        const gb = goalBottom();
        const goalLineL = W * GOAL_LINE_RATIO;
        const goalLineR = W * (1 - GOAL_LINE_RATIO);

        // Goal scoring (skip if ball is held or airborne — lobs fly over the goal)
        if (ballState === 'held_player' || ballState === 'held_ai') break;
        if (!airborne && ball.x - ball.size / 2 < goalLineL && ball.y > gt && ball.y < gb) {
          // Right team (AI) scored on left goal
          const scorerId = rightTeam ? getZoneIdentity(rightTeam.paddle, rightTeam.data) : null;
          scoreR++;
          goalLog.push({ side: 'right', scorer: scorerId ? scorerId.player.name : '?', num: scorerId ? scorerId.player.num : '', time: Math.floor(MATCH_TIME - matchTimer) });
          netRattleLeft = 2.5; netRattleSeed = Math.random() * 1000;
          goalCelebration = {
            scorer: scorerId ? scorerId.player.name.toUpperCase() : 'GOAL',
            num: scorerId ? scorerId.player.num : '',
            team: activeRightData,
            timer: CELEBRATION_TIME,
            side: 'right',
            paddle: rightTeam ? rightTeam.paddle : null,
            ballY: ball.y
          };
          resetAfterGoal(true);
          return;
        }
        if (!airborne && ball.x + ball.size / 2 > goalLineR && ball.y > gt && ball.y < gb) {
          // Left team (player) scored on right goal
          const scorerId = leftTeam ? getZoneIdentity(leftTeam.paddle, leftTeam.data) : null;
          scoreL++;
          goalLog.push({ side: 'left', scorer: scorerId ? scorerId.player.name : '?', num: scorerId ? scorerId.player.num : '', time: Math.floor(MATCH_TIME - matchTimer) });
          netRattleRight = 2.5; netRattleSeed = Math.random() * 1000;
          lastShotMaxZ = currentMaxZ;
          goalCelebration = {
            scorer: scorerId ? scorerId.player.name.toUpperCase() : 'GOAL',
            num: scorerId ? scorerId.player.num : '',
            team: activeLeftData,
            timer: CELEBRATION_TIME,
            side: 'left',
            paddle: leftTeam ? leftTeam.paddle : null,
            ballY: ball.y
          };
          resetAfterGoal(false);
          return;
        }

        // Wall bounce outside goal mouth
        if (ball.y <= gt || ball.y >= gb || airborne) {
          if (ball.x - ball.size / 2 < goalLineL) {
            ball.x = goalLineL + ball.size / 2;
            ball.vx = Math.abs(ball.vx) * 0.7;
          }
          if (ball.x + ball.size / 2 > goalLineR) {
            ball.x = goalLineR - ball.size / 2;
            ball.vx = -Math.abs(ball.vx) * 0.7;
          }
        }
      }
    }

    // ─── STICK BALL TO PADDLE FRONT ───
    function stickBallToFront(paddle) {
      if (paddle.isLeft) {
        ball.x = paddle.x + paddle.w + ball.size / 2 + 2;
      } else {
        ball.x = paddle.x - ball.size / 2 - 2;
      }
      ball.y = paddle.y + paddle.h / 2;
      ball.y = clamp(ball.y, ball.size / 2, H - ball.size / 2);
    }

    // ─── UPDATE ───
    let lastTime = performance.now();

    function update(now) {
      let dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      // 3D field is visually compressed — scale game speed to match perceived 2D speed
      if (gameMode === 'match3d') dt *= SPEED_3D;

      if (!leftTeam || !ball) return;

      // Match timer countdown
      if (!matchOver && gameMode === 'match3d') {
        matchTimer -= dt / SPEED_3D;  // use real time, not scaled time
      } else if (!matchOver) {
        matchTimer -= dt;
      }
      if (matchTimer <= 0 && !inInjuryTime && !matchOver) {
        inInjuryTime = true;
        matchTimer = injuryTime;  // extra time
      }
      if (matchTimer <= 0 && inInjuryTime && !matchOver) {
        matchTimer = 0;
        matchOver = true;
        goalPause = 999;  // freeze gameplay
      }

      // Track possession (which half is the ball in)
      if (!matchOver && ball && ballState === 'live') {
        const realDt = gameMode === 'match3d' ? dt / SPEED_3D : dt;
        if (ball.x < W * 0.5) possessionRight += realDt;  // ball in left half = right team attacking
        else possessionLeft += realDt;  // ball in right half = left team attacking
      }

      const playerPaddle = leftTeam.paddle;
      const aiPad = rightTeam.paddle;
      const pSpeed = H * PADDLE_SPEED_RATIO;

      // ── Player movement (full pitch, slowed in opponent's half) ──
      if (playerPaddle) {
        const px = playerPaddle.x + playerPaddle.w / 2;
        const inEnemyHalf = px > W * 0.5;
        const speedMult = inEnemyHalf ? 0.65 : 1.0;  // slower in enemy half
        if (keys['ArrowUp'])    playerPaddle.y -= pSpeed * speedMult * dt;
        if (keys['ArrowDown'])  playerPaddle.y += pSpeed * speedMult * dt;
        if (keys['ArrowLeft'])  playerPaddle.x -= pSpeed * speedMult * dt;
        if (keys['ArrowRight']) playerPaddle.x += pSpeed * speedMult * dt;
        // Magnetic pull back toward own half when in opponent's territory
        if (inEnemyHalf) {
          const overBy = (px - W * 0.5) / (W * 0.5);  // 0-1 how deep in enemy half
          playerPaddle.x -= overBy * pSpeed * 0.3 * dt;  // gentle pull back
        }
        playerPaddle.x = clamp(playerPaddle.x, 0, W - playerPaddle.w);
        playerPaddle.y = clamp(playerPaddle.y, 0, H - playerPaddle.h);

        playerVelY = (playerPaddle.y - playerPrevY) / Math.max(dt, 0.001);
        playerPrevY = playerPaddle.y;
      }

      // ── AI movement ──
      if (aiPad) aiPaddle(aiPad, dt);

      // Decay net rattle + landing impact
      if (netRattleLeft > 0) netRattleLeft = Math.max(0, netRattleLeft - dt);
      if (netRattleRight > 0) netRattleRight = Math.max(0, netRattleRight - dt);
      if (landingImpact > 0) landingImpact = Math.max(0, landingImpact - dt * 4);

      // Decay goal celebration
      if (goalCelebration) {
        goalCelebration.timer -= dt;
        if (goalCelebration.timer <= 0) goalCelebration = null;
      }

      // Decay paddle bounce effects
      for (const key in paddleBounce) {
        paddleBounce[key].timer -= dt;
        if (paddleBounce[key].timer <= 0) delete paddleBounce[key];
      }

      // Foul cooldown
      if (foulCooldown > 0) foulCooldown -= dt;

      // ── Paddle-to-paddle collision → foul ──
      if (playerPaddle && aiPad && ballState === 'live' && foulCooldown <= 0 && !foulState) {
        const overlap = playerPaddle.x + playerPaddle.w > aiPad.x &&
                        playerPaddle.x < aiPad.x + aiPad.w &&
                        playerPaddle.y + playerPaddle.h > aiPad.y &&
                        playerPaddle.y < aiPad.y + aiPad.h;
        if (overlap) {
          // Determine who fouled: the one in the other's half
          const playerInEnemyHalf = (playerPaddle.x + playerPaddle.w / 2) > W * 0.5;
          const aiInEnemyHalf = (aiPad.x + aiPad.w / 2) < W * 0.5;
          const foulX = (playerPaddle.x + aiPad.x) / 2 + playerPaddle.w / 2;
          const foulY = (playerPaddle.y + aiPad.y) / 2 + playerPaddle.h / 2;
          // Fouling team is whoever is deeper in enemy territory
          const foulingTeam = playerInEnemyHalf ? 'left' : 'right';
          const isPenalty = (foulingTeam === 'left' && foulX > W * 0.95) ||
                            (foulingTeam === 'right' && foulX < W * 0.05);

          foulState = { x: foulX, y: foulY, team: foulingTeam, timer: 2.0, isPenalty };
          foulCooldown = 4.0;  // no fouls for 4 seconds

          // Place ball at foul spot for free kick (awarded to other team)
          ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.curve = 0;
          if (foulingTeam === 'left') {
            // Free kick for right team (AI)
            ball.x = isPenalty ? W * 0.12 : foulX;
            ball.y = isPenalty ? H * 0.5 : foulY;
            ballState = 'held_ai';
            holdPaddle = aiPad;
            aiHoldTimer = 0.8 + Math.random() * 0.6;
          } else {
            // Free kick for left team (player)
            ball.x = isPenalty ? W * 0.88 : foulX;
            ball.y = isPenalty ? H * 0.5 : foulY;
            ballState = 'held_player';
            holdPaddle = playerPaddle;
          }
          holdTimer = 0;
          stickBallToFront(holdPaddle);

          // Push paddles apart
          if (playerInEnemyHalf) {
            playerPaddle.x = Math.min(playerPaddle.x, W * 0.48 - playerPaddle.w);
          }
          if (aiInEnemyHalf) {
            aiPad.x = Math.max(aiPad.x, W * 0.52);
          }

          goalPause = 1.5;  // brief pause for the foul
          playWhistle();
        }
      }

      // Decay foul display
      if (foulState) {
        foulState.timer -= dt;
        if (foulState.timer <= 0) foulState = null;
      }

      if (goalPause > 0) { goalPause -= dt; return; }

      // ── Track space charge ──
      if (spaceDown) spaceHeldTime += dt;

      // ── Ball held by player (caught in box) ──
      if (ballState === 'held_player') {
        stickBallToFront(holdPaddle);
        holdTimer += dt;
        if (consumeRelease('Space') || holdTimer >= HOLD_TIME_LIMIT) {
          releaseFromHold(holdPaddle, spaceHeldTime);
          spaceHeldTime = 0;
        }
        return;
      }

      // ── Ball held by AI ──
      if (ballState === 'held_ai') {
        stickBallToFront(holdPaddle);
        holdTimer += dt;
        aiHoldTimer -= dt;
        if (aiHoldTimer <= 0 || holdTimer >= HOLD_TIME_LIMIT) {
          releaseFromHold(holdPaddle, 0.1 + Math.random() * 0.2);
        }
        return;
      }

      // ── Ball is live ──
      // Store trail position
      ballTrail.push({ x: ball.x, y: ball.y });
      if (ballTrail.length > 12) ballTrail.shift();

      physicsStep(dt);
    }

    // ═══════════════════════════════
    //  RENDERING
    // ═══════════════════════════════

    // ─── DRAW FIELD ───
    function drawField() {
      // ========== Dark surface — neon arcade table ==========
      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, W, H);

      // Reset perspective to identity (flat top-down)
      _toScreen = (gx, gy) => ({ x: gx, y: gy });
      _perspScale = () => 1;

      const gt = goalTop(), gb = goalBottom();
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);

      ctx.save();

      // ─── Neon field border glow ───
      // Left half: team left color, right half: team right color
      const borderW = 3;
      ctx.shadowBlur = 15;

      ctx.shadowColor = activeLeftData.primary;
      ctx.strokeStyle = activeLeftData.primary;
      ctx.lineWidth = borderW;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0); ctx.lineTo(0, 0); ctx.lineTo(0, H); ctx.lineTo(W / 2, H);
      ctx.stroke();

      ctx.shadowColor = activeRightData.primary;
      ctx.strokeStyle = activeRightData.primary;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0); ctx.lineTo(W, 0); ctx.lineTo(W, H); ctx.lineTo(W / 2, H);
      ctx.stroke();

      // ─── Neon field lines ───
      ctx.shadowColor = 'rgba(100,200,255,0.6)';
      ctx.shadowBlur = 8;
      ctx.strokeStyle = 'rgba(100,200,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';

      // Center line (dashed)
      ctx.setLineDash([8, 8]);
      ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
      ctx.setLineDash([]);

      // Center circle
      const ccR = H * 0.12;
      ctx.beginPath(); ctx.arc(W / 2, H / 2, ccR, 0, Math.PI * 2); ctx.stroke();

      // Center spot
      ctx.fillStyle = 'rgba(100,200,255,0.5)';
      ctx.beginPath(); ctx.arc(W / 2, H / 2, 3, 0, Math.PI * 2); ctx.fill();

      // Penalty areas
      const penW = W * 0.14;
      const penH = H * 0.56;
      const penTop = (H - penH) / 2;
      ctx.strokeRect(glL, penTop, penW, penH);
      ctx.strokeRect(glR - penW, penTop, penW, penH);

      // Goal areas
      const gaW = penW * 0.42;
      const gaH = H * 0.32;
      const gaTop = (H - gaH) / 2;
      ctx.strokeRect(glL, gaTop, gaW, gaH);
      ctx.strokeRect(glR - gaW, gaTop, gaW, gaH);

      // ─── Neon goal mouths ───
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;

      // Left goal
      ctx.beginPath();
      ctx.moveTo(glL, gt); ctx.lineTo(glL, gb);
      ctx.stroke();

      // Right goal
      ctx.beginPath();
      ctx.moveTo(glR, gt); ctx.lineTo(glR, gb);
      ctx.stroke();

      ctx.restore();
    }

    // ─── GOAL NET DRAWING (shared logic) ───
    function drawNetSide(x, dir, rattle, projFn) {
      const gt = goalTop(), gb = goalBottom();
      const netDepth = W * 0.04;     // much deeper net
      const netHLines = 10;          // horizontal strings
      const netVLines = 6;           // vertical/depth strings

      ctx.save();
      const intensity = rattle / 2.5;
      const freq = 25 + netRattleSeed % 15;
      const now = performance.now() / 1000;

      // Base net opacity (always visible)
      const baseAlpha = 0.25;
      const rattleAlpha = baseAlpha + intensity * 0.5;

      ctx.strokeStyle = `rgba(255,255,255,${rattleAlpha})`;
      ctx.lineWidth = 1;
      if (intensity > 0) {
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 20 * intensity;
      }

      // Horizontal strings (across the goal mouth, going into depth)
      for (let i = 0; i <= netHLines; i++) {
        const t = i / netHLines;
        const ny = gt + t * (gb - gt);
        const shake = intensity * Math.sin(now * freq + i * 2.3 + netRattleSeed) * 18;
        const shakeY = intensity * Math.sin(now * freq * 1.3 + i * 1.7 + netRattleSeed) * 7;
        const x1 = x, y1 = ny;
        const x2 = x - dir * netDepth + shake, y2 = ny + shakeY;
        if (projFn) {
          const p1 = projFn(x1, y1, 0), p2 = projFn(x2, y2, 0);
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        } else {
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }
      }

      // Vertical strings (top to bottom at different depths)
      for (let i = 0; i <= netVLines; i++) {
        const t = i / netVLines;
        const nx = x - dir * netDepth * t;
        const shake = intensity * Math.sin(now * freq * 0.9 + i * 3.1 + netRattleSeed) * 14 * t;
        const x1 = nx + shake, y1 = gt + shake * 0.2;
        const x2 = nx + shake, y2 = gb + shake * 0.2;
        if (projFn) {
          const p1 = projFn(x1, y1, 0), p2 = projFn(x1, y2, 0);
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        } else {
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }
      }

      // Back wall of net (vertical line at full depth)
      const backX = x - dir * netDepth;
      const backShake = intensity * Math.sin(now * freq + netRattleSeed) * 12;
      if (projFn) {
        const p1 = projFn(backX + backShake, gt, 0), p2 = projFn(backX + backShake, gb, 0);
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(backX + backShake, gt); ctx.lineTo(backX + backShake, gb); ctx.stroke();
      }

      ctx.restore();
    }

    function drawNets() {
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);
      drawNetSide(glL, -1, netRattleLeft, null);
      drawNetSide(glR, 1, netRattleRight, null);
    }

    function drawNets3D() {
      const glL = W * GOAL_LINE_RATIO;
      const glR = W * (1 - GOAL_LINE_RATIO);
      drawNetSide(glL, -1, netRattleLeft, project3D);
      drawNetSide(glR, 1, netRattleRight, project3D);
    }

    // ─── NEON PADDLE ───
    function drawPaddle(p) {
      const team = p.isLeft ? leftTeam : rightTeam;

      // Zone-based identity
      let displayNum, displayName, zone;
      if (team) {
        const identity = getZoneIdentity(p, team.data);
        displayNum = identity.player.num;
        displayName = identity.player.name;
        zone = identity.zone;
      } else {
        displayNum = '?';
        displayName = '???';
        zone = 'fwd';
      }

      // Neon color: team color normally, distinct keeper color in box
      const teamColor = team ? team.data.primary : '#fff';
      const isKeeper = zone === 'box';
      const neonColor = isKeeper ? '#00ff88' : teamColor;
      const glowIntensity = p.isPlayer ? 20 : 12;

      if (gameMode === 'physics') {
        // Physics lab: simple neon rectangle
        ctx.save();
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = glowIntensity;
        ctx.fillStyle = neonColor;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.restore();
        return;
      }

      // ===== Match mode: Neon rectangle with glow =====
      ctx.save();

      // Multiple glow passes for intensity
      for (let i = 0; i < 3; i++) {
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = glowIntensity + i * 8;
        ctx.fillStyle = i === 2 ? neonColor : 'rgba(0,0,0,0)';
        ctx.fillRect(p.x, p.y, p.w, p.h);
      }

      // Bright core
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
      ctx.globalAlpha = 1;

      ctx.restore();

      // No label on paddle — player name shown in scoreboard HUD
    }

    function lerpPt(a, b, t) {
      return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
    }

    // ─── NEON BALL WITH TRAIL ───
    function drawBall() {
      if (goalPause > 0) return;
      const zPx = ball.z;
      const r = ball.size / 2 * (1 + zPx / 300);
      const bx = ball.x;
      const by = ball.y - zPx;

      // Ground shadow (grows with height)
      if (zPx > 2) {
        const airFactor2D = Math.min(zPx / 150, 1);
        const shadowAlpha = Math.max(0.08, 0.25 - zPx / 600);
        const shadowSpread = 1.5 + airFactor2D * 2.5;
        ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(ball.x, ball.y, r * shadowSpread, r * (0.5 + airFactor2D * 0.3), 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Landing impact ring (2D)
      if (landingImpact > 0) {
        const ringR = (1 - landingImpact) * 50;
        ctx.save();
        ctx.strokeStyle = `rgba(255,255,255,${landingImpact * 0.35})`;
        ctx.lineWidth = 2 * landingImpact;
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 6 * landingImpact;
        ctx.beginPath();
        ctx.ellipse(landingX, landingY, ringR, ringR * 0.4, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      // Ball core with glow
      ctx.save();
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(bx, by, r, 0, Math.PI * 2);
      ctx.fill();

      // Second glow pass (cyan tint)
      ctx.shadowColor = '#88ddff';
      ctx.shadowBlur = 25;
      ctx.beginPath();
      ctx.arc(bx, by, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawHUD() {
      // Charge indicator — shows when Space held
      if (spaceDown && (ballState === 'live' || ballState === 'held_player')) {
        const maxCharge = 1.5;
        const charge = clamp(spaceHeldTime / maxCharge, 0, 1);
        const barW = 30; const barH = 3;
        const bx = ball.x + ball.size + 4;
        const by = ball.y - 10 - ball.z;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(bx, by, barW, barH);
        ctx.save();
        ctx.shadowColor = charge < 0.6 ? '#0f0' : '#ff0';
        ctx.shadowBlur = 4;
        const r = Math.round(255 * charge);
        const g = Math.round(255 * (1 - charge * 0.4));
        ctx.fillStyle = `rgb(${r},${g},80)`;
        ctx.fillRect(bx, by, barW * charge, barH);
        ctx.restore();
      }
    }

    function drawScoreboard() {
      ctx.save();

      // Get current player identities
      const leftId = leftTeam ? getZoneIdentity(leftTeam.paddle, leftTeam.data) : null;
      const rightId = rightTeam ? getZoneIdentity(rightTeam.paddle, rightTeam.data) : null;

      // Row 1: ITA  0 - 0  GER  with clock below
      const scoreLineY = 24;
      ctx.font = 'bold 14px monospace';
      ctx.shadowBlur = 8;

      // Left team code
      ctx.shadowColor = activeLeftData.primary;
      ctx.fillStyle = activeLeftData.primary;
      ctx.textAlign = 'right';
      ctx.fillText(activeLeftData.short, W / 2 - 55, scoreLineY);

      // Score
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 22px monospace';
      ctx.fillText(`${scoreL} - ${scoreR}`, W / 2, scoreLineY + 2);

      // Right team code
      ctx.font = 'bold 14px monospace';
      ctx.shadowBlur = 8;
      ctx.shadowColor = activeRightData.primary;
      ctx.fillStyle = activeRightData.primary;
      ctx.textAlign = 'left';
      ctx.fillText(activeRightData.short, W / 2 + 55, scoreLineY);

      // Clock below score
      const displayMin = inInjuryTime ? `90+${Math.ceil(injuryTime - matchTimer)}'` : `${Math.floor(MATCH_TIME - matchTimer)}'`;
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.shadowBlur = 6;
      const isLate = inInjuryTime || matchTimer < 10;
      ctx.fillStyle = isLate ? '#f44' : '#aaa';
      ctx.shadowColor = isLate ? '#f44' : '#666';
      ctx.fillText(displayMin, W / 2, scoreLineY + 20);

      // Row 2: Player identities
      ctx.font = 'bold 12px monospace';
      ctx.shadowBlur = 6;
      ctx.shadowColor = activeLeftData.primary;
      ctx.fillStyle = activeLeftData.primary;
      ctx.textAlign = 'left';
      const leftPlayer = leftId ? leftId.player.name.toUpperCase() : '';
      ctx.fillText(leftPlayer, 15, scoreLineY + 38);

      ctx.shadowColor = activeRightData.primary;
      ctx.fillStyle = activeRightData.primary;
      ctx.textAlign = 'right';
      const rightPlayer = rightId ? rightId.player.name.toUpperCase() : '';
      ctx.fillText(rightPlayer, W - 15, scoreLineY + 38);

      ctx.restore();
    }

    // ─── PHYSICS MODE DEBUG HUD ───
    function drawPhysicsHUD() {
      const x = 14;
      let y = 90;
      const lh = 16;

      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(4, 72, 220, 160);

      ctx.fillStyle = '#4f8';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('PHYSICS LAB', x, y); y += lh + 4;

      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '10px monospace';

      const spd = Math.hypot(ball.vx, ball.vy);
      ctx.fillText(`ball speed:  ${(spd / W * 100).toFixed(1)}% W`, x, y); y += lh;
      ctx.fillText(`ball height: ${ball.z.toFixed(0)} px`, x, y); y += lh;
      ctx.fillText(`ball vz:     ${ball.vz.toFixed(0)} px/s`, x, y); y += lh;
      ctx.fillText(`peak height: ${currentMaxZ.toFixed(0)} px`, x, y); y += lh;

      ctx.fillStyle = '#ff8';
      ctx.fillText(`last charge: ${(lastShotChargeTime * 1000).toFixed(0)} ms`, x, y); y += lh;
      ctx.fillText(`last peak:   ${lastShotMaxZ.toFixed(0)} px`, x, y); y += lh;

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      y += 6;
      ctx.fillText(`airborne: ${ball.z > AIR_THRESHOLD ? 'YES' : 'no'}`, x, y); y += lh;

      // Bottom hint
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = back to menu', W / 2, H - 8);
    }

    // ═══════════════════════════════
    //  MENU SCREEN
    // ═══════════════════════════════
    function renderMenu() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;

      // Title
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(36, W * 0.04)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('PONGBALL', cx, cy - 60);

      // Menu items
      const items = ['PHYSICS LAB', 'COFFEE TABLE', '2.5D MATCH', 'MATCH', 'WORLD CUP'];

      items.forEach((label, i) => {
        const iy = cy + 20 + i * 50;
        const selected = menuSelection === i;

        ctx.fillStyle = selected ? '#fff' : 'rgba(255,255,255,0.3)';
        ctx.font = `bold 16px monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(`${selected ? '> ' : '  '}${label}`, cx, iy);
      });
    }

    // ═══════════════════════════════
    //  RENDER (match or physics)
    function render() {
      drawField();
      drawNets();
      allPaddles.forEach(drawPaddle);
      drawBall();
      drawHUD();
      drawScoreboard();

      if (gameMode === 'physics') {
        drawPhysicsHUD();
      }

      // ─── Foul indicator (2D) ───
      if (foulState) {
        const alpha = Math.min(foulState.timer, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center';
        ctx.font = 'bold 24px monospace';
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff0';
        ctx.fillText(foulState.isPenalty ? 'PENALTY!' : 'FOUL!', foulState.x, foulState.y - 30);
        const cardW = 14, cardH = 18;
        ctx.fillRect(foulState.x - cardW / 2, foulState.y - 55, cardW, cardH);
        ctx.restore();
      }

      // ─── Goal celebration overlay (2D) ───
      if (goalCelebration) {
        const gc = goalCelebration;
        const progress = 1 - gc.timer / CELEBRATION_TIME;
        const fadeIn = Math.min(progress * 4, 1);
        const fadeOut = Math.max(0, 1 - (progress - 0.7) / 0.3);
        const alpha = Math.min(fadeIn, fadeOut);

        if (progress < 0.08) {
          ctx.save();
          ctx.globalAlpha = (1 - progress / 0.08) * 0.25;
          ctx.fillStyle = gc.team.primary;
          ctx.fillRect(0, 0, W, H);
          ctx.restore();
        }

        ctx.save();
        const goalSize = 48 + Math.sin(progress * Math.PI * 4) * 5;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `bold ${goalSize}px monospace`;
        ctx.shadowColor = gc.team.primary;
        ctx.shadowBlur = 30;
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = alpha;
        ctx.fillText('GOL!', W / 2, H * 0.35);
        ctx.shadowBlur = 50;
        ctx.fillStyle = gc.team.primary;
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillText('GOL!', W / 2, H * 0.35);

        const nameDelay = Math.max(0, (progress - 0.15) * 3);
        const nameAlpha = Math.min(nameDelay, 1) * fadeOut;
        ctx.font = 'bold 24px monospace';
        ctx.shadowColor = gc.team.primary;
        ctx.shadowBlur = 15;
        ctx.fillStyle = gc.team.primary;
        ctx.globalAlpha = nameAlpha;
        ctx.fillText(`#${gc.num} ${gc.scorer}`, W / 2, H * 0.48);
        ctx.restore();
      }

      // Game over overlay
      if (matchOver) drawGameOver();

      // ESC hint
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ESC = menu', W / 2, H - 8);
    }

    // ─── GAME OVER OVERLAY ───
    function drawGameOver() {
      ctx.save();
      // Dark overlay
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';

      // FULL TIME
      ctx.font = 'bold 18px monospace';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#aaa';
      ctx.fillText('FULL TIME', W / 2, H * 0.32);

      // Final score
      ctx.font = 'bold 48px monospace';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#fff';
      ctx.fillText(`${scoreL} - ${scoreR}`, W / 2, H * 0.43);

      // Team names
      ctx.font = 'bold 16px monospace';
      ctx.shadowColor = activeLeftData.primary;
      ctx.shadowBlur = 8;
      ctx.fillStyle = activeLeftData.primary;
      ctx.fillText(activeLeftData.short, W / 2 - 80, H * 0.50);
      ctx.shadowColor = activeRightData.primary;
      ctx.fillStyle = activeRightData.primary;
      ctx.fillText(activeRightData.short, W / 2 + 80, H * 0.50);

      // Goal scorers — two columns
      if (goalLog.length > 0) {
        ctx.font = '11px monospace';
        ctx.shadowBlur = 4;
        const colX = W / 2;
        let gy = H * 0.56;
        const leftGoals = goalLog.filter(g => g.side === 'left');
        const rightGoals = goalLog.filter(g => g.side === 'right');
        const maxGoals = Math.max(leftGoals.length, rightGoals.length);
        for (let i = 0; i < maxGoals; i++) {
          if (leftGoals[i]) {
            ctx.textAlign = 'right';
            ctx.shadowColor = activeLeftData.primary;
            ctx.fillStyle = activeLeftData.primary;
            ctx.fillText(`${leftGoals[i].scorer} ${leftGoals[i].time}'`, colX - 15, gy);
          }
          if (rightGoals[i]) {
            ctx.textAlign = 'left';
            ctx.shadowColor = activeRightData.primary;
            ctx.fillStyle = activeRightData.primary;
            ctx.fillText(`${rightGoals[i].time}' ${rightGoals[i].scorer}`, colX + 15, gy);
          }
          gy += 15;
        }
      }

      // Man of the Match — player with most goals
      const scorerCounts = {};
      goalLog.forEach(g => {
        const key = `${g.side}:${g.scorer}`;
        scorerCounts[key] = (scorerCounts[key] || 0) + 1;
      });
      let momKey = null, momCount = 0;
      for (const [key, count] of Object.entries(scorerCounts)) {
        if (count > momCount) { momKey = key; momCount = count; }
      }
      if (momKey && goalLog.length > 0) {
        const momSide = momKey.split(':')[0];
        const momName = momKey.split(':')[1];
        const momTeam = momSide === 'left' ? activeLeftData : activeRightData;
        const momY = H * 0.56 + Math.max(goalLog.filter(g=>g.side==='left').length, goalLog.filter(g=>g.side==='right').length) * 15 + 20;
        ctx.textAlign = 'center';
        ctx.font = '10px monospace';
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#888';
        ctx.fillText('MAN OF THE MATCH', W / 2, momY);
        ctx.font = 'bold 14px monospace';
        ctx.shadowColor = momTeam.primary;
        ctx.shadowBlur = 10;
        ctx.fillStyle = momTeam.primary;
        ctx.fillText(momName.toUpperCase(), W / 2, momY + 18);
      }

      // Possession stats
      const goalRows = Math.max(goalLog.filter(g=>g.side==='left').length, goalLog.filter(g=>g.side==='right').length);
      const momOffset = (momKey && goalLog.length > 0) ? 40 : 0;
      const possY = H * 0.56 + goalRows * 15 + 20 + momOffset;
      const totalPoss = possessionLeft + possessionRight;
      if (totalPoss > 0) {
        const possL = Math.round(possessionLeft / totalPoss * 100);
        const possR = 100 - possL;
        ctx.textAlign = 'center';
        ctx.font = '10px monospace';
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#666';
        ctx.fillText('POSSESSION', W / 2, possY);
        // Possession bar
        const barW = 160, barH = 6;
        const barX = W / 2 - barW / 2;
        const barY2 = possY + 6;
        ctx.fillStyle = activeLeftData.primary;
        ctx.globalAlpha = 0.7;
        ctx.fillRect(barX, barY2, barW * possL / 100, barH);
        ctx.fillStyle = activeRightData.primary;
        ctx.fillRect(barX + barW * possL / 100, barY2, barW * possR / 100, barH);
        ctx.globalAlpha = 1;
        // Percentages
        ctx.font = 'bold 11px monospace';
        ctx.shadowColor = activeLeftData.primary;
        ctx.shadowBlur = 4;
        ctx.fillStyle = activeLeftData.primary;
        ctx.textAlign = 'right';
        ctx.fillText(`${possL}%`, barX - 6, barY2 + 6);
        ctx.shadowColor = activeRightData.primary;
        ctx.fillStyle = activeRightData.primary;
        ctx.textAlign = 'left';
        ctx.fillText(`${possR}%`, barX + barW + 6, barY2 + 6);
      }

      // Restart hint
      const hintY = Math.min(H * 0.90, possY + 30);
      ctx.textAlign = 'center';
      ctx.font = '12px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.shadowBlur = 0;
      ctx.fillText('SPACE = rematch  ·  ESC = menu', W / 2, hintY);

      ctx.restore();
    }

    // ─── WORLD CUP SCREEN ───
    function renderWorldCup() {
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, W, H);
      if (!wcState) return;

      const cx = W / 2;
      ctx.textAlign = 'center';

      // Title bar
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.font = 'bold 20px monospace';
      ctx.fillText('ITALIA \'90', cx, 30);
      ctx.shadowBlur = 0;

      const phase = wcState.phase;

      if (phase === 'group_show' || phase === 'group_play' || phase === 'group_done') {
        renderWCGroups();
      } else if (phase === 'r16_show' || phase === 'r16_play') {
        renderWCBracket('ROUND OF 16', wcState.bracket.r16);
      } else if (phase === 'qf_show' || phase === 'qf_play') {
        renderWCBracket('QUARTER-FINALS', wcState.bracket.qf);
      } else if (phase === 'sf_show' || phase === 'sf_play') {
        renderWCBracket('SEMI-FINALS', wcState.bracket.sf);
      } else if (phase === 'final_show' || phase === 'final_play') {
        renderWCBracket('FINAL', wcState.bracket.final);
      } else if (phase === 'champion') {
        renderWCChampion();
      } else if (phase === 'eliminated') {
        renderWCEliminated();
      }

      // Controls hint
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      if (phase.endsWith('_show') || phase === 'group_done') {
        ctx.fillText('SPACE = continue  ·  ESC = menu', cx, H - 12);
      } else {
        ctx.fillText('ESC = menu', cx, H - 12);
      }
    }

    function renderWCGroups() {
      const groupNames = Object.keys(WC_GROUPS);
      const cols = 3;
      const rows = 2;
      const cellW = W / cols;
      const cellH = (H - 60) / rows;

      groupNames.forEach((g, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = col * cellW + cellW / 2;
        const y = 55 + row * cellH;

        // Group header
        ctx.fillStyle = '#888';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`GROUP ${g}`, x, y);

        // Standings table
        const standings = wcState.groupStandings[g];
        standings.forEach((s, j) => {
          const ty = y + 20 + j * 20;
          const team = WC_TEAMS[s.team];
          const isItaly = s.team === 'ITA';

          ctx.textAlign = 'left';
          ctx.font = isItaly ? 'bold 11px monospace' : '11px monospace';
          ctx.fillStyle = isItaly ? team.primary : (team ? team.primary : '#aaa');
          ctx.shadowColor = isItaly ? team.primary : 'transparent';
          ctx.shadowBlur = isItaly ? 6 : 0;

          const name = team ? team.short : s.team;
          ctx.fillText(name, x - cellW * 0.35, ty);

          ctx.textAlign = 'center';
          ctx.fillStyle = '#aaa';
          ctx.shadowBlur = 0;
          ctx.font = '10px monospace';
          // W D L GF GA Pts
          const stats = `${s.w} ${s.d} ${s.l}  ${s.gf}:${s.ga}`;
          ctx.fillText(stats, x + 10, ty);

          // Points
          ctx.textAlign = 'right';
          ctx.font = 'bold 11px monospace';
          ctx.fillStyle = isItaly ? '#fff' : '#ccc';
          ctx.fillText(`${s.pts}`, x + cellW * 0.35, ty);
        });

        // Match results below standings
        const matches = wcState.groupMatches[g];
        const matchY = y + 110;
        matches.forEach((m, j) => {
          if (!m.played) return;
          const my = matchY + j * 14;
          const hTeam = WC_TEAMS[m.home];
          const aTeam = WC_TEAMS[m.away];
          ctx.font = '9px monospace';
          ctx.fillStyle = '#666';
          ctx.textAlign = 'center';
          ctx.fillText(`${hTeam ? hTeam.short : m.home} ${m.scoreH}-${m.scoreA} ${aTeam ? aTeam.short : m.away}`, x, my);
        });
      });
    }

    function renderWCBracket(title, matches) {
      const cx = W / 2;
      ctx.fillStyle = '#aaa';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(title, cx, 55);

      matches.forEach((m, i) => {
        const my = 90 + i * 55;
        const hTeam = WC_TEAMS[m.home];
        const aTeam = WC_TEAMS[m.away];
        const hColor = hTeam ? hTeam.primary : '#aaa';
        const aColor = aTeam ? aTeam.primary : '#aaa';
        const isPlayerMatch = wcIsPlayerMatch(m);

        // Background highlight for player match
        if (isPlayerMatch) {
          ctx.fillStyle = 'rgba(0,60,165,0.1)';
          ctx.fillRect(cx - 180, my - 15, 360, 40);
        }

        // Home team
        ctx.font = isPlayerMatch ? 'bold 14px monospace' : '13px monospace';
        ctx.textAlign = 'right';
        ctx.fillStyle = hColor;
        ctx.shadowColor = m.home === 'ITA' ? hColor : 'transparent';
        ctx.shadowBlur = m.home === 'ITA' ? 8 : 0;
        ctx.fillText(hTeam ? hTeam.name.toUpperCase() : m.home, cx - 30, my);

        // Score or vs
        ctx.textAlign = 'center';
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px monospace';
        if (m.played) {
          ctx.fillText(`${m.scoreH} - ${m.scoreA}`, cx, my);
        } else {
          ctx.fillStyle = '#555';
          ctx.fillText('vs', cx, my);
        }

        // Away team
        ctx.font = isPlayerMatch ? 'bold 14px monospace' : '13px monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = aColor;
        ctx.shadowColor = m.away === 'ITA' ? aColor : 'transparent';
        ctx.shadowBlur = m.away === 'ITA' ? 8 : 0;
        ctx.fillText(aTeam ? aTeam.name.toUpperCase() : m.away, cx + 30, my);
        ctx.shadowBlur = 0;
      });
    }

    function renderWCChampion() {
      const cx = W / 2;
      ctx.save();

      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 30;
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('WORLD CHAMPIONS', cx, H * 0.35);

      ctx.shadowColor = TEAM_LEFT.primary;
      ctx.shadowBlur = 20;
